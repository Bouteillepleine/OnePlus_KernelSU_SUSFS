name: Build and Release OnePlus Kernels

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CCACHE_MAX_SIZE: '2G'

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false
      op_model:
        description: 'Select the OnePlus kernels to build'
        required: true
        type: choice
        options:
          - OOS14+15+16
          - OOS15+16
          - OOS14+15
          - OOS16
          - OOS15
          - OOS14
          - android16-6.12
          - android15-6.6
          - android14-6.1
          - android13-5.15
          - android12-5.10
        default: OOS14+15+16
      ksu_options:
        description: 'Enter ReSukiSU build json'
        required: true
        type: string
        default: '[{"type":"resukisu"}]'
      kpm_mode:
        description: 'KPM mode: KPM (enable + patch_linux), KPN (disable)'
        required: true
        type: choice
        options:
          - KPM
          - KPN
        default: KPM
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options: [O2, O3]
        default: O2
      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false
      android12-5_10_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android12-5.10'
        type: string
        default: ''
      android13-5_15_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android13-5.15'
        type: string
        default: ''
      android14-6_1_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android14-6.1'
        type: string
        default: ''
      android15-6_6_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android15-6.6'
        type: string
        default: ''
      android16-6_12_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android16-6.12'
        type: string
        default: ''

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Build matrix generation
  # ─────────────────────────────────────────────────────────────
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix:         ${{ steps.set-matrix.outputs.matrix }}
      device_count:   ${{ steps.set-matrix.outputs.device_count }}
      build_count:    ${{ steps.set-matrix.outputs.build_count }}
      ksu_normalized: ${{ steps.set-matrix.outputs.ksu_normalized }}
      feature_index:  ${{ steps.set-matrix.outputs.feature_index }}
    steps:
      - name: 📥 Checkout Code (to access configs/)
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            configs/
          sparse-checkout-cone-mode: false

      - name: 🔍 Generate build matrix
        id: set-matrix
        env:
          KSU_OPTIONS_RAW: ${{ github.event.inputs.ksu_options }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Matrix generation"

          input="${{ github.event.inputs.op_model }}"

          # ── Sanitize & validate KSU options via env var ──
          ksu_options_raw="${KSU_OPTIONS_RAW}"

          if ! ksu_normalized=$(echo "$ksu_options_raw" | jq -c '
            map(
              if .type then
                .type |= ascii_upcase |
                if .hash == null then .hash = "main" else . end
              else error("No type found")
              end
            )' 2>&1); then
            echo "::error::ksu_options validation failed: $ksu_normalized"
            exit 1
          fi

          # ── Assemble full config matrix ──
          mapfile -d '' -t all_json_files < <(find configs/ -name "*.json" -print0 | sort -z)

          if [ ${#all_json_files[@]} -eq 0 ]; then
            echo "::error::No config JSON files found in configs/"
            exit 1
          fi

          jq -s '.' "${all_json_files[@]}" > matrix.json

          # ── Apply op_model filter ──
          jq_filter="."
          case "$input" in
            OOS14+15+16) ;;
            OOS15+16)
              jq_filter='map(select(.os_version == "OOS15" or .os_version == "OOS16"))'
              ;;
            OOS14+15)
              jq_filter='map(select(.os_version == "OOS14" or .os_version == "OOS15"))'
              ;;
            OOS16)  jq_filter='map(select(.os_version == "OOS16"))' ;;
            OOS15)  jq_filter='map(select(.os_version == "OOS15"))' ;;
            OOS14)  jq_filter='map(select(.os_version == "OOS14"))' ;;
            android*-*.*)
              IFS='-' read -r av kv <<< "$input"
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\")) | map(select(.android_version == \"$av\" and .kernel_version == \"$kv\"))"
              echo "ℹ️  Android-Kernel filter applied: $av-$kv (OOS15/OOS16 only)"
              ;;
            *)
              echo "::error::Unsupported op_model: '$input'"
              exit 1
              ;;
          esac

          filtered=$(jq -c "$jq_filter" matrix.json)
          device_count=$(jq 'length' <<<"$filtered")

          if [ "$device_count" -eq 0 ]; then
            echo "::error::No config files found for input '$input' after applying filters!"
            echo "Available configurations:"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi

          # ── Pre-compute feature index ──
          feature_index=$(jq -c '
            map({
              key: (.model + "|" + .os_version + "|" + .android_version + "|" + .kernel_version),
              value: {
                model:           .model,
                os_version:      .os_version,
                android_version: .android_version,
                kernel_version:  .kernel_version,
                feature_flags: [
                  (.hmbird  // false | if . then "🐦 HMBIRD"  else empty end),
                  (.susfs   // false | if . then "ඞ SusFS"   else empty end),
                  (.bbr     // false | if . then "🚀 BBR"     else empty end),
                  (.bbg     // false | if . then "🛡️ BBG"    else empty end),
                  (.ttl     // false | if . then "⏱️ TTL"    else empty end),
                  (.ip_set  // false | if . then "🔧 IP_SET"  else empty end)
                ]
              }
            }) | from_entries
          ' <<<"$filtered")

          # ── Cross-product: devices × KSU entries ──
          merged_matrix=$(jq -n \
            --argjson devices  "$filtered" \
            --argjson ksu_list "$ksu_normalized" \
            '[ $devices[] as $dev | $ksu_list[] as $ksu |
               ($dev + {ksu_type: $ksu.type, ksu_hash: $ksu.hash}) ]')

          build_count=$(echo "$merged_matrix" | jq 'length')
          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')

          echo "✅ Found $device_count device(s), expanded to $build_count build(s)"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version), \(.ksu_type) - \(.ksu_hash))"' \
            <<<"$merged_matrix"

          # ── Outputs ──
          echo "matrix=$(jq -c . <<< "$wrapped")"                 >> "$GITHUB_OUTPUT"
          echo "device_count=$device_count"                        >> "$GITHUB_OUTPUT"
          echo "build_count=$build_count"                          >> "$GITHUB_OUTPUT"
          echo "ksu_normalized=$(jq -c . <<< "$ksu_normalized")"  >> "$GITHUB_OUTPUT"
          echo "feature_index=$(jq -c . <<< "$feature_index")"    >> "$GITHUB_OUTPUT"

          echo "::endgroup::"

      - name: 📤 Upload filtered build matrix
        uses: actions/upload-artifact@v5
        with:
          name: build-matrix
          path: matrix.json
          retention-days: 1

      - name: 📊 Build plan summary
        env:
          KSU_NORMALIZED: ${{ steps.set-matrix.outputs.ksu_normalized }}
          SUSFS_A12: ${{ inputs.android12-5_10_susfs_branch_or_commit }}
          SUSFS_A13: ${{ inputs.android13-5_15_susfs_branch_or_commit }}
          SUSFS_A14: ${{ inputs.android14-6_1_susfs_branch_or_commit }}
          SUSFS_A15: ${{ inputs.android15-6_6_susfs_branch_or_commit }}
          SUSFS_A16: ${{ inputs.android16-6_12_susfs_branch_or_commit }}
        run: |
          set -euo pipefail

          {
            echo "## 🎯 Build Plan"
            echo ""
            echo "**Target:** ${{ inputs.op_model }}"
            echo "**Devices:** ${{ steps.set-matrix.outputs.device_count }}"
            echo "**Builds:** ${{ steps.set-matrix.outputs.build_count }}"
            echo ""
            echo "**Configuration:**"
            ksu_display="${KSU_NORMALIZED}"
            echo "- ReSukiSU Config: \`${ksu_display}\`"
            echo "- KPM Mode: ${{ inputs.kpm_mode }}"
            echo "- Optimization: ${{ inputs.optimize_level }}"
            echo "- Clean Build/No Ccache: ${{ inputs.clean_build && '✅ Yes' || '❌ No' }}"
            echo "- Create Release: ${{ inputs.make_release && '✅ Yes' || '❌ No' }}"
            echo ""
            echo "**SUSFS Configuration:**"
          } >> "$GITHUB_STEP_SUMMARY"

          declare -A susfs_map=(
            ["android12-5.10"]="${SUSFS_A12}"
            ["android13-5.15"]="${SUSFS_A13}"
            ["android14-6.1"]="${SUSFS_A14}"
            ["android15-6.6"]="${SUSFS_A15}"
            ["android16-6.12"]="${SUSFS_A16}"
          )

          for key in "android12-5.10" "android13-5.15" "android14-6.1" "android15-6.6" "android16-6.12"; do
            value="${susfs_map[$key]}"
            if [ -z "$value" ]; then
              echo "- ${key}: 🔄 auto (\`gki-${key}\`)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ${key}: 📌 \`${value}\`"           >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          {
            echo ""
            echo "> **💡 Note:** Empty values auto-map to matching \`gki-androidX-Y.Z\` branches."
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ inputs.op_model }}" == android*-*.* ]]; then
            {
              echo ""
              echo "> **⚠️ Android-Kernel Filter:** Only OOS15 and OOS16 devices will be built for \`${{ inputs.op_model }}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Parallel kernel builds
  # ─────────────────────────────────────────────────────────────
  build:
    name: "build (${{ matrix.model }}, ${{ matrix.os_version }}, ${{ matrix.android_version }}-${{ matrix.kernel_version }}, ${{ matrix.ksu_type }})"
    needs: set-op-model
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 30
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}
    steps:
      - name: 🧹 Emergency Disk Cleanup
        if: ${{ matrix.disk_cleanup }}
        run: |
          echo "::group::Disk Usage Before Cleanup"
          df -h
          echo "::endgroup::"
          echo "::group::Removing Unnecessary Software"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          if command -v docker >/dev/null 2>&1; then
            docker rmi $(docker images -q) 2>/dev/null || true
          fi
          echo "::endgroup::"
          echo "::group::Disk Usage After Cleanup"
          df -h
          echo "✅ Available space: $(df -h / | awk 'NR==2 {print $4}')"
          echo "::endgroup::"

      - name: Download Apache Arrow util_free_space.sh
        if: ${{ matrix.disk_cleanup }}
        run: |
          curl -fsSL -o util_free_space.sh \
            https://raw.githubusercontent.com/apache/arrow/main/ci/scripts/util_free_space.sh
          chmod +x util_free_space.sh
          ./util_free_space.sh

      - name: 🔍 Resolve SUSFS branch from inputs
        id: susfs
        shell: bash
        if: ${{ matrix.susfs }}
        env:
          SUSFS_A12: ${{ inputs.android12-5_10_susfs_branch_or_commit }}
          SUSFS_A13: ${{ inputs.android13-5_15_susfs_branch_or_commit }}
          SUSFS_A14: ${{ inputs.android14-6_1_susfs_branch_or_commit }}
          SUSFS_A15: ${{ inputs.android15-6_6_susfs_branch_or_commit }}
          SUSFS_A16: ${{ inputs.android16-6_12_susfs_branch_or_commit }}
        run: |
          set -euo pipefail
          key="${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          case "$key" in
            "android12-5.10") susfs_branch="${SUSFS_A12}" ;;
            "android13-5.15") susfs_branch="${SUSFS_A13}" ;;
            "android14-6.1")  susfs_branch="${SUSFS_A14}" ;;
            "android15-6.6")  susfs_branch="${SUSFS_A15}" ;;
            "android16-6.12") susfs_branch="${SUSFS_A16}" ;;
            *)
              echo "::error::Unsupported kernel version: $key"
              exit 1
              ;;
          esac
          if [ -z "$susfs_branch" ]; then
            echo "ℹ️  No custom SUSFS branch for $key — auto: gki-$key"
          else
            echo "✅ Using custom SUSFS branch: '$susfs_branch'"
          fi
          echo "susfs_branch=$susfs_branch" >> "$GITHUB_OUTPUT"

      - name: 📥 Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Minimal Dependencies
        timeout-minutes: 10
        run: |
          set -euo pipefail
          echo "::group::Install dependencies"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc \
            dos2unix kmod libdw-dev elfutils
          sudo apt-get clean
          echo "✅ Dependencies installed"
          echo "::endgroup::"

      - name: 📦 Disk usage (pre-build)
        run: |
          echo "::group::Disk usage pre-build"
          df -h /
          du -sh "$GITHUB_WORKSPACE" 2>/dev/null || true
          sudo rm -rf /tmp/* || true
          echo "::endgroup::"

      - name: ♻️ Configure ccache (bounded)
        if: ${{ inputs.clean_build != true }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "::group::ccache pre-configuration"
            ccache -o max_size="${CCACHE_MAX_SIZE}"
            ccache -o compression=true
            ccache -o compression_level=3
            ccache -s
            echo "::endgroup::"
          fi

      - name: 🧹 Prepare op_config_json (without KSU fields)
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m | del(.ksu_type, .ksu_hash)')" \
            >> "$GITHUB_OUTPUT"

      - name: 🔨 Build Kernel
        id: build
        timeout-minutes: 90
        uses: ./.github/actions
        with:
          op_config_json:              ${{ steps.prepare_config.outputs.config_json }}
          ksu_type:                    ${{ matrix.ksu_type }}
          ksu_branch_or_hash:          ${{ matrix.ksu_hash }}
          susfs_commit_hash_or_branch: ${{ steps.susfs.outputs.susfs_branch }}
          kpm_mode:                    ${{ inputs.kpm_mode }}
          optimize_level:              ${{ inputs.optimize_level }}
          clean:                       ${{ inputs.clean_build }}

      - name: Check build log presence
        if: failure()
        id: check_build_log
        shell: bash
        run: |
          if [ -n "${COMMON_KERNEL_FOLDER:-}" ] && [ -f "${COMMON_KERNEL_FOLDER}/build.log" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 📤 Upload build log on failure
        if: failure() && steps.check_build_log.outputs.found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: build-log-${{ matrix.model }}-${{ matrix.os_version }}-${{ github.run_attempt }}
          path: ${{ env.COMMON_KERNEL_FOLDER }}/build.log
          retention-days: 3

      - name: 📊 Build statistics
        id: build-stat
        if: always()
        run: |
          echo "::group::Build Statistics"
          echo "Device:     ${{ matrix.model }}"
          echo "OS Version: ${{ matrix.os_version }}"
          echo "Kernel:     ${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          echo "KPM Mode:   ${{ inputs.kpm_mode }}"
          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "SUSFS Branch: ${{ steps.susfs.outputs.susfs_branch }}"
          fi
          echo "Status: ${{ job.status }}"
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo ""
            echo "✅ Build completed successfully"
            echo "  - Kernel:   ${{ steps.build.outputs.kernel_version }}"
            echo "  - ReSukiSU: v${{ steps.build.outputs.ksu_version }}"
            echo "  - KPM Mode: ${{ inputs.kpm_mode }}"
            echo "ksu_version=${{ steps.build.outputs.ksu_version }}" >> "$GITHUB_OUTPUT"
            if [ "${{ matrix.susfs }}" = "true" ]; then
              echo "  - SUSFS: ${{ steps.build.outputs.susfs_version }}"
            fi
            echo "  - Build time: ${{ steps.build.outputs.build_time }}s"
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              echo "  - ccache hit rate:    ${{ steps.build.outputs.ccache_hit_rate }}"
              echo "  - ccache direct rate: ${{ steps.build.outputs.ccache_direct_rate }}"
            else
              echo "  - ccache: disabled (clean build)"
            fi
            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "  - Warnings: ${{ steps.build.outputs.warnings }}"
            fi
          else
            echo "❌ Build failed"
          fi
          echo "::endgroup::"

      - name: 📝 Job summary
        if: always()
        run: |
          STATUS_ICON=$( [ "${{ job.status }}" = "success" ] && echo "✅ Success" || echo "❌ Failed" )

          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ### ${{ matrix.model }} (${{ matrix.os_version }}) — ${STATUS_ICON}

          **Kernel:** ${{ matrix.android_version }}-${{ matrix.kernel_version }}
          **KPM Mode:** ${{ inputs.kpm_mode }}
          EOF

          if [ "${{ matrix.susfs }}" = "true" ]; then
            SUSFS_LABEL="${{ steps.susfs.outputs.susfs_branch }}"
            [ -z "$SUSFS_LABEL" ] && \
              SUSFS_LABEL="auto: gki-${{ matrix.android_version }}-${{ matrix.kernel_version }}"
            echo "**SUSFS Branch:** \`${SUSFS_LABEL}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" << EOF
          | Metric | Value |
          |--------|-------|
          | **Kernel** | ${{ steps.build.outputs.kernel_version }} |
          | **ReSukiSU** | v${{ steps.build.outputs.ksu_version }} |
          | **KPM Mode** | ${{ inputs.kpm_mode }} |
          EOF

            if [ "${{ matrix.susfs }}" = "true" ]; then
              echo "| **SUSFS** | ${{ steps.build.outputs.susfs_version }} |" \
                >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "| **Build Time** | ${{ steps.build.outputs.build_time }}s |" \
              >> "$GITHUB_STEP_SUMMARY"

            if [ "${{ inputs.clean_build }}" != "true" ]; then
              cat >> "$GITHUB_STEP_SUMMARY" << EOF
          | **ccache Hit Rate** | ${{ steps.build.outputs.ccache_hit_rate }} |
          | **ccache Direct Rate** | ${{ steps.build.outputs.ccache_direct_rate }} |
          EOF
            fi

            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "| **Warnings** | ${{ steps.build.outputs.warnings }} |" \
                >> "$GITHUB_STEP_SUMMARY"
            fi

            echo ""                                                                   >> "$GITHUB_STEP_SUMMARY"
            echo "**SHA256:** \`${{ steps.build.outputs.image_sha256 }}\`"           >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 🧹 Final cleanup and space report
        if: always()
        run: |
          echo "::group::Cleanup"
          sudo rm -rf \
            "$GITHUB_WORKSPACE/out"        \
            "$GITHUB_WORKSPACE/build"      \
            "$GITHUB_WORKSPACE/kernel/out" \
            "$GITHUB_WORKSPACE/.repo"      \
            /tmp/*                         \
            || true
          if command -v ccache >/dev/null 2>&1; then
            echo ""
            echo "📊 ccache statistics after build:"
            ccache -s
            echo "💾 ccache preserved for next build"
          fi
          echo ""
          echo "💽 Final disk usage:"
          df -h /
          echo "::endgroup::"

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — GitHub Release (conditional on make_release)
  # ─────────────────────────────────────────────────────────────
  trigger-release:
    needs: [set-op-model, build]
    runs-on: ubuntu-latest
    if: ${{ inputs.make_release }}
    env:
      REPO_OWNER:         ${{ github.repository_owner }}
      REPO_NAME:          ${{ github.event.repository.name }}
      GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME:       'OnePlus Kernels With ReSukiSU & SUSFS v2.1.0'
      SUSFS_BASE_VERSION: 'v2.1.0'
      KSU_NORMALIZED:     ${{ needs.set-op-model.outputs.ksu_normalized }}
      FEATURE_INDEX:      ${{ needs.set-op-model.outputs.feature_index }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🏷️ Generate and Create New Tag
        run: |
          set -euo pipefail

          BASE_TAG="$SUSFS_BASE_VERSION-r0"
          LATEST_TAG=$(gh api "repos/$REPO_OWNER/$REPO_NAME/tags" --jq '.[0].name // empty')

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="$BASE_TAG"
          else
            LATEST_TAG=$(printf "%s\n%s\n" "$LATEST_TAG" "$BASE_TAG" | sort -rV | head -n1)
          fi

          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{
            suffix = ($2 == "" ? 0 : $2) + 1
            printf "%s-r%d", $1, suffix
          }')

          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> "$GITHUB_ENV"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./downloaded-artifacts

      - name: 📝 Generate Device List and Final Release Notes
        id: generate-notes
        env:
          SUSFS_A12: ${{ inputs.android12-5_10_susfs_branch_or_commit }}
          SUSFS_A13: ${{ inputs.android13-5_15_susfs_branch_or_commit }}
          SUSFS_A14: ${{ inputs.android14-6_1_susfs_branch_or_commit }}
          SUSFS_A15: ${{ inputs.android15-6_6_susfs_branch_or_commit }}
          SUSFS_A16: ${{ inputs.android16-6_12_susfs_branch_or_commit }}
        run: |
          set -euo pipefail
          echo "=== Building release notes ==="

          declare -A device_info

          FEATURE_INDEX_DATA="${FEATURE_INDEX}"

          while IFS= read -r -d '' file; do
            [ -f "$file" ] || continue
            full_model=$(basename "$file" .txt)
            model=$(echo "$full_model" | sed -E 's/_[^_]*$//')

            kernel_version="" os_version="" ksu_type="" ksu_ver="" susfs_ver=""
            {
              read -r kernel_version || true
              read -r os_version     || true
              read -r ksu_type       || true
              read -r ksu_ver        || true
              read -r susfs_ver      || true
            } < "$file"

            ksu_type="${ksu_type:-ReSukiSU}"
            ksu_ver="${ksu_ver:-unknown}"
            susfs_ver="${susfs_ver:-unknown}"

            device_info["$full_model"]="$model|$os_version|$kernel_version|$ksu_type|$ksu_ver|$susfs_ver"
          done < <(find downloaded-artifacts -name "*.txt" -print0 | sort -z)

          if [ ${#device_info[@]} -eq 0 ]; then
            echo "::error::No device info found in artifacts!"
            exit 1
          fi

          resukisu_hash=$(echo "$KSU_NORMALIZED" | \
            jq -r 'map(select(.type == "RESUKISU")) | first | .hash // "(auto)"')

          [ -z "$SUSFS_A12" ] && SUSFS_A12="gki-android12-5.10 (auto)"
          [ -z "$SUSFS_A13" ] && SUSFS_A13="gki-android13-5.15 (auto)"
          [ -z "$SUSFS_A14" ] && SUSFS_A14="gki-android14-6.1 (auto)"
          [ -z "$SUSFS_A15" ] && SUSFS_A15="gki-android15-6.6 (auto)"
          [ -z "$SUSFS_A16" ] && SUSFS_A16="gki-android16-6.12 (auto)"

          first_entry=$(printf '%s\n' "${!device_info[@]}" | sort | head -n1)
          IFS='|' read -r _ _ _ _ ksu_ver_global _ <<< "${device_info[$first_entry]}"

          # ── Count devices per kernel generation & detect HMBIRD ──────
          declare -A kernel_gen_count
          declare -A kernel_gen_hmbird

          for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
            IFS='|' read -r model os_ver kernel_ver _ _ _ <<< "${device_info[$full_key]}"
            kv_short=$(echo "$kernel_ver" | grep -oE '[0-9]+\.[0-9]+' | head -n1)
            av_short=$(echo "$kernel_ver" | grep -oE '^android[0-9]+' | head -n1)
            gen_key="${av_short}-${kv_short}"
            kernel_gen_count["$gen_key"]=$(( ${kernel_gen_count["$gen_key"]:-0} + 1 ))

            has_hmbird=$(echo "$FEATURE_INDEX_DATA" | \
              jq -r --arg M "$model" --arg O "$os_ver" \
              'to_entries[]
               | select(.value.model == $M and .value.os_version == $O)
               | .value.feature_flags[]
               | select(. == "🐦 HMBIRD")' 2>/dev/null | head -n1 || echo "")
            [ -n "$has_hmbird" ] && kernel_gen_hmbird["$gen_key"]="✅" || true
          done

          # ── Helper: emit one grouped table section ───────────────────
          emit_group() {
            local group_name="$1"
            local prefix_pattern="$2"
            local header_emoji="$3"

            local rows=()
            for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
              IFS='|' read -r model os_ver kernel_ver _ _ _ <<< "${device_info[$full_key]}"
              echo "$model" | grep -qiE "$prefix_pattern" || continue

              hmbird_flag=$(echo "$FEATURE_INDEX_DATA" | \
                jq -r --arg M "$model" --arg O "$os_ver" \
                'to_entries[]
                 | select(.value.model == $M and .value.os_version == $O)
                 | .value.feature_flags[]
                 | select(. == "🐦 HMBIRD")' 2>/dev/null | head -n1 || echo "")

              kernel_display="$kernel_ver"
              [ -n "$hmbird_flag" ] && kernel_display="🐦 $kernel_ver"

              rows+=("$(printf "| %-20s | %-10s | %s |" \
                "$model" "$os_ver" "$kernel_display")")
            done

            if [ ${#rows[@]} -gt 0 ]; then
              echo ""
              echo "### ${header_emoji} ${group_name}"
              echo ""
              echo "| Model | OOS Version | Kernel |"
              echo "|---|---|---|"
              for row in "${rows[@]}"; do
                echo "$row"
              done
            fi
          }

          # ── Begin writing release_notes.md ───────────────────────────
          cat > release_notes.md << EOF
          # 🎯 OnePlus Kernels — ReSukiSU & SUSFS ${SUSFS_BASE_VERSION}

          > **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          > **Build ID:** \`${{ github.run_id }}\`
          > **Workflow:** [\`${{ github.workflow }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          > **Total Devices:** ${#device_info[@]} configurations across 5 kernel generations

          ---

          ## ⚡ What's Inside

          Every kernel in this release ships with a unified feature set:

          | Feature | Description |
          |---|---|
          | ඞ **SusFS ${SUSFS_BASE_VERSION}** | Advanced filesystem-level hiding — makes root invisible to banking apps & anti-cheat |
          | 🚀 **BBR** | Google's TCP congestion control — better throughput & lower latency |
          | 🛡️ **BBG** | BBR variant tuned for mobile networks |
          | ⏱️ **TTL** | TTL packet manipulation — bypasses tethering detection |
          | 🔧 **IP_SET** | Advanced IP list management for iptables/nftables firewall rules |
          | 🐦 **HMBIRD** | *(kernel 6.6+ only)* Qualcomm/MediaTek task scheduler — improves responsiveness & thermals |

          ---

          ## 🔧 Build Configuration

          | Component | Version / Setting |
          |---|---|
          | **ReSukiSU Branch** | \`${resukisu_hash}\` |
          | **ReSukiSU Version** | \`v${ksu_ver_global}\` |
          | **KPM Mode** | \`${{ inputs.kpm_mode }}\` |
          | **SUSFS Version** | \`${SUSFS_BASE_VERSION}\` |
          | **Optimization Level** | \`${{ inputs.optimize_level }}\` |
          | **Clean Build** | $( [ "${{ inputs.clean_build }}" = "true" ] && echo "✅ Yes (no ccache)" || echo "❌ No (ccache enabled)" ) |
          | **Compiler** | Clang (version varies by device) |

          ### 📌 SUSFS Branch Mapping

          | Android / Kernel | SUSFS Branch |
          |---|---|
          | android12 — 5.10 | \`${SUSFS_A12}\` |
          | android13 — 5.15 | \`${SUSFS_A13}\` |
          | android14 — 6.1  | \`${SUSFS_A14}\` |
          | android15 — 6.6  | \`${SUSFS_A15}\` |
          | android16 — 6.12 | \`${SUSFS_A16}\` |

          ---

          ## 📱 Built Devices (${#device_info[@]} total)

          > 🐦 = includes HMBIRD scheduler  |  All entries include: ඞ SusFS 🚀 BBR 🛡️ BBG ⏱️ TTL 🔧 IP_SET
          EOF

          # ── Emit grouped sections ────────────────────────────────────
          emit_group "ACE Series"                    "^OP-ACE|^OP_ACE"                    "🔴" >> release_notes.md
          emit_group "Nord Series"                   "^OP-NORD|^OP_NORD"                  "🔵" >> release_notes.md
          emit_group "Flagship Series (OP10 → OP15)" "^OP1[0-9]|^OP[0-9]"               "🟢" >> release_notes.md
          emit_group "Open & PAD Series"             "^OP-OPEN|^OP-PAD|^OP_OPEN|^OP_PAD" "🟡" >> release_notes.md

          # ── Coverage summary table ───────────────────────────────────
          cat >> release_notes.md << 'COVERAGE_EOF'

          ---

          ## 📊 Coverage Summary

          | Kernel Generation | Android Base | Devices | HMBIRD |
          |---|---|---|---|
          COVERAGE_EOF

          for gen_key in "android12-5.10" "android13-5.15" "android14-6.1" "android15-6.6" "android16-6.12"; do
            count="${kernel_gen_count[$gen_key]:-0}"
            hmbird="${kernel_gen_hmbird[$gen_key]:-❌}"
            [ "$count" -eq 0 ] && continue
            av="${gen_key%%-*}"
            kv="${gen_key##*-}"
            av_display=$(echo "$av" | sed 's/android/Android /')
            printf "| %-6s | %-12s | %-7s | %-6s |\n" \
              "${kv}.x" "$av_display" "$count" "$hmbird" >> release_notes.md
          done

          # ── Installation & root stack ────────────────────────────────
          cat >> release_notes.md << EOF

          ---

          ## 📥 Installation

          > ⚠️ **Always back up your data before flashing a custom kernel.**

          1. Download the \`.zip\` for your exact model + OOS version combination
          2. Boot into recovery (e.g. TWRP or OrangeFox)
          3. Flash the kernel zip
          4. Reboot — ReSukiSU Manager will be available to install via the KSU app

          ---

          ## 🔐 Root & Security Stack

          - **ReSukiSU v${ksu_ver_global}** — Kernel-level root by the SukiSaku Project. More stable and stealthier than Magisk for supported GKI devices.
          - **SUSFS ${SUSFS_BASE_VERSION}** — Filesystem-level spoofing that hides root mounts, \`/proc\` entries, and kernel modifications from userspace detection.
          - **KPM (Kernel Patch Module)** — Allows dynamic kernel patching without reflashing, enabling modular extensions post-boot.

          ---

          ## 💝 Donations

          Any and all donations are appreciated!

          PayPal: [paypal.me/fatalcoder524](https://paypal.me/fatalcoder524)

          ---

          **⚡ Built with ❤️ by the community**
          EOF

          echo "✅ release_notes.md generated ($(wc -l < release_notes.md) lines)"

      - name: 🚀 Create GitHub Release
        run: |
          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft

      - name: 📤 Upload Release Assets Dynamically
        run: |
          set -euo pipefail
          uploaded=0
          failed=0

          mapfile -t zip_files < <(find ./downloaded-artifacts -name "*.zip" | sort)

          if [ ${#zip_files[@]} -eq 0 ]; then
            echo "::warning::No ZIP files found in downloaded-artifacts!"
            exit 0
          fi

          echo "Found ${#zip_files[@]} ZIP file(s) to upload:"
          for f in "${zip_files[@]}"; do
            echo "  - $(basename "$f") ($(numfmt --to=iec-i --suffix=B "$(stat -c%s "$f")"))"
          done
          echo ""

          for file in "${zip_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::warning::File not found (skipping): $file"
              failed=$((failed + 1))
              continue
            fi
            name="$(basename "$file")"
            echo "⬆️  Uploading: $name"
            if gh release upload "${{ env.NEW_TAG }}" "$file" \
                 --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
                 --clobber; then
              echo "   ✅ OK"
              uploaded=$((uploaded + 1))
            else
              echo "::warning::Failed to upload: $name"
              failed=$((failed + 1))
            fi
          done

          echo ""
          echo "📊 Upload summary: ✅ $uploaded uploaded | ⚠️ $failed failed"

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed file(s) failed to upload"
            exit 1
          fi

      - name: 📊 Release summary
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ---

          ## 🎉 Release Created Successfully

          **Tag:** [\`${{ env.NEW_TAG }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})
          **Status:** Draft — publish manually when ready
          **Kernels:** $(find ./downloaded-artifacts -name "*.zip" | wc -l)

          ### 📦 Assets
          EOF

          while IFS= read -r -d '' zip; do
            [ -f "$zip" ] || continue
            name=$(basename "$zip")
            size_mb=$(awk "BEGIN { printf \"%.2f\", $(stat -c%s "$zip") / 1048576 }")
            echo "- \`$name\` (${size_mb} MB)" >> "$GITHUB_STEP_SUMMARY"
          done < <(find ./downloaded-artifacts -name "*.zip" -print0 | sort -z)
