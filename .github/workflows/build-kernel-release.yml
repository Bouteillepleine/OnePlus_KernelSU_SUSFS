name: Build and Release OnePlus Kernels

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CCACHE_MAX_SIZE: '2G'

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false

      op_model:
        description: 'Select the OnePlus kernels to build'
        required: true
        type: choice
        options:
          - OOS14+15+16
          - OOS15+16
          - OOS14+15
          - OOS16
          - OOS15
          - OOS14
          - android16-6.12
          - android15-6.6
          - android14-6.1
          - android13-5.15
          - android12-5.10
        default: OOS14+15+16

      resukisu_ref:
        description: 'ReSukiSU branch, tag, or commit hash'
        required: true
        type: string
        default: main

      kpm_mode:
        description: 'KPM mode for ReSukiSU'
        required: true
        type: choice
        options:
          - KPM
          - KP
          - NONE
        default: NONE

      optimize_level:
        description: 'Compiler optimization level'
        required: true
        type: choice
        options:
          - O2
          - O3
        default: O2

      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false

      android12-5_10_susfs_branch_or_commit:
        description: 'Enter SusFS branch or commit hash for android12-5.10'
        type: string
        default: ''

      android13-5_15_susfs_branch_or_commit:
        description: 'Enter SusFS branch or commit hash for android13-5.15'
        type: string
        default: ''

      android14-6_1_susfs_branch_or_commit:
        description: 'Enter SusFS branch or commit hash for android14-6.1'
        type: string
        default: ''

      android15-6_6_susfs_branch_or_commit:
        description: 'Enter SusFS branch or commit hash for android15-6.6'
        type: string
        default: ''

      android16-6_12_susfs_branch_or_commit:
        description: 'Enter SusFS branch or commit hash for android16-6.12'
        type: string
        default: ''

jobs:
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_count: ${{ steps.set-matrix.outputs.count }}
      active_gki_keys: ${{ steps.set-matrix.outputs.active_gki_keys }}
      susfs_hash_android12_5_10: ${{ steps.set-matrix.outputs.susfs_hash_android12_5_10 }}
      susfs_hash_android13_5_15: ${{ steps.set-matrix.outputs.susfs_hash_android13_5_15 }}
      susfs_hash_android14_6_1: ${{ steps.set-matrix.outputs.susfs_hash_android14_6_1 }}
      susfs_hash_android15_6_6: ${{ steps.set-matrix.outputs.susfs_hash_android15_6_6 }}
      susfs_hash_android16_6_12: ${{ steps.set-matrix.outputs.susfs_hash_android16_6_12 }}
      resukisu_resolved_hash: ${{ steps.set-matrix.outputs.resukisu_resolved_hash }}
      resukisu_ref_normalized: ${{ steps.set-matrix.outputs.resukisu_ref_normalized }}

    env:
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600

    steps:
      - name: 📥 Checkout Code (to access configs/)
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            configs/
          sparse-checkout-cone-mode: false

      - name: 🔍 Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Matrix generation"

          input="${{ github.event.inputs.op_model }}"
          resukisu_ref_raw="${{ github.event.inputs.resukisu_ref }}"
          resukisu_ref="${resukisu_ref_raw:-main}"

          echo "resukisu_ref_normalized=$resukisu_ref" >> "$GITHUB_OUTPUT"

          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i + 1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json

          jq_filter="."
          case "$input" in
            OOS14+15+16) ;;
            OOS15+16) jq_filter='map(select(.os_version == "OOS15" or .os_version == "OOS16"))' ;;
            OOS14+15) jq_filter='map(select(.os_version == "OOS14" or .os_version == "OOS15"))' ;;
            OOS16) jq_filter='map(select(.os_version == "OOS16"))' ;;
            OOS15) jq_filter='map(select(.os_version == "OOS15"))' ;;
            OOS14) jq_filter='map(select(.os_version == "OOS14"))' ;;
            android*-*.*)
              IFS='-' read -r av kv <<< "$input"
              jq_filter="map(select(.android_version == \"$av\" and .kernel_version == \"$kv\"))"
              echo "ℹ️ Android-Kernel filter: $av-$kv"
              ;;
            *)
              echo "::warning::Unknown input '$input'. Using empty filter."
              jq_filter='map(select(false))'
              ;;
          esac

          filtered=$(jq -c "$jq_filter" matrix.json)
          count=$(jq 'length' <<< "$filtered")

          if [ "$count" -eq 0 ]; then
            echo "::error::No config files found for input '$input'!"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi

          merged_matrix=$(jq -n \
            --argjson devices "$filtered" \
            --arg ref "$resukisu_ref" \
            '[ $devices[] | . + {resukisu_ref: $ref} ]')

          final_count=$(echo "$merged_matrix" | jq 'length')
          echo "✅ Found $final_count build(s)"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version), ReSukiSU - \(.resukisu_ref))"' \
            <<< "$merged_matrix"

          echo "count=$final_count" >> "$GITHUB_OUTPUT"

          KSU_REPO_OWNER="ReSukiSU"
          KSU_REPO_NAME="ReSukiSU"
          HEAD_REF="refs/heads/${resukisu_ref}"
          TAG_REF="refs/tags/${resukisu_ref}"

          QUERY='query($owner: String!, $name: String!, $headRef: String!, $tagRef: String!, $objRef: String!) {
            repository(owner: $owner, name: $name) {
              hb: ref(qualifiedName: $headRef) { t: target { ... on Commit { o: oid } } }
              ht: ref(qualifiedName: $tagRef)  { t: target { ... on Commit { o: oid } } }
              ho: object(expression: $objRef)  { ... on Commit { o: oid } }
            }
          }'

          MAX_RETRIES=3
          RETRY_COUNT=0
          RETRY_DELAY=5

          echo "Resolving ReSukiSU hash ($resukisu_ref)..."
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            RESULT=$(gh api graphql \
              -f query="$QUERY" \
              -f owner="$KSU_REPO_OWNER" \
              -f name="$KSU_REPO_NAME" \
              -f headRef="$HEAD_REF" \
              -f tagRef="$TAG_REF" \
              -f objRef="$resukisu_ref" 2>/dev/null) && break
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "::warning::GitHub API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying..."
            sleep $RETRY_DELAY
          done

          if [ -z "${RESULT:-}" ]; then
            echo "::error::GitHub API unreachable. Cannot validate '$resukisu_ref'"
            exit 1
          fi

          resolved_sha=$(echo "$RESULT" | jq -r '.data.repository | (.hb.t.o // .ht.t.o // .ho.o // "unknown")')

          if [ "$resolved_sha" = "unknown" ]; then
            echo "::error::Ref '$resukisu_ref' not found in $KSU_REPO_OWNER/$KSU_REPO_NAME"
            exit 1
          fi

          echo "✅ Resolved: ReSukiSU/$resukisu_ref → $resolved_sha"
          echo "resukisu_resolved_hash=$resolved_sha" >> "$GITHUB_OUTPUT"

          merged_matrix=$(echo "$merged_matrix" | jq --arg sha "$resolved_sha" 'map(.resukisu_resolved_hash = $sha)')

          PROJECT_ID="simonpunk%2fsusfs4ksu"

          declare -A default_branches=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )

          declare -A user_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )

          mapfile -t active_keys < <(
            echo "$merged_matrix" \
              | jq -r '.[] | select(.susfs == true) | "\(.android_version)-\(.kernel_version)"' \
              | sort -u
          )

          echo "🔍 Resolving SUSFS hashes for: ${active_keys[*]:-none}"
          declare -A susfs_hashes

          for key in "${active_keys[@]}"; do
            default_val="${default_branches[$key]}"
            user_val="${user_inputs[$key]:-$default_val}"

            MAX_RETRIES=3
            RETRY_COUNT=0
            RETRY_DELAY=5
            resolved=""

            until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
              RESULT=$(curl -fsSL \
                "https://gitlab.com/api/v4/projects/${PROJECT_ID}/repository/commits/${user_val}") && break
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "::warning::GitLab API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying..."
              sleep $RETRY_DELAY
            done

            if [ -n "${RESULT:-}" ]; then
              resolved=$(echo "$RESULT" | jq -r '.id')
            fi

            if [ -z "$resolved" ] || [ "$resolved" = "null" ]; then
              echo "::error::Could not resolve SUSFS ref '$user_val' for $key"
              exit 1
            fi

            echo "✅ $key → $resolved"
            susfs_hashes["$key"]="$resolved"
          done

          active_gki_keys_csv=$(IFS=','; echo "${active_keys[*]:-}")
          echo "active_gki_keys=$active_gki_keys_csv" >> "$GITHUB_OUTPUT"

          echo "susfs_hash_android12_5_10=${susfs_hashes[android12-5.10]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android13_5_15=${susfs_hashes[android13-5.15]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android14_6_1=${susfs_hashes[android14-6.1]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android15_6_6=${susfs_hashes[android15-6.6]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android16_6_12=${susfs_hashes[android16-6.12]:-unknown}" >> "$GITHUB_OUTPUT"

          susfs_hashes_json=$(jq -n \
            --arg a12 "${susfs_hashes[android12-5.10]:-unknown}" \
            --arg a13 "${susfs_hashes[android13-5.15]:-unknown}" \
            --arg a14 "${susfs_hashes[android14-6.1]:-unknown}" \
            --arg a15 "${susfs_hashes[android15-6.6]:-unknown}" \
            --arg a16 "${susfs_hashes[android16-6.12]:-unknown}" \
            '{"android12-5.10":$a12,"android13-5.15":$a13,"android14-6.1":$a14,"android15-6.6":$a15,"android16-6.12":$a16}')

          merged_matrix=$(echo "$merged_matrix" | jq \
            --argjson hashes "$susfs_hashes_json" \
            '[.[] | . + {susfs_resolved_hash: ($hashes["\(.android_version)-\(.kernel_version)"] // "unknown")}]')

          echo "$merged_matrix" > matrix.json

          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Upload build matrix
        uses: actions/upload-artifact@v5
        with:
          name: build-matrix
          path: matrix.json
          retention-days: 7

      - name: 📊 Build plan summary
        shell: bash
        run: |
          set -euo pipefail

          resukisu_ref="${{ steps.set-matrix.outputs.resukisu_ref_normalized }}"
          resolved="${{ steps.set-matrix.outputs.resukisu_resolved_hash }}"

          if [[ "$resukisu_ref" =~ ^[0-9a-f]{40}$ ]]; then
            resukisu_display="$resukisu_ref"
          else
            resukisu_display="$resukisu_ref ($resolved)"
          fi

          {
            echo "## 🎯 Build Plan"
            echo ""
            echo "**Target:** ${{ inputs.op_model }}"
            echo "**Devices:** ${{ steps.set-matrix.outputs.count }}"
            echo ""
            echo "**Configuration:**"
            echo "- ReSukiSU Config: \`${resukisu_display}\`"
            echo "- KPM Mode: ${{ inputs.kpm_mode }}"
            echo "- Optimization: ${{ inputs.optimize_level }}"
            echo "- Clean Build/No Ccache: ${{ inputs.clean_build && '✅ Yes' || '❌ No' }}"
            echo "- Create Release: ${{ inputs.make_release && '✅ Yes' || '❌ No' }}"
            echo ""
            echo "**SUSFS Configuration:**"
          } >> "$GITHUB_STEP_SUMMARY"

          declare -A susfs_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )

          for key in "android12-5.10" "android13-5.15" "android14-6.1" "android15-6.6" "android16-6.12"; do
            value="${susfs_inputs[$key]}"
            if [ -z "$value" ]; then
              echo "- ${key}: 🔄 auto (\`gki-${key}\`)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ${key}: 📌 \`${value}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          {
            echo ""
            echo "> **💡 Note:** Empty values auto-map to matching \`gki-androidX-Y.Z\` branches."
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build (${{ matrix.model }}, ${{ matrix.os_version }}, ${{ matrix.android_version }}-${{ matrix.kernel_version }}, ReSukiSU)
    needs: set-op-model
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}

    steps:
      - name: 🧹 Emergency Disk Cleanup
        if: ${{ matrix.disk_cleanup }}
        run: |
          echo "::group::Disk Usage Before Cleanup"
          df -h
          echo "::endgroup::"
          echo "::group::Removing Unnecessary Software"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          if command -v docker >/dev/null 2>&1; then
            docker rmi $(docker images -q) 2>/dev/null || true
          fi
          echo "::endgroup::"
          echo "::group::Disk Usage After Cleanup"
          df -h
          echo "::endgroup::"

      - name: Download Apache Arrow's util_free_space.sh
        if: ${{ matrix.disk_cleanup }}
        run: |
          curl -L -o util_free_space.sh \
            https://raw.githubusercontent.com/apache/arrow/main/ci/scripts/util_free_space.sh
          chmod +x util_free_space.sh
          ./util_free_space.sh

      - name: 📥 Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Minimal Dependencies
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Install dependencies"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc \
            dos2unix kmod libdw-dev elfutils
          sudo apt-get clean
          echo "✅ Dependencies installed"
          echo "::endgroup::"

      - name: 📦 Disk usage (pre-build)
        run: |
          echo "::group::Disk usage pre-build"
          df -h /
          du -sh "$GITHUB_WORKSPACE" 2>/dev/null || true
          sudo rm -rf /tmp/* || true
          echo "::endgroup::"

      - name: ♻️ Configure ccache (bounded)
        if: ${{ inputs.clean_build != true }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "::group::ccache configuration"
            ccache -o max_size="${CCACHE_MAX_SIZE}"
            ccache -o compression=true
            ccache -o compression_level=3
            ccache -s
            echo "::endgroup::"
          fi

      - name: 🧹 Prepare op_config_json
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc \
            --argjson m '${{ toJSON(matrix) }}' \
            '$m | del(.resukisu_ref, .resukisu_resolved_hash, .susfs_resolved_hash)')" \
            >> "$GITHUB_OUTPUT"

      - name: 🔨 Build Kernel (ReSukiSU)
        id: build
        uses: ./.github/actions
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          ksu_branch_or_hash: ${{ matrix.resukisu_resolved_hash }}
          susfs_commit_hash_or_branch: ${{ matrix.susfs_resolved_hash }}
          kpm_mode: ${{ inputs.kpm_mode }}
          optimize_level: ${{ inputs.optimize_level }}
          clean: ${{ inputs.clean_build }}

      - name: 📊 Build statistics
        id: build-stat
        if: always()
        shell: bash
        run: |
          echo "::group::Build Statistics"
          echo "Device    : ${{ matrix.model }}"
          echo "OS Version: ${{ matrix.os_version }}"
          echo "Kernel    : ${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          echo "KSU Type  : ReSukiSU"
          echo "KPM Mode  : ${{ inputs.kpm_mode }}"
          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "SUSFS Hash: ${{ matrix.susfs_resolved_hash }}"
          fi
          echo "Status    : ${{ job.status }}"
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo ""
            echo "✅ Build completed successfully"
            echo "  - Kernel    : ${{ steps.build.outputs.kernel_version }}"
            echo "  - ReSukiSU  : ${{ steps.build.outputs.ksu_version }}"
            echo "  - KPM Mode  : ${{ inputs.kpm_mode }}"
            if [ "${{ matrix.susfs }}" = "true" ]; then
              echo "  - SUSFS     : ${{ steps.build.outputs.susfs_version }}"
            fi
            echo "  - Build time: ${{ steps.build.outputs.build_time }}s"
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              echo "  - ccache hit: ${{ steps.build.outputs.ccache_hit_rate }}"
            fi
          else
            echo "❌ Build failed"
          fi
          echo "::endgroup::"

      - name: 📝 Job summary
        if: always()
        shell: bash
        run: |
          STATUS_ICON=$( [ "${{ job.status }}" = "success" ] \
            && echo "✅ Success" || echo "❌ Failed" )

          {
            echo ""
            echo "### ${{ matrix.model }} (${{ matrix.os_version }}) — ${STATUS_ICON}"
            echo ""
            echo "**Kernel:** ${{ matrix.android_version }}-${{ matrix.kernel_version }}"
            echo "**KPM Mode:** ${{ inputs.kpm_mode }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "**SUSFS Hash:** \`${{ matrix.susfs_resolved_hash }}\`" \
              >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            {
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| **Kernel** | ${{ steps.build.outputs.kernel_version }} |"
              echo "| **ReSukiSU** | v${{ steps.build.outputs.ksu_version }} |"
              echo "| **KPM Mode** | ${{ inputs.kpm_mode }} |"
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "${{ matrix.susfs }}" = "true" ]; then
              echo "| **SUSFS** | ${{ steps.build.outputs.susfs_version }} |" \
                >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "| **Build Time** | ${{ steps.build.outputs.build_time }}s |" \
              >> "$GITHUB_STEP_SUMMARY"

            if [ "${{ inputs.clean_build }}" != "true" ]; then
              {
                echo "| **ccache Hit Rate** | ${{ steps.build.outputs.ccache_hit_rate }} |"
                echo "| **ccache Direct Rate** | ${{ steps.build.outputs.ccache_direct_rate }} |"
              } >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "| **Warnings** | ${{ steps.build.outputs.warnings }} |" \
                >> "$GITHUB_STEP_SUMMARY"
            fi

            {
              echo ""
              echo "**SHA256:** \`${{ steps.build.outputs.image_sha256 }}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 🧹 Final cleanup and space report
        if: always()
        shell: bash
        run: |
          echo "::group::Cleanup"
          sudo rm -rf \
            "$GITHUB_WORKSPACE/out" \
            "$GITHUB_WORKSPACE/build" \
            "$GITHUB_WORKSPACE/kernel/out" \
            "$GITHUB_WORKSPACE/.repo" \
            /tmp/* || true
          if command -v ccache >/dev/null 2>&1; then
            echo "📊 ccache statistics after build:"
            ccache -s
            echo "💾 ccache preserved for next build"
          fi
          echo "💽 Final disk usage:"
          df -h /
          echo "::endgroup::"

  # ── FIX #1 : indentation correcte à 2 espaces sous jobs: ────────────────
  trigger-release:
    needs:
      - set-op-model
      - build
    runs-on: ubuntu-latest
    if: ${{ inputs.make_release }}

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: '* OnePlus Kernels With ReSukiSU & SUSFS v2.1.0 *'
      SUSFS_BASE_VERSION: 'v2.1.0'

    steps:      
    
      - name: 🔐 Validate release token
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GITHUB_TOKEN is not available — check workflow permissions"
            exit 1
          fi
          echo "✅ Release token present (${#GH_TOKEN} chars)"

      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🔐 Validate release token
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_RELEASE_TOKEN is not set!"
            echo "::error::Add it via: Settings → Secrets → Actions → New repository secret"
            exit 1
          fi
          echo "✅ Release token present (${#GH_TOKEN} chars)"

      - name: 🏷️ Generate and Create New Tag
        shell: bash
        run: |
          set -euo pipefail

          LATEST_TAG=$(gh api "repos/$REPO_OWNER/$REPO_NAME/tags?per_page=100" \
            --jq '.[].name' 2>/dev/null \
            | grep -E "^${SUSFS_BASE_VERSION}-r[0-9]+$" \
            | sort -V | tail -n1 || true)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="${SUSFS_BASE_VERSION}-r0"
          fi

          CURRENT_NUM=$(echo "$LATEST_TAG" | grep -oE '[0-9]+$')
          NEW_NUM=$(( ${CURRENT_NUM:-0} + 1 ))
          NEW_TAG="${SUSFS_BASE_VERSION}-r${NEW_NUM}"

          echo "Latest tag : $LATEST_TAG"
          echo "New tag    : $NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_ENV"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO_OWNER}/${REPO_NAME}.git"

          if git ls-remote --tags origin "refs/tags/$NEW_TAG" \
              | grep -q "refs/tags/$NEW_TAG$"; then
            echo "::error::Tag $NEW_TAG already exists on remote"
            exit 1
          fi

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "✅ Tag $NEW_TAG pushed"

      - name: 📥 Download matrix artifact
        uses: actions/download-artifact@v5
        with:
          name: build-matrix
          path: ./downloaded-artifacts

      - name: 📥 Download kernel artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./downloaded-artifacts
          merge-multiple: true
          pattern: kernel-*

      - name: 📝 Generate Release Notes
        id: generate-notes
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Building release notes ==="

          [ -f ./downloaded-artifacts/matrix.json ] \
            || { echo "::error::matrix.json missing"; exit 1; }

          declare -A device_info
          JSON_BUILD_DATA=$(jq -c '.' ./downloaded-artifacts/matrix.json)

          for file in ./downloaded-artifacts/*.zip; do
            [ -f "$file" ] || continue
            zipname=$(basename "$file" .zip)
            rest="${zipname#AK3_}"
            IFS='_' read -ra parts <<< "$rest"

            model="${parts[0]}"
            os_version="${parts[1]}"
            kernel_version="${parts[2]}"
            resukisu_ver="${parts[4]}"

            if [ "${parts[5]:-}" = "SuSFS" ]; then
              susfs_ver="${parts[6]:-unknown}"
              kpm_tag="${parts[7]:-NONE}"
            else
              susfs_ver="none"
              kpm_tag="${parts[5]:-NONE}"
            fi

            full_model="${model}_${os_version}"
            device_info["$full_model"]="$model|$os_version|$kernel_version|${parts[3]}|$resukisu_ver|$susfs_ver|$kpm_tag"
          done

          resukisu_ref="${{ needs.set-op-model.outputs.resukisu_ref_normalized }}"
          resukisu_resolved_hash="${{ needs.set-op-model.outputs.resukisu_resolved_hash }}"
          KPM_MODE="${{ inputs.kpm_mode }}"
          OPTIMIZE_LEVEL="${{ inputs.optimize_level }}"
          CLEAN_BUILD="${{ inputs.clean_build }}"

          declare -A susfs_map=(
            ["android12-5.10"]="${{ needs.set-op-model.outputs.susfs_hash_android12_5_10 }}"
            ["android13-5.15"]="${{ needs.set-op-model.outputs.susfs_hash_android13_5_15 }}"
            ["android14-6.1"]="${{ needs.set-op-model.outputs.susfs_hash_android14_6_1 }}"
            ["android15-6.6"]="${{ needs.set-op-model.outputs.susfs_hash_android15_6_6 }}"
            ["android16-6.12"]="${{ needs.set-op-model.outputs.susfs_hash_android16_6_12 }}"
          )

          IFS=',' read -ra active_gki_keys \
            <<< "${{ needs.set-op-model.outputs.active_gki_keys }}"

          # ── FIX #2 : génération du MD entièrement via printf (0 heredoc indenté) ──
          {
            printf '# ⚡ OnePlus Kernels with ReSukiSU & SUSFS %s\n\n' "$SUSFS_BASE_VERSION"
            printf '> **Build Date:** %s\n' "$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            printf '> **Build ID:** `%s`\n' "${{ github.run_id }}"
            printf '> **Workflow:** [`%s`](%s/%s/actions/runs/%s)\n\n' \
              "${{ github.workflow }}" \
              "${{ github.server_url }}" \
              "${{ github.repository }}" \
              "${{ github.run_id }}"
            printf '---\n\n'
            printf '## 📦 Built Devices (%d total)\n\n' "${#device_info[@]}"
            printf '| Model | OS Version | Kernel Version | KPM | Features |\n'
            printf '|-------|------------|----------------|-----|----------|\n'
          } > release_notes.md

          for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
            IFS='|' read -r model os_ver kernel_ver _ _ _ kpm_tag \
              <<< "${device_info[$full_key]}"

            feature_flags=$(jq -r --arg MODEL "$model" '
              .[] | select(.model == $MODEL) |
              "\(.hmbird // false)\t\(.susfs // false)\t\(.bbr // false)\t\(.bbg // false)\t\(.ttl // false)\t\(.ip_set // false)\t\(.unicode // false)"
            ' <<< "$JSON_BUILD_DATA")

            features=""
            if [ -n "$feature_flags" ]; then
              IFS=$'\t' read -r hmbird susfs bbr bbg ttl ip_set unicode \
                <<< "$feature_flags"
              [[ "$hmbird"  == "true" ]] && features+="🐦 HMBIRD "
              [[ "$susfs"   == "true" ]] && features+="ඞ SusFS "
              [[ "$bbr"     == "true" ]] && features+="🚀 BBR "
              [[ "$bbg"     == "true" ]] && features+="🛡️ BBG "
              [[ "$ttl"     == "true" ]] && features+="🌐 TTL "
              [[ "$ip_set"  == "true" ]] && features+="🧱 IP_SET "
              [[ "$unicode" == "true" ]] && features+="🔧 Unicode"
            fi

            printf '| %-13s | %-10s | %-16s | %-4s | %-30s |\n' \
              "$model" "$os_ver" "$kernel_ver" "$kpm_tag" "$features" \
              >> release_notes.md
          done

          if [ ${#device_info[@]} -gt 0 ]; then
            first_entry=$(printf '%s\n' "${!device_info[@]}" | sort | head -n1)
            IFS='|' read -r _ _ _ _ resukisu_ver_global _ _ \
              <<< "${device_info[$first_entry]}"
          else
            echo "::error::No device info found in downloaded ZIPs!"
            exit 1
          fi

          display_ref() {
            local input="$1" resolved="$2"
            [[ "$input" =~ ^[0-9a-f]{40}$ ]] && echo "$input" \
              || echo "$input ($resolved)"
          }

          resukisu_display=$(display_ref "$resukisu_ref" "$resukisu_resolved_hash")
          clean_label=$( [ "$CLEAN_BUILD" = "true" ] \
            && echo "✅ Yes (no ccache)" || echo "❌ No (ccache enabled)" )

          {
            printf '\n---\n\n'
            printf '## 🔧 Build Configuration\n\n'
            printf '| Component | Version/Setting |\n'
            printf '|-----------|----------------|\n'
            printf '| **ReSukiSU Branch** | `%s` |\n'   "$resukisu_display"
            printf '| **ReSukiSU Version** | `%s` |\n'  "$resukisu_ver_global"
            printf '| **KPM Mode** | `%s` |\n'          "$KPM_MODE"
            printf '| **SUSFS Version** | `%s` |\n'     "$SUSFS_BASE_VERSION"
            printf '| **Optimization Level** | `%s` |\n' "$OPTIMIZE_LEVEL"
            printf '| **Clean Build** | %s |\n'         "$clean_label"
            printf '| **Compiler** | Clang (version varies by device) |\n\n'
            printf '### 📌 SUSFS Branch Mapping\n\n'
            printf '| Kernel Version | SUSFS Commit |\n'
            printf '|----------------|-------------|\n'
          } >> release_notes.md

          for key in "${active_gki_keys[@]}"; do
            [ -n "$key" ] || continue
            printf '| %s | `%s` |\n' "$key" "${susfs_map[$key]:-unknown}" \
              >> release_notes.md
          done

          # ── FIX #2 suite : bloc statique via printf multi-lignes ────────
          {
            printf '\n---\n\n'
            printf '## ✨ Features & Capabilities\n\n'
            printf '### 🔐 Root Management\n'
            printf '- **ReSukiSU** — Enhanced KernelSU fork with multi-manager support\n'
            printf '- **Magic Mount Support** — Seamless file system modifications\n'
            printf '- **Multi-Manager Support** — Multiple manager compatibility\n\n'
            printf '### 🛡️ Security & Privacy\n'
            printf '- **Baseband Guard (BBG)** — LSM-based baseband security\n'
            printf '- **SUSFS Hide Features**\n'
            printf '- **Ptrace Leak Fix** — For kernels < 5.16\n'
            printf '- **Unicode Fix** — Prevent path traversal detections\n\n'
            printf '### 🚀 Performance & Networking\n'
            printf '- **BBRv1** — Improved TCP congestion control\n'
            printf '- **IP Set & IPv6 NAT Support** — Advanced firewall capabilities\n'
            printf '- **TTL Target Support** — Network packet manipulation\n'
            printf '- **LTO (Link Time Optimization)** — Optimized binary size and performance\n'
            printf '- **Oryon-1 CPU Tuning** — For SM8750/SM8850/SM8845 SoCs\n\n'
            printf '### 🔧 System Features\n'
            printf '- **TMPFS_XATTR** — Extended attributes for tmpfs\n'
            printf '- **TMPFS_POSIX_ACL** — POSIX ACLs for tmpfs\n'
            printf '- **HMBIRD SCX** — Scheduler extensions where supported\n\n'
            printf '---\n\n'
            printf '## 📱 Manager Applications\n'
            printf '- **ReSukiSU Manager** → https://github.com/ReSukiSU/ReSukiSU/releases\n'
            printf '- **KSU SUSFS Module** → https://github.com/sidex15/ksu_module_susfs/releases\n'
            printf '- **Kernel Flasher** → https://github.com/fatalcoder524/KernelFlasher/releases\n\n'
            printf '---\n\n'
            printf '## 📥 Installation Instructions\n'
            printf '1. Download the appropriate ZIP for your device\n'
            printf '2. Flash the ZIP using Kernel Flasher to the active slot\n'
            printf '3. Install SusFS module from AK3 if wanted\n'
            printf '4. Install ReSukiSU Manager (if not yet installed)\n'
            printf '5. Reboot & Enjoy!\n\n'
            printf '---\n\n'
            printf '## Donations\n'
            printf 'Any and all donations are appreciated!\n\n'
            printf 'PayPal: paypal.me/fatalcoder524\n\n'
            printf 'DM on Telegram for UPI donations!\n\n'
            printf '---\n\n'
            printf '## 🙏 Credits\n'
            printf '- **ReSukiSU Team** | **KernelSU Team** | **simonpunk**\n'
            printf '- **OnePlus** | **TheWildJames & Fatalcoder**\n'
            printf '- **Community Contributors**\n\n'
            printf '---\n\n'
            printf '**⚡ Powered with ❤️ by ReSukiSU**\n'
          } >> release_notes.md

          echo "--- Release Notes Preview (first 30 lines) ---"
          head -n 30 release_notes.md

      - name: 🚀 Create GitHub Release
        shell: bash
        run: |
          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft
          echo "✅ Draft release created: ${{ env.NEW_TAG }}"

      - name: 📤 Upload Release Assets
        shell: bash
        run: |
          shopt -s nullglob
          count=0
          for file in ./downloaded-artifacts/*.zip; do
            echo "Uploading $(basename "$file")..."
            gh release upload "${{ env.NEW_TAG }}" "$file" --clobber
            count=$((count + 1))
          done
          echo "✅ $count asset(s) uploaded"

      - name: 📊 Release summary
        if: success()
        shell: bash
        run: |
          {
            echo ""
            echo "---"
            echo ""
            echo "## 🎉 Release Created Successfully"
            echo ""
            echo "**Tag:** [\`${{ env.NEW_TAG }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})"
            echo "**Status:** Draft — publish manually when ready"
            echo "**KPM Mode:** ${{ inputs.kpm_mode }}"
            echo "**Kernels:** $(find ./downloaded-artifacts -name '*.zip' | wc -l)"
            echo ""
            echo "### 📦 Assets"
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r -d '' zip; do
            [ -f "$zip" ] || continue
            name=$(basename "$zip")
            size_mb=$(awk "BEGIN { printf \"%.2f\", $(stat -c%s "$zip") / 1048576 }")
            echo "- \`$name\` (${size_mb} MB)" >> "$GITHUB_STEP_SUMMARY"
          done < <(find ./downloaded-artifacts -name "*.zip" -print0 | sort -z)
