name: Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: "Create a release?"
        required: true
        type: boolean
        default: false
      ksun_branch:
        description: "Choose KernelSU Next Branch"
        required: true
        type: choice
        options:
          - stable
          - next
        default: next
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options:
          - O2
          - O3
        default: O2

concurrency:
  group: build-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-batch-2:
    name: build-batch-2 (${{ matrix.model }} ${{ matrix.android_version }}-${{ matrix.kernel_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - model: OP13
            soc: sun
            branch: oneplus/sm8750
            manifest: oneplus_13.xml
            android_version: android15
            kernel_version: "6.6"
          - model: OP13r
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_13r.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP-ACE-5
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_ace5.xml
            android_version: android14
            kernel_version: "6.1"

    steps:
      - name: Select Appropriate SusFS Branch
        id: get-susfs-branch
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_STRING="${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          case "$KERNEL_STRING" in
            "android14-6.1") SUSFS_BRANCH="gki-android14-6.1" ;;
            "android15-6.6") SUSFS_BRANCH="gki-android15-6.6" ;;
            *) SUSFS_BRANCH="gki-${KERNEL_STRING}" ;;
          esac
          echo "susfs_branch=$SUSFS_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Kernel
        id: build
        uses: ./.github/actions
        with:
          model: ${{ matrix.model }}
          soc: ${{ matrix.soc }}
          branch: ${{ matrix.branch }}
          manifest: ${{ matrix.manifest }}
          android_version: ${{ matrix.android_version }}
          kernel_version: ${{ matrix.kernel_version }}
          ksun_branch: ${{ inputs.ksun_branch }}
          susfs_branch: ${{ steps.get-susfs-branch.outputs.susfs_branch }}
          optimize_level: ${{ inputs.optimize_level }}

  trigger-release:
    needs:
      - build-batch-2
    if: ${{ inputs.make_release }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: "*TEST BUILD* OnePlus Kernels With KernelSU Next & SUSFS *TEST BUILD*"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Aggregate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          find downloaded-artifacts -type f -name "SHA256SUMS.txt" -exec cat {} \; > ALL_SHA256SUMS.txt
          echo "Combined SHA256SUMS:"
          cat ALL_SHA256SUMS.txt

      - name: Create Draft Release
        shell: bash
        run: |
          set -euo pipefail
          TAG="test-${{ github.run_id }}"
          echo "Creating draft release with tag: $TAG"
          NOTES=$'Automated test build.\n\nArtifacts include KernelSU Next & SUSFS.\nOptimization: ${{ inputs.optimize_level }}\n\nSHA256SUMS:\n'"$(cat ALL_SHA256SUMS.txt)"
          gh release create "$TAG" \
            --draft \
            --title "${RELEASE_NAME}" \
            --notes "$NOTES" \
            $(find downloaded-artifacts -type f -name "*.zip")
          echo "Release created (draft)."
