name: Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false
      ksun_branch:
        description: "Choose KernelSU Next Branch"
        required: true
        type: choice
        options:
          - stable
          - next
        default: next
      android12-5_10_susfs_branch:
        description: "Choose SusFS Branch for android12-5.10"
        type: string
        default: "gki-android12-5.10"
      android13-5_10_susfs_branch:
        description: "Choose SusFS Branch for android13-5.10"
        type: string
        default: "gki-android13-5.10"
      android13-5_15_susfs_branch:
        description: "Choose SusFS Branch for android13-5.15"
        type: string
        default: "gki-android13-5.15"
      android14-5_15_susfs_branch:
        description: "Choose SusFS Branch for android14-5.15"
        type: string
        default: "gki-android14-5.15"
      android14-6_1_susfs_branch:
        description: "Choose SusFS Branch for android14-6.1"
        type: string
        default: "gki-android14-6.1"
      android15-6_6_susfs_branch:
        description: "Choose SusFS Branch for android15-6.6"
        type: string
        default: "gki-android15-6.6"

env:
  CCACHE_DIR: ~/.ccache
  CCACHE_MAXSIZE: 8G
  CCACHE_COMPRESS: true
  CCACHE_COMPRESSLEVEL: 6
  CCACHE_SLOPPINESS: file_macro,locale,time_macros

jobs:
  build-batch-1:
    name: Build Batch 1 (${{ matrix.model }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: OP11r
            soc: waipio
            branch: oneplus/sm8475
            manifest: oneplus_11r_v.xml
            android_version: android12
            kernel_version: "5.10"
          - model: OP-ACE-2
            soc: waipio
            branch: oneplus/sm8475
            manifest: oneplus_ace2_v.xml
            android_version: android12
            kernel_version: "5.10"
          - model: OP10t
            soc: waipio
            branch: oneplus/sm8475
            manifest: oneplus_10t_v.xml
            android_version: android12
            kernel_version: "5.10"
          - model: OP10pro
            soc: waipio
            branch: oneplus/sm8450
            manifest: oneplus_10_pro_v.xml
            android_version: android12
            kernel_version: "5.10"
          - model: OP11
            soc: kalama
            branch: oneplus/sm8550
            manifest: oneplus_11_v.xml
            android_version: android13
            kernel_version: "5.15"
          - model: OP-OPEN
            soc: kalama
            branch: oneplus/sm8550
            manifest: oneplus_open_v.xml
            android_version: android13
            kernel_version: "5.15"
          - model: OP-ACE-2-PRO
            soc: kalama
            branch: oneplus/sm8550
            manifest: oneplus_ace2_pro_v.xml
            android_version: android13
            kernel_version: "5.15"
          - model: OP12r
            soc: kalama
            branch: oneplus/sm8550
            manifest: oneplus_12r_v.xml
            android_version: android13
            kernel_version: "5.15"

    steps:
      - name: Free Disk Space for Better Performance
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Cache APT lists
        uses: actions/cache@v4
        with:
          path: /var/lib/apt/lists
          key: ${{ runner.os }}-apt-lists

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.model }}-${{ matrix.kernel_version }}

      - name: Cache repo directory
        uses: actions/cache@v4
        with:
          path: ${{ matrix.model }}/.repo
          key: ${{ runner.os }}-repo-${{ matrix.model }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-repo-${{ matrix.model }}-

      - name: Select Appropriate SusFS Branch
        id: get-susfs-branch
        run: |
          KERNEL_STRING="${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          case "$KERNEL_STRING" in
            "android12-5.10") SUSFS_BRANCH="${{ inputs.android12-5_10_susfs_branch }}" ;;
            "android13-5.10") SUSFS_BRANCH="${{ inputs.android13-5_10_susfs_branch }}" ;;
            "android13-5.15") SUSFS_BRANCH="${{ inputs.android13-5_15_susfs_branch }}" ;;
            "android14-5.15") SUSFS_BRANCH="${{ inputs.android14-5_15_susfs_branch }}" ;;
            "android14-6.1") SUSFS_BRANCH="${{ inputs.android14-6_1_susfs_branch }}" ;;
            "android15-6.6") SUSFS_BRANCH="${{ inputs.android15-6_6_susfs_branch }}" ;;
            *) echo "Invalid kernel version or unsupported: $KERNEL_STRING"; exit 1 ;;
          esac
          if [[ -z "$SUSFS_BRANCH" ]]; then
            SUSFS_BRANCH="gki-${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          fi
          echo "susfs_branch=$SUSFS_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build Kernel with ccache Optimization
        uses: ./.github/actions
        with:
          model: ${{ matrix.model }}
          soc: ${{ matrix.soc }}
          branch: ${{ matrix.branch }}
          manifest: ${{ matrix.manifest }}
          android_version: ${{ matrix.android_version }}
          kernel_version: ${{ matrix.kernel_version }}
          ksun_branch: ${{ inputs.ksun_branch }}
          susfs_branch: ${{ steps.get-susfs-branch.outputs.susfs_branch }}

      - name: Post-build Kernel Validation
        shell: bash
        run: |
          cd ${{ matrix.model }}/kernel_platform/common
          ./scripts/checkpatch.pl out/.config || echo "Checkpatch found warnings/errors"

      - name: Report ccache Performance Statistics
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "=== ccache Statistics for ${{ matrix.model }} (${{ matrix.kernel_version }}) ==="
            ccache -s
          fi

  build-batch-2:
    name: Build Batch 2 (${{ matrix.model }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: OP12
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus12_v.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP13r
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_13r.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP-ACE-5
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_ace5.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP-ACE-3V
            soc: pineapple
            branch: oneplus/sm7675
            manifest: oneplus_ace_3v_v.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP-NORD-4
            soc: pineapple
            branch: oneplus/sm7675
            manifest: oneplus_nord_4_v.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP-PAD-2
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_pad2_v.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP-Ace3-Pro
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_ace3_pro_v.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP13
            soc: sun
            branch: oneplus/sm8750
            manifest: oneplus_13.xml
            android_version: android15
            kernel_version: "6.6"
          - model: OPAce5Pro
            soc: sun
            branch: oneplus/sm8750
            manifest: oneplus_ace5_pro.xml
            android_version: android15
            kernel_version: "6.6"
          - model: OP13S
            soc: sun
            branch: oneplus/sm8750
            manifest: oneplus_13s.xml
            android_version: android15
            kernel_version: "6.6"

    steps:
      - name: Free Disk Space for Better Performance
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Cache APT lists
        uses: actions/cache@v4
        with:
          path: /var/lib/apt/lists
          key: ${{ runner.os }}-apt-lists

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.model }}-${{ matrix.kernel_version }}

      - name: Cache repo directory
        uses: actions/cache@v4
        with:
          path: ${{ matrix.model }}/.repo
          key: ${{ runner.os }}-repo-${{ matrix.model }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-repo-${{ matrix.model }}-

      - name: Select Appropriate SusFS Branch
        id: get-susfs-branch
        run: |
          KERNEL_STRING="${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          case "$KERNEL_STRING" in
            "android12-5.10") SUSFS_BRANCH="${{ inputs.android12-5_10_susfs_branch }}" ;;
            "android13-5.10") SUSFS_BRANCH="${{ inputs.android13-5_10_susfs_branch }}" ;;
            "android13-5.15") SUSFS_BRANCH="${{ inputs.android13-5_15_susfs_branch }}" ;;
            "android14-5.15") SUSFS_BRANCH="${{ inputs.android14-5_15_susfs_branch }}" ;;
            "android14-6.1") SUSFS_BRANCH="${{ inputs.android14-6_1_susfs_branch }}" ;;
            "android15-6.6") SUSFS_BRANCH="${{ inputs.android15-6_6_susfs_branch }}" ;;
            *) echo "Invalid kernel version or unsupported: $KERNEL_STRING"; exit 1 ;;
          esac
          if [[ -z "$SUSFS_BRANCH" ]]; then
            SUSFS_BRANCH="gki-${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          fi
          echo "susfs_branch=$SUSFS_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build Kernel with ccache Optimization
        uses: ./.github/actions
        with:
          model: ${{ matrix.model }}
          soc: ${{ matrix.soc }}
          branch: ${{ matrix.branch }}
          manifest: ${{ matrix.manifest }}
          android_version: ${{ matrix.android_version }}
          kernel_version: ${{ matrix.kernel_version }}
          ksun_branch: ${{ inputs.ksun_branch }}
          susfs_branch: ${{ steps.get-susfs-branch.outputs.susfs_branch }}

      - name: Post-build Kernel Validation
        shell: bash
        run: |
          cd ${{ matrix.model }}/kernel_platform/common
          ./scripts/checkpatch.pl out/.config || echo "Checkpatch found warnings/errors"

      - name: Report ccache Performance Statistics
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "=== ccache Statistics for ${{ matrix.model }} (${{ matrix.kernel_version }}) ==="
            ccache -s
          fi

  trigger-release:
    needs:
      - build-batch-1
      - build-batch-2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ inputs.make_release }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Generate and Create New Tag
        run: |
          BASE_TAG="v1.5.9-r0"
          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="$BASE_TAG"
          else
            LATEST_TAG=$(printf "%s\n%s\n" "$LATEST_TAG" "$BASE_TAG" | sort -rV | head -n1)
          fi
          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Generate Release Notes
        run: |
          echo "# OnePlus Kernels Release ${NEW_TAG}" > release_notes.md
          echo "Built with KernelSU Next & SUSFS" >> release_notes.md

      - name: Create GitHub Release
        run: |
          gh release create "${NEW_TAG}" \
            --repo "${REPO_OWNER}/${REPO_NAME}" \
            --title "OnePlus Kernels Release ${NEW_TAG}" \
            --notes-file release_notes.md \
            --prerelease

      - name: Upload Release Assets
        run: |
          for file in ./downloaded-artifacts/**/*.zip; do
            gh release upload "${NEW_TAG}" "$file" --clobber || true
          done
