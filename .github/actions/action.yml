name: Build

permissions:
  contents: write
  actions: write

inputs:
  model:
    required: true
    type: string
  soc:
    required: true
    type: string
  branch:
    required: true
    type: string
  manifest:
    required: true
    type: string
  android_version:
    required: true
    type: string
  kernel_version:
    required: true
    type: string
  ksun_branch:
    required: true
    type: string
    default: stable
  susfs_branch:
    required: true
    type: string
    default: ""
  github_token:
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt
          /var/lib/apt/lists
        key: apt-cache-${{ runner.os }}-${{ hashFiles('**/build.yml') }}
        restore-keys: apt-cache-${{ runner.os }}-

    - name: Cache repo binary
      uses: actions/cache@v4
      with:
        path: ./git-repo/repo
        key: repo-binary-${{ hashFiles('**/build.yml') }}

    - name: Setup Build System
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV
        df -h
        if [ $(df -h / | tail -n 1 | awk '{print $5}' | cut -d'%' -f1) -gt 80 ]; then
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/powershell /usr/share/swift || true
          sudo docker image prune --all --force
          echo "Some directories deleted"
        fi
        sudo apt-get purge -y \
          aria2 ansible azure-cli shellcheck rpm xorriso zsync \
          esl-erlang firefox gfortran-8 gfortran-9 google-chrome-stable \
          google-cloud-sdk imagemagick \
          libmagickcore-dev libmagickwand-dev libmagic-dev ant ant-optional kubectl \
          mercurial apt-transport-https mono-complete libmysqlclient \
          unixodbc-dev yarn chrpath libssl-dev libxft-dev \
          libfreetype6 libfreetype6-dev libfontconfig1 libfontconfig1-dev \
          snmp pollinate libpq-dev postgresql-client powershell ruby-full \
          sphinxsearch subversion mongodb-org microsoft-edge-stable || true
        sudo apt-get purge -y $(dpkg-query -W -f='${binary:Package}\n' | grep -E '^mysql|^php') || true
        sudo apt-get autoremove -y
        sudo apt-get autoclean -y
        echo "Some packages purged"
        df -h
        echo "Installing Repo and Python"
        sudo apt update
        sudo apt install -y python3 python-is-python3 ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        if [ ! -f ./git-repo/repo ]; then
          mkdir -p ./git-repo
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
          chmod a+rx ./git-repo/repo
        fi
        echo "REPO=$GITHUB_WORKSPACE/./git-repo/repo" >> $GITHUB_ENV
        export PATH=$PATH:$GITHUB_WORKSPACE/git-repo
        echo "CONFIG=${{ inputs.model }}" >> $GITHUB_ENV
        end_time=$(date +%s)
        echo "Setup Build System took $((end_time - start_time)) seconds"

    - name: Configure Git Information
      shell: bash
      run: |
        start_time=$(date +%s)
        git config --global user.name "0+builder"
        git config --global user.email "0+builder@yahoo.com"
        end_time=$(date +%s)
        echo "Configure Git took $((end_time - start_time)) seconds"

    - name: Cache cloned repositories
      uses: actions/cache@v4
      with:
        path: |
          AnyKernel3
          kernel_patches
          susfs4ksu
        key: repos-${{ hashFiles('**/build.yml') }}-${{ inputs.branch }}-${{ inputs.susfs_branch }}
        restore-keys: repos-${{ hashFiles('**/build.yml') }}-

    - name: Clone AnyKernel3 and Other Dependencies
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Cloning AnyKernel3 and other dependencies..."
        ANYKERNEL_BRANCH="gki-2.0"
        if [[ -z "${{ inputs.susfs_branch }}" ]]; then
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        else
          SUSFS_BRANCH="${{ inputs.susfs_branch }}"
        fi
        echo "Using branch for AnyKernel3: $ANYKERNEL_BRANCH"
        echo "Using branch for SUSFS: $SUSFS_BRANCH"
        if [ ! -d AnyKernel3 ]; then
          git clone --depth=1 https://github.com/Bouteillepleine/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
        fi
        if [ ! -d kernel_patches ]; then
          git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git
        fi
        if [ ! -d susfs4ksu ]; then
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git
          cd susfs4ksu
          if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1 || git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
            git checkout "$SUSFS_BRANCH"
          else
            echo "Error: '$SUSFS_BRANCH' is neither a valid branch/tag nor a valid commit hash."
            exit 1
          fi
        fi
        end_time=$(date +%s)
        echo "Cloning took $((end_time - start_time)) seconds"

    - name: Cache repo sync
      uses: actions/cache@v4
      with:
        path: ${{ env.CONFIG }}/.repo
        key: repo-sync-${{ inputs.manifest }}-${{ inputs.branch }}-${{ hashFiles('**/build.yml') }}
        restore-keys: repo-sync-${{ inputs.manifest }}-${{ inputs.branch }}-

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Creating folder for configuration: $CONFIG..."
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        echo "Initializing and syncing kernel source..."
        if [[ "${{ inputs.manifest }}" == https://* ]]; then
          mkdir -p .repo/manifests
          curl -Ls ${{ inputs.manifest }} -o .repo/manifests/temp_manifest.xml
          $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git -b ${{ inputs.branch }} -m ${{ inputs.manifest }} --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        $REPO --version
        $REPO --trace sync -c --no-clone-bundle --no-tags --current-branch --optimized-fetch -j$(nproc --all) --force-sync
        end_time=$(date +%s)
        echo "Repo sync took $((end_time - start_time)) seconds"

    - name: Add KernelSU Next
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        echo "Adding KernelSU Next..."
        if [ "${{ inputs.ksun_branch }}" == "stable" ]; then
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
        else
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ inputs.ksun_branch }}
        fi
        git submodule update --init --recursive
        end_time=$(date +%s)
        echo "Add KernelSU took $((end_time - start_time)) seconds"

    - name: Apply SUSFS and Related Patches
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        echo "Applying SUSFS and related patches..."
        cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
        cp ../../susfs4ksu/kernel_patches/fs/* ./common/fs/
        cp ../../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
        cp ../../../kernel_patches/next/scope_min_manual_hooks_v1.4.patch ./common/manual_hooks.patch
        cp ../../../kernel_patches/69_hide_stuff.patch ./common/
        cd ./KernelSU-Next
        susfs_version=$(grep '#define SUSFS_VERSION' ../common/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        BASE_VERSION=10200
        cd ./kernel
        KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" $BASE_VERSION)
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
        cd ..
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        echo "KernelSU Next Version: $KSU_VERSION"
        echo "SusFS Version: $susfs_version"
        case "$susfs_version" in
          "v1.5.5"|"v1.5.6"|"v1.5.7")
            cp "../../../kernel_patches/next/0001-kernel-implement-susfs-v1.5.5-v1.5.7-KSUN-v1.0.8.patch" "./ksun_susfs_latest.patch"
            patch -p1 --dry-run < ksun_susfs_latest.patch && patch -p1 < ksun_susfs_latest.patch || true
            ;;
          "v1.5.8")
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --dry-run < 10_enable_susfs_for_ksu.patch && patch -p1 < 10_enable_susfs_for_ksu.patch || true
            for file in fix_apk_sign.c fix_core_hook.c fix_selinux.c fix_ksud.c; do
              patch -p1 --dry-run < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/$file.patch" && \
              patch -p1 < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/$file.patch"
            done
            ;;
          "v1.5.9")
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --dry-run < 10_enable_susfs_for_ksu.patch && patch -p1 < 10_enable_susfs_for_ksu.patch || true
            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -printf "%f\n" | cut -d'.' -f1); do
              patch -p1 --dry-run < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_$file.c.patch" && \
              patch -p1 < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_$file.c.patch"
            done
            patch -p1 --dry-run < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch" && \
            patch -p1 < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch"
            ;;
          *)
            echo "Invalid version: $susfs_version"
            exit 1
            ;;
        esac
        cd ../common
        if [ "${{ inputs.android_version }}" = "android15" ] && [ "${{ inputs.kernel_version }}" = "6.6" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
          fi
        fi
        patch -p1 --dry-run < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch && \
        patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true
        patch -p1 --dry-run < manual_hooks.patch && patch -p1 < manual_hooks.patch
        patch -p1 --dry-run -F 3 < 69_hide_stuff.patch && patch -p1 -F 3 < 69_hide_stuff.patch
        KERNEL_VERSION="${{ inputs.kernel_version }}"
        MIN_VERSION="5.16"
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --dry-run -F 3 < "../../../kernel_patches/gki_ptrace.patch" && \
          patch -p1 -F 3 < "../../../kernel_patches/gki_ptrace.patch"
        fi
        if [ "${{ inputs.model }}" == "OPAce5Pro" ] || [ "${{ inputs.model }}" == "OP13" ]; then
          echo 'obj-y += hmbird_patch.o' >> ./drivers/Makefile
          patch -p1 --dry-run -F 3 < "../../../kernel_patches/oneplus/hmbird/hmbird_kernel_patch.patch" && \
          patch -p1 -F 3 < "../../../kernel_patches/oneplus/hmbird/hmbird_kernel_patch.patch"
          cd ./kernel/sched
          rm -rf ext.c ext.h build_policy.c slim.h slim_sysctl.c
          patch -p1 --dry-run -F 3 < "../../../../../kernel_patches/oneplus/hmbird/hmbird_files_patch.patch" && \
          patch -p1 -F 3 < "../../../../../kernel_patches/oneplus/hmbird/hmbird_files_patch.patch"
        fi
        end_time=$(date +%s)
        echo "Apply patches took $((end_time - start_time)) seconds"

    - name: Add KernelSU-Next and SUSFS Configuration Settings
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        cat << EOF >> "$CONFIG_FILE"
        CONFIG_KSU=y
        CONFIG_KSU_KPROBES_HOOK=n
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_SU=n
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        EOF
        end_time=$(date +%s)
        echo "Add KernelSU configs took $((end_time - start_time)) seconds"

    - name: Add BBR Support
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration database"
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        cat << EOF >> "$CONFIG_FILE"
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_TCP_CONG_BIC=n
        CONFIG_TCP_CONG_WESTWOOD=n
        CONFIG_TCP_CONG_HTCP=n
        CONFIG_NET_SCH_FQ=y
        CONFIG_NET_SCH_FQ_CODEL=y
        CONFIG_IP_ECN=y
        CONFIG_TCP_ECN=y
        CONFIG_IPV6_ECN=y
        CONFIG_IP_NF_TARGET_ECN=y
        CONFIG_MQ_IOSCHED_SSG=y
        CONFIG_MQ_IOSCHED_SSG_CGROUP=y
        EOF
        sed -i -e '/CONFIG_NET_SCH_FQ_CODEL=/d' -e '$aCONFIG_NET_SCH_FQ_CODEL=y' "$CONFIG_FILE"
        end_time=$(date +%s)
        echo "Add BBR support took $((end_time - start_time)) seconds"

    - name: Add TTL Target Support
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        cat << EOF >> "$CONFIG_FILE"
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        EOF
        end_time=$(date +%s)
        echo "Add TTL support took $((end_time - start_time)) seconds"

    - name: Add Other Configurations
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        cat << EOF >> "$CONFIG_FILE"
        CONFIG_DEBUG_KERNEL=n
        CONFIG_DYNAMIC_DEBUG=n
        CONFIG_DEBUG_INFO=n
        CONFIG_LTO_CLANG_THIN=y
        CONFIG_LTO_CLANG=y
        CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y
        CONFIG_AUTOFDO_CLANG=y
        CONFIG_LLVM_POLLY=y
        EOF
        end_time=$(date +%s)
        echo "Add other configs took $((end_time - start_time)) seconds"

    - name: Disable OnePlus Kernel Modules
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        if [ "${{ inputs.android_version }}" = "android14" ] && [ "${{ inputs.kernel_version }}" = "6.1" ]; then
          sed -i -e 's/CONFIG_REGMAP_KUNIT=m/CONFIG_REGMAP_KUNIT=n/g' \
                 -e 's/CONFIG_INPUT_KUNIT_TEST=m/CONFIG_INPUT_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=m/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_SND_SOC_UTILS_KUNIT_TEST=m/CONFIG_SND_SOC_UTILS_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_HID_KUNIT_TEST=m/CONFIG_HID_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_RTC_LIB_KUNIT_TEST=m/CONFIG_RTC_LIB_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_CLK_KUNIT_TEST=m/CONFIG_CLK_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_CLK_GATE_KUNIT_TEST=m/CONFIG_CLK_GATE_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_IIO_FORMAT_KUNIT_TEST=m/CONFIG_IIO_FORMAT_KUNIT_TEST=n/g' \
                 -e 's/CONFIG_EXT4_KUNIT_TESTS=m/CONFIG_EXT4_KUNIT_TESTS=n/g' \
                 -e 's/CONFIG_FAT_KUNIT_TEST=m/CONFIG_FAT_KUNIT_TEST=n/g' "$CONFIG_FILE"
        fi
        end_time=$(date +%s)
        echo "Disable OnePlus modules took $((end_time - start_time)) seconds"

    - name: Run sed and perl Commands
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        echo "Running sed and perl commands..."
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        sed -i -e 's/CONFIG_LTO=n/CONFIG_LTO=y/' \
               -e 's/CONFIG_LTO_CLANG_FULL=y/CONFIG_LTO_CLANG_THIN=y/' \
               -e 's/CONFIG_LTO_CLANG_NONE=y/CONFIG_LTO_CLANG_THIN=y/' "$CONFIG_FILE"
        sed -i 's/check_defconfig//' ./common/build.config.gki
        sed -i -e '$s|echo "\$res"|echo "\$res"|' \
               -e 's/-dirty//' ./common/scripts/setlocalversion
        sed -i -e '$s|echo "\$res"|echo "\$res"|' \
               -e 's/-dirty//' ./msm-kernel/scripts/setlocalversion
        sed -i -e '$s|echo "\$res"|echo "\$res"|' \
               -e 's/-dirty//' ./external/dtc/scripts/setlocalversion
        sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl || echo "No stamp.bzl"
        sed -i 's/-dirty//' ./build/kernel/kleaf/workspace_status_stamp.py || echo "No workspace_status_stamp.py"
        sed -i '/echo "LTO $LTO "/i export LTO=thin' ./oplus/build/oplus_setup.sh
        sed -i 's/export REPACK_IMG=true/export REPACK_IMG=false/g' ./oplus/build/oplus_setup.sh
        DATESTR=$(date -u '+%a %b %d %T UTC %Y')
        perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT \$DATESTR\"}" ./common/scripts/mkcompile_h
        perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT \$DATESTR\"}" ./msm-kernel/scripts/mkcompile_h
        find . -type f -exec sed -i 's/\(make\s\+-C[^\n]*\)\s\+/\1 -j$(nproc) /g' {} +
        end_time=$(date +%s)
        echo "Run sed/perl took $((end_time - start_time)) seconds"

    - name: Cache kernel build
      uses: actions/cache@v4
      with:
        path: ${{ env.CONFIG }}/out
        key: kernel-build-${{ inputs.soc }}-${{ inputs.model }}-${{ hashFiles('**/build.yml') }}
        restore-keys: kernel-build-${{ inputs.soc }}-${{ inputs.model }}-

    - name: Build the Kernel
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG"
        echo "Building the kernel..."
        sudo sh -c 'sync; echo 3 > /proc/sys/vm/drop_caches'
        rm ./kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports (common)"
        rm ./kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports (msm-kernel)"
        BUILD_TYPE="gki"
        BAZEL_ARGS=(--jobs=$(nproc --all) --lto=thin --disk_cache=/tmp/bazel-cache)
        if [ "${{ inputs.soc }}" == "sun" ]; then
          BUILD_TYPE="perf"
          BAZEL_ARGS+=(-g)
        fi
        (stdbuf -oL bash -c '
          while true; do
            echo "=== $(date) ==="
            free -h
            echo "======"
            df -h
            echo "======"
            top -b -n 1 | head -n 15
            echo ""
            sleep 60
          done
        ') &
        MONITOR_PID=$!
        trap "kill $MONITOR_PID" EXIT
        if [ -f ./kernel_platform/build_with_bazel.py ]; then
          ./kernel_platform/oplus/bazel/oplus_modules_variant.sh ${{ inputs.soc }} "$BUILD_TYPE" ""
          ./kernel_platform/build_with_bazel.py -t ${{ inputs.soc }} $BUILD_TYPE "${BAZEL_ARGS[@]}" -o "$(pwd)/out"
        else
          LTO=thin ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ inputs.soc }} "$BUILD_TYPE"
        fi
        end_time=$(date +%s)
        echo "Kernel build took $((end_time - start_time)) seconds"

    - name: Cache SUSFS module
      uses: actions/cache@v4
      with:
        path: ksu_module_susfs_1.5.2+_CI.zip
        key: susfs-module-${{ inputs.github_token }}-${{ hashFiles('**/build.yml') }}

    - name: Download Latest SUSFS Module from CI
      continue-on-error: true
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        if [ ! -f ksu_module_susfs_1.5.2+_CI.zip ]; then
          echo "Fetching latest successful run for branch v1.5.2+..."
          LATEST_RUN_ID=$(curl -s -H "Authorization: Bearer ${{ inputs.github_token }}" \
            "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs?status=success" | \
            jq -r '.workflow_runs[] | select(.head_branch == "v1.5.2+") | .id' | head -n 1)
          if [ -z "$LATEST_RUN_ID" ]; then
            echo "No successful run found for branch v1.5.2+"
          else
            ARTIFACT_URL=$(curl -s -H "Authorization: Bearer ${{ inputs.github_token }}" \
              "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$LATEST_RUN_ID/artifacts" | jq -r '.artifacts[0].archive_download_url')
            if [ -n "$ARTIFACT_URL" ]; then
              curl -L -H "Authorization: Bearer ${{ inputs.github_token }}" -o ksu_module_susfs_1.5.2+_CI.zip "$ARTIFACT_URL"
              cp ksu_module_susfs_1.5.2+_CI.zip ./AnyKernel3/
            else
              echo "Failed to fetch artifact URL"
            fi
          fi
        else
          cp ksu_module_susfs_1.5.2+_CI.zip ./AnyKernel3/
        fi
        end_time=$(date +%s)
        echo "Download SUSFS module took $((end_time - start_time)) seconds"

    - name: Create ZIP Files for Different Formats
      id: create_zip
      shell: bash
      run: |
        start_time=$(date +%s)
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG"
        echo "Copying Image"
        cp ./out/dist/Image ../AnyKernel3/Image || { echo "::error::Failed to copy kernel Image"; exit 1; }
        echo "Navigating to AnyKernel3 directory..."
        cd ../AnyKernel3
        if [ "${{ inputs.model }}" == "OPAce5Pro" ] || [ "${{ inputs.model }}" == "OP13" ]; then
          cp ../kernel_patches/oneplus/hmbird/bins/* ./tools/ || true
          patch -p1 --dry-run -F 3 < ../kernel_patches/oneplus/hmbird/ak3_hmbird_patch.patch && \
          patch -p1 -F 3 < ../kernel_patches/oneplus/hmbird/ak3_hmbird_patch.patch || true
        fi
        ZIP_NAME="AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${{ env.KSUVER }}_SUSFS_${{ env.SUSVER }}.zip"
        echo "Creating zip file $ZIP_NAME..."
        zip -r "$ZIP_NAME" ./* || { echo "::error::Failed to create ZIP file"; exit 1; }
        echo "ZIP file created at $GITHUB_WORKSPACE/$ZIP_NAME"
        end_time=$(date +%s)
        echo "Create ZIP took $((end_time - start_time)) seconds"

    - name: Debug ZIP File
      shell: bash
      run: |
        start_time=$(date +%s)
        ls -l /home/runner/work/OnePlus_KernelSU_SUSFS/OnePlus_KernelSU_SUSFS/AnyKernel3/AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${{ env.KSUVER }}_SUSFS_${{ env.SUSVER }}.zip || echo "ZIP file not found"
        ls -l /home/runner/work/OnePlus_KernelSU_SUSFS/OnePlus_KernelSU_SUSFS/OP13r/out/dist/Image || echo "Kernel Image not found"
        ls -l /home/runner/work/OnePlus_KernelSU_SUSFS/OnePlus_KernelSU_SUSFS/AnyKernel3/Image || echo "Copied Image not found"
        end_time=$(date +%s)
        echo "Debug ZIP took $((end_time - start_time)) seconds"

    - name: Upload Build Artifacts
      id: upload_ak3_zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: AnyKernel3/AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${{ env.KSUVER }}_SUSFS_${{ env.SUSVER }}.zip
        if-no-files-found: error
