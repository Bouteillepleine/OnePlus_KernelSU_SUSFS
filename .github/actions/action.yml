name: Build
permissions:
  contents: write
  actions: write

inputs:
  model:
    required: true
    type: string
  soc:
    required: true
    type: string
  branch:
    required: true
    type: string
  manifest:
    required: true
    type: string
  android_version:
    required: true
    type: string
  kernel_version:
    required: true
    type: string
  ksun_branch:
    required: true
    type: string
    default: stable
  susfs_branch:
    required: true
    type: string
    default: ""
  FAST_BUILD:
    required: false
    type: boolean
    default: false

runs:
  using: "composite"
  steps:
    - name: Set Environment Variables
      shell: bash
      run: |
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        echo "CCACHE_SIZE=20G" >> $GITHUB_ENV
        echo "WORKSPACE_DIR=$GITHUB_WORKSPACE/kernel_workspace" >> $GITHUB_ENV
        echo "KERNEL_VERSION=${{ inputs.kernel_version }}" >> $GITHUB_ENV
        echo "CONFIG=${{ inputs.model }}" >> $GITHUB_ENV
        echo "Debug: Environment variables set"
        echo "CCACHE_DIR=$HOME/.ccache"
        echo "KERNEL_VERSION=${{ inputs.kernel_version }}"
        echo "CONFIG=${{ inputs.model }}"
        echo "FAST_BUILD=${{ inputs.FAST_BUILD }}"

    - name: Setup ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ github.job }}-kernel-${{ inputs.kernel_version }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ github.job }}-kernel-${{ inputs.kernel_version }}-
      continue-on-error: true

    - name: Cache Repo Tool
      uses: actions/cache@v4
      with:
        path: ./git-repo/repo
        key: repo-tool-${{ hashFiles('**/*.yml') }}
        restore-keys: |
          repo-tool-
      continue-on-error: true

    - name: Setup Build System
      shell: bash
      run: |
        export DEBIAN_FRONTEND=noninteractive
        echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV
        
        echo "Disk space before cleanup:"
        df -h
        
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/powershell /usr/share/swift || true
        sudo docker image prune --all --force
        echo "some directories deleted"
        
        echo "Purging unnecessary packages..."
        PACKAGES_TO_PURGE=(
          aria2 ansible azure-cli shellcheck rpm xorriso zsync
          esl-erlang firefox gfortran-8 gfortran-9 google-chrome-stable
          google-cloud-sdk imagemagick
          libmagickcore-dev libmagickwand-dev libmagic-dev ant ant-optional kubectl
          mercurial apt-transport-https mono-complete libmysqlclient
          unixodbc-dev yarn chrpath libssl-dev libxft-dev
          libfreetype6 libfreetype6-dev libfontconfig1 libfontconfig1-dev
          snmp pollinate libpq-dev postgresql-client powershell ruby-full
          sphinxsearch subversion mongodb-org microsoft-edge-stable
        )
        INSTALLED_PACKAGES=$(dpkg-query -W -f='${binary:Package}\n' 2>/dev/null | grep -E "^($(echo "${PACKAGES_TO_PURGE[*]}" | tr ' ' '|'))$" || true)
        if [ -n "$INSTALLED_PACKAGES" ]; then
          sudo apt-get purge -y $INSTALLED_PACKAGES || true
        else
          echo "No listed packages found to purge"
        fi
        
        INSTALLED_REGEX=$(dpkg-query -W -f='${binary:Package}\n' 2>/dev/null | grep -E '^mysql|^php|^dotnet' || true)
        if [ -n "$INSTALLED_REGEX" ]; then
          sudo apt-get purge -y $INSTALLED_REGEX || true
        else
          echo "No regex-matched packages (mysql, php, dotnet) found to purge"
        fi
        
        sudo apt-get autoremove -y
        sudo apt-get autoclean -y
        echo "Package cleanup completed"
        
        echo "Disk space after cleanup:"
        df -h
        
        echo "Installing Repo and Python..."
        sudo apt-get update -o Acquire::http::Timeout=30 -o Acquire::Retries=3
        sudo apt-get install -y python3 python-is-python3
        if [ $? -ne 0 ]; then
          echo "Error: Failed to install python3 and python-is-python3"
          exit 1
        fi
        
        mkdir -p ./git-repo
        curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
        chmod a+rx ./git-repo/repo
        sudo mv ./git-repo/repo /usr/bin/repo
        echo "REPO=/usr/bin/repo" >> $GITHUB_ENV
        /usr/bin/repo --version
        if [ $? -ne 0 ]; then
          echo "Error: Failed to verify repo tool"
          exit 1
        fi

    - name: Install Dependencies and ccache
      shell: bash
      run: |
        echo "Installing build dependencies..."
        sudo apt-get update -o Acquire::http::Timeout=30 -o Acquire::Retries=3
        sudo apt-get install -y --no-install-recommends python3 git curl ccache build-essential bc libncurses-dev bison flex libssl-dev libelf-dev lld clang
        if [ $? -ne 0 ]; then
          echo "Error: Failed to install dependencies"
          exit 1
        fi
        echo "Configuring ccache..."
        mkdir -p "${{ env.CCACHE_DIR }}"
        chmod -R 755 "${{ env.CCACHE_DIR }}"
        ccache -M ${{ env.CCACHE_SIZE }}
        ccache -z
        clang --version || { echo "Error: clang not found"; exit 1; }
        ld.lld --version || { echo "Error: ld.lld not found"; exit 1; }
        echo "Dependencies installed successfully"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        echo "Creating folder for configuration: $CONFIG..."
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        mkdir -p kernel_workspace
        echo "KERNEL_WORKSPACE=$CONFIG/kernel_workspace" >> $GITHUB_ENV
        
        echo "Initializing and syncing kernel source..."
        if [[ "${{ inputs.manifest }}" == https://* ]]; then
          mkdir -p .repo/manifests
          curl -Ls ${{ inputs.manifest }} -o .repo/manifests/temp_manifest.xml
          $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git -b ${{ inputs.branch }} -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git -b ${{ inputs.branch }} -m ${{ inputs.manifest }} --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        if [ $? -ne 0 ]; then
          echo "Error: Failed to initialize repo"
          exit 1
        fi
        
        $REPO --version
        $REPO --trace sync -c --no-clone-bundle --no-tags --optimized-fetch -j$(nproc --all) --fail-fast
        if [ $? -ne 0 ]; then
          echo "Error: Failed to sync repo"
          exit 1
        fi
        echo "Verifying Clang toolchain directory..."
        CLANG_DIR="$GITHUB_WORKSPACE/kernel_platform/prebuilts/clang/host/linux-x86"
        if [ "${{ inputs.kernel_version }}" == "5.10" ]; then
          CLANG_DIR="$GITHUB_WORKSPACE/kernel_platform/prebuilts-master/clang/host/linux-x86"
        fi
        if [ -d "$CLANG_DIR" ]; then
          echo "Clang toolchain directory found:"
          ls -l "$CLANG_DIR/"
        else
          echo "Error: Clang toolchain directory not found at $CLANG_DIR"
          exit 1
        fi

    - name: Apply SUSFS Patches
      shell: bash
      run: |
        echo "Applying SUSFS patches..."
        cd "$KERNEL_WORKSPACE"
        git clone -b ${{ inputs.susfs_branch }} https://github.com/tiann/KernelSU.git
        cd KernelSU
        git checkout ${{ inputs.susfs_branch }}
        for patch in *.patch; do
          if [ -f "$patch" ]; then
            echo "Applying patch: $patch"
            git -C ../kernel_platform apply "$patch"
            if [ $? -ne 0 ]; then
              echo "Error: Failed to apply patch $patch"
              exit 1
            fi
          fi
        done
        echo "SUSFS patches applied successfully"

    - name: Apply KSUN Hooks
      shell: bash
      run: |
        echo "Applying KSUN hooks..."
        cd "$KERNEL_WORKSPACE/KernelSU"
        ./add-ksu.sh -r ${{ inputs.ksun_branch }} -s ../kernel_platform
        if [ $? -ne 0 ]; then
          echo "Error: Failed to apply KSUN hooks"
          exit 1
        fi
        echo "KSUN hooks applied successfully"

    - name: Apply Hide Stuff Patches
      shell: bash
      run: |
        echo "Applying Hide Stuff patches..."
        cd "$KERNEL_WORKSPACE"
        git clone https://github.com/huskydog9988/HideStuff.git
        cd HideStuff
        for patch in *.patch; do
          if [ -f "$patch" ]; then
            echo "Applying patch: $patch"
            git -C ../kernel_platform apply "$patch"
            if [ $? -ne 0 ]; then
              echo "Error: Failed to apply patch $patch"
              exit 1
            fi
          fi
        done
        echo "Hide Stuff patches applied successfully"

    - name: Add BBR Support
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        
        echo "Adding configuration settings to gki_defconfig..."
        echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
        echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
        echo "CONFIG_TCP_CONG_BIC=n" >> ./common/arch/arm64/configs/gki_defconfig
        echo "CONFIG_TCP_CONG_WESTWOOD=n" >> ./common/arch/arm64/configs/gki_defconfig
        echo "CONFIG_TCP_CONG_HTCP=n" >> ./common/arch/arm64/configs/gki_defconfig
        echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
        echo "CONFIG_NET_SCH_FQ_CODEL=y" >> ./common/arch/arm64/configs/gki_defconfig

    - name: Run sed and perl Commands
      shell: bash
      run: |
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        
        echo "Running sed commands..."
        sed -i 's/CONFIG_LTO=n/CONFIG_LTO=y/' "./common/arch/arm64/configs/gki_defconfig"
        sed -i 's/CONFIG_LTO_CLANG_FULL=y/CONFIG_LTO_CLANG_THIN=y/' "./common/arch/arm64/configs/gki_defconfig"
        sed -i 's/CONFIG_LTO_CLANG_NONE=y/CONFIG_LTO_CLANG_THIN=y/' "./common/arch/arm64/configs/gki_defconfig"
        
        sed -i 's/check_defconfig//' ./common/build.config.gki
        tac ./common/scripts/setlocalversion | sed '0,/echo "\$res"/s//res=\$\(echo \$res \| cut -d- -f1-2\)-OP-Wild\;echo "\$res"\;/' | tac > ./common/scripts/setlocalversion.tmp && mv ./common/scripts/setlocalversion.tmp ./common/scripts/setlocalversion
        tac ./msm-kernel/scripts/setlocalversion | sed '0,/echo "\$res"/s//res=\$\(echo \$res \| cut -d- -f1-2\)-OP-Wild\;echo "\$res"\;/' | tac > ./msm-kernel/scripts/setlocalversion.tmp && mv ./msm-kernel/scripts/setlocalversion.tmp ./msm-kernel/scripts/setlocalversion
        tac ./external/dtc/scripts/setlocalversion | sed '0,/echo "\$res"/s//res=\$\(echo \$res \| cut -d- -f1-2\)-OP-Wild\;echo "\$res"\;/' | tac > ./external/dtc/scripts/setlocalversion.tmp && mv ./external/dtc/scripts/setlocalversion.tmp ./external/dtc/scripts/setlocalversion
        sed -i 's/echo "${KERNELVERSION}${file_localversion}${config_localversion}${LOCALVERSION}${scm_version}"/echo "${KERNELVERSION}-android14-OP-Wild"/' ./common/scripts/setlocalversion
        sed -i 's/echo "${KERNELVERSION}${file_localversion}${config_localversion}${LOCALVERSION}${scm_version}"/echo "${KERNELVERSION}-android14-OP-Wild"/' ./msm-kernel/scripts/setlocalversion
        sed -i 's/echo "${KERNELVERSION}${file_localversion}${config_localversion}${LOCALVERSION}${scm_version}"/echo "${KERNELVERSION}-android14-OP-Wild"/' ./external/dtc/scripts/setlocalversion
        chmod +x ./common/scripts/setlocalversion
        chmod +x ./msm-kernel/scripts/setlocalversion
        chmod +x ./external/dtc/scripts/setlocalversion
        sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl || echo "No stamp.bzl!"
        sed -i 's/-dirty//' ./common/scripts/setlocalversion
        sed -i 's/-dirty//' ./msm-kernel/scripts/setlocalversion
        sed -i 's/-dirty//' ./external/dtc/scripts/setlocalversion
        sed -i 's/-dirty//' ./build/kernel/kleaf/workspace_status_stamp.py || echo "No workspace_status_stamp.py!"
        
        sed -i '/echo "LTO $LTO "/i export LTO=thin' ./oplus/build/oplus_setup.sh
        sed -i 's/export REPACK_IMG=true/export REPACK_IMG=false/g' ./oplus/build/oplus_setup.sh
        
        DATESTR=$(date -u)
        perl -pi -e 's{UTS_VERSION="\$\(echo \$UTS_VERSION \$CONFIG_FLAGS \$TIMESTAMP \| cut -b -\$UTS_LEN\)"}{UTS_VERSION="#1 SMP PREEMPT $DATESTR"}' ./common/scripts/mkcompile_h
        perl -pi -e 's{UTS_VERSION="\$\(echo \$UTS_VERSION \$CONFIG_FLAGS \$TIMESTAMP \| cut -b -\$UTS_LEN\)"}{UTS_VERSION="#1 SMP PREEMPT $DATESTR"}' ./msm-kernel/scripts/mkcompile_h

    - name: Build Kernel FAST
      if: inputs.FAST_BUILD == true
      id: fast_build
      shell: bash
      run: |
        echo "Starting fast build for kernel version: ${{ inputs.kernel_version }}"
        KERNEL_VERSION="${{ inputs.kernel_version }}"
        if [[ "$KERNEL_VERSION" == "6.6" ]]; then
          CLANG_PATH="clang-r510928"
          CLANG_DIR="prebuilts"
        elif [[ "$KERNEL_VERSION" == "6.1" ]]; then
          CLANG_PATH="clang-r487747c"
          CLANG_DIR="prebuilts"
        elif [[ "$KERNEL_VERSION" == "5.15" ]]; then
          CLANG_PATH="clang-r450784e"
          CLANG_DIR="prebuilts"
        elif [[ "$KERNEL_VERSION" == "5.10" ]]; then
          CLANG_PATH="clang-r416183b"
          CLANG_DIR="prebuilts-master"
          USE_LLVM_IAS=true
        else
          echo "fallback=true" >> "$GITHUB_OUTPUT"
          echo "⚠️ The current kernel version \"$KERNEL_VERSION\" does not have a corresponding clang toolchain, falling back to using the official build script"
          exit 0
        fi
        CLANG_FULL_PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_DIR/clang/host/linux-x86/$CLANG_PATH/bin"
        echo "Adding Clang to PATH: $CLANG_FULL_PATH"
        export PATH="$CLANG_FULL_PATH:$PATH"
        export PATH="/usr/lib/ccache:$PATH"
        export CC="ccache clang"
        if [ -d "$CLANG_FULL_PATH" ]; then
          echo "Clang toolchain found:"
          ls -l "$CLANG_FULL_PATH"
        else
          echo "Clang toolchain directory not found: $CLANG_FULL_PATH"
          echo "Listing available toolchains:"
          ls -l "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_DIR/clang/host/linux-x86/" || true
          echo "Falling back to Bazel build."
          echo "fallback=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        cd "$KERNEL_WORKSPACE/kernel_platform/common"
        echo "Current directory: $(pwd)"
        if [ ! -f arch/arm64/configs/gki_defconfig ]; then
          echo "Error: gki_defconfig not found at $(pwd)/arch/arm64/configs/gki_defconfig"
          exit 1
        fi
        MAKE_ARGS="LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc \
          PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole \
          LD=ld.lld HOSTLD=ld.lld KCFLAGS+=-Wno-error"
        if [[ "$USE_LLVM_IAS" == "true" ]]; then
          MAKE_ARGS="LLVM_IAS=1 $MAKE_ARGS"
        fi
        echo "Generating defconfig..."
        make -j$(nproc --all) O=out $MAKE_ARGS gki_defconfig
        if [ $? -ne 0 ]; then
          echo "Error: Failed to generate defconfig"
          exit 1
        fi
        echo "Building kernel..."
        make -j$(nproc --all) O=out $MAKE_ARGS
        if [ $? -ne 0 ]; then
          echo "Error: Kernel compilation failed"
          exit 1
        fi
        mkdir -p ../out/dist
        cp out/arch/arm64/boot/Image ../out/dist/Image
        if [ ! -f ../out/dist/Image ]; then
          echo "Error: Kernel image not found at ../out/dist/Image"
          exit 1
        fi
        echo "✅ Fast kernel compilation completed with ThinLTO"

    - name: Build the Kernel
      if: steps.fast_build.outputs.fallback == 'true' || inputs.FAST_BUILD != true
      shell: bash
      run: |
        echo "Starting Bazel build..."
        cd "$CONFIG"
        echo "Listing Clang toolchain directory:"
        ls -l "$GITHUB_WORKSPACE/kernel_platform/prebuilts/clang/host/linux-x86/" || true
        echo "Clearing system cache..."
        sudo sh -c 'sync; echo 3 > /proc/sys/vm/drop_caches'
        rm ./kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
        rm ./kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"
        BUILD_TYPE="gki"
        BAZEL_ARGS=(--jobs=$(nproc --all) --lto=thin)
        if [ "${{ inputs.soc }}" == "sun" ]; then
          BUILD_TYPE="perf"
          BAZEL_ARGS+=(-g)
        fi
        (stdbuf -oL bash -c '
          while true; do
            echo "=== $(date) ==="
            free -h
            echo "======"
            df -h
            echo "======"
            top -b -n 1 | head -n 15
            echo ""
            sleep 60
          done
        ') &
        MONITOR_PID=$!
        trap "kill $MONITOR_PID" EXIT
        export PATH="/usr/bin:$PATH"
        if [ -f ./kernel_platform/build_with_bazel.py ]; then
          ./kernel_platform/oplus/bazel/oplus_modules_variant.sh ${{ inputs.soc }} "$BUILD_TYPE" ""
          ./kernel_platform/build_with_bazel.py -t ${{ inputs.soc }} $BUILD_TYPE "${BAZEL_ARGS[@]}" -o "$(pwd)/out"
        else
          LTO=thin ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ inputs.soc }} "$BUILD_TYPE"
        fi
        if [ ! -f ./out/dist/Image ]; then
          echo "Error: Kernel image not found at ./out/dist/Image"
          exit 1
        fi
        echo "Listing output directory:"
        ls -l ./out/dist/

    - name: Create ZIP Files
      shell: bash
      run: |
        echo "Creating ZIP files..."
        cd "$CONFIG"
        mkdir -p artifacts
        zip -r artifacts/${{ inputs.model }}-kernel.zip out/dist/
        if [ $? -ne 0 ]; then
          echo "Error: Failed to create ZIP file"
          exit 1
        fi
        echo "ZIP file created: artifacts/${{ inputs.model }}-kernel.zip"
