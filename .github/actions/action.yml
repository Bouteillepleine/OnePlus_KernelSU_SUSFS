name: 'Build OnePlus Kernel with ReSukiSU'

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  ksu_type:
    description: 'Select KSU Type'
    required: true
    type: choice
    options:
      - ReSukiSU
  ksu_branch_or_hash:
    description: 'ReSukiSU branch or commit hash (empty = auto-detect)'
    required: false
    type: string
    default: ""
  susfs_commit_hash_or_branch:
    description: 'SUSFS branch or commit hash (empty = auto-detect by kernel version)'
    required: false
    type: string
    default: ""
  kpm_mode:
    description: 'KPM mode: KPM (enable + patch_linux), KPN (disable)'
    required: false
    type: choice
    options:
      - KPM
      - KPN
    default: KPM
  optimize_level:
    description: 'Compiler optimization level (O2 or O3)'
    required: false
    type: string
    default: O2
  clean:
    description: 'Force clean build without ccache acceleration'
    required: false
    type: string
    default: 'false'

outputs:
  kernel_version:
    description: 'Full kernel version string'
    value: ${{ steps.save_metadata.outputs.kernel_version }}
  ksu_version:
    description: 'ReSukiSU version number'
    value: ${{ steps.save_metadata.outputs.ksu_version }}
  ksu_type:
    description: 'ReSukiSU Variant'
    value: ${{ steps.save_metadata.outputs.ksu_type }}
  susfs_version:
    description: 'SUSFS version string'
    value: ${{ steps.save_metadata.outputs.susfs_version }}
  image_sha256:
    description: 'SHA256 hash of kernel Image'
    value: ${{ steps.collect_stats.outputs.image_sha256 }}
  warnings:
    description: 'Number of compiler warnings'
    value: ${{ steps.collect_stats.outputs.warnings_count }}
  build_time:
    description: 'Total build time in seconds'
    value: ${{ steps.collect_stats.outputs.build_time }}
  ccache_hit_rate:
    description: 'ccache hit rate percentage'
    value: ${{ steps.ccache_stats.outputs.hit_rate }}
  ccache_direct_rate:
    description: 'ccache direct hit rate percentage'
    value: ${{ steps.ccache_stats.outputs.direct_rate }}
  zip_name:
    description: 'Name of the generated flashable ZIP'
    value: ${{ steps.create_zip.outputs.zip_name }}

runs:
  using: 'composite'
  steps:

    # ══════════════════════════════════════════════════════════════
    # SECTION 1 — PARSE & VALIDATE
    # ══════════════════════════════════════════════════════════════

    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "OP_\(.key | ascii_upcase)=\(.value)"' /tmp/config.json \
          >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"

        errors=()

        # model
        if [[ -z "$OP_MODEL" ]]; then
          errors+=("'model' cannot be empty")
        elif [[ ! "$OP_MODEL" =~ ^OP ]]; then
          errors+=("'model' must start with 'OP'. Got: '$OP_MODEL'")
        fi

        # soc
        if [[ -z "$OP_SOC" ]]; then
          errors+=("'soc' cannot be empty")
        elif [[ ! "$OP_SOC" =~ ^[A-Za-z0-9_-]+$ ]]; then
          errors+=("'soc' contains invalid characters. Got: '$OP_SOC'")
        fi

        # branch
        if [[ -z "$OP_BRANCH" ]]; then
          errors+=("'branch' cannot be empty")
        elif [[ ! "$OP_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          errors+=("'branch' contains invalid characters. Got: '$OP_BRANCH'")
        fi

        # manifest
        if [[ -z "$OP_MANIFEST" ]]; then
          errors+=("'manifest' cannot be empty")
        elif [[ "$OP_MANIFEST" == http*://* ]]; then
          [[ "$OP_MANIFEST" =~ ^https:// ]] \
            || errors+=("Manifest URL must be HTTPS. Got: '$OP_MANIFEST'")
          [[ "$OP_MANIFEST" =~ \.xml($|\?) ]] \
            || errors+=("Manifest URL must point to .xml. Got: '$OP_MANIFEST'")
        else
          [[ "$OP_MANIFEST" =~ \.xml$ ]] \
            || errors+=("Manifest must end with .xml. Got: '$OP_MANIFEST'")
          [[ ! "$OP_MANIFEST" =~ [[:space:]] ]] \
            || errors+=("Manifest cannot contain spaces. Got: '$OP_MANIFEST'")
        fi

        # android_version
        if [[ -z "$OP_ANDROID_VERSION" ]]; then
          errors+=("'android_version' cannot be empty")
        elif [[ ! "$OP_ANDROID_VERSION" =~ ^android[0-9]+$ ]]; then
          errors+=("'android_version' must be 'androidN'. Got: '$OP_ANDROID_VERSION'")
        fi

        # kernel_version
        if [[ -z "$OP_KERNEL_VERSION" ]]; then
          errors+=("'kernel_version' cannot be empty")
        elif [[ ! "$OP_KERNEL_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
          errors+=("'kernel_version' must be 'X.Y'. Got: '$OP_KERNEL_VERSION'")
        fi

        # os_version
        if [[ -z "$OP_OS_VERSION" ]]; then
          errors+=("'os_version' cannot be empty")
        elif [[ ! "$OP_OS_VERSION" =~ ^OOS ]]; then
          errors+=("'os_version' must start with 'OOS'. Got: '$OP_OS_VERSION'")
        fi

        # boolean fields
        for bool_field in OP_HMBIRD OP_SUSFS OP_BBG OP_BBR OP_TTL OP_IP_SET OP_RUST_BUILD; do
          val="${!bool_field}"
          if [[ -z "$val" ]]; then
            errors+=("'${bool_field}' cannot be empty")
          elif [[ "$val" != "true" && "$val" != "false" ]]; then
            errors+=("'${bool_field}' must be 'true' or 'false'. Got: '$val'")
          fi
        done

        # lto
        if [[ -z "$OP_LTO" ]]; then
          errors+=("'lto' cannot be empty")
        elif [[ "$OP_LTO" != "none" && "$OP_LTO" != "thin" && "$OP_LTO" != "full" ]]; then
          errors+=("'lto' must be 'thin', 'full' or 'none'. Got: '$OP_LTO'")
        fi

        # uname
        if [[ -z "$OP_UNAME" ]]; then
          errors+=("'uname' cannot be empty")
        elif [[ ${#OP_UNAME} -gt 44 ]]; then
          errors+=("'uname' too long (max 44). Got length: ${#OP_UNAME}")
        fi

        # optimize_level
        case "${{ inputs.optimize_level }}" in
          O2|O3) ;;
          *) errors+=("optimize_level must be O2 or O3. Got: '${{ inputs.optimize_level }}'") ;;
        esac

        # kpm_mode
        case "${{ inputs.kpm_mode }}" in
          KPM|KPN) ;;
          *) errors+=("kpm_mode must be KPM or KPN. Got: '${{ inputs.kpm_mode }}'") ;;
        esac

        if [ ${#errors[@]} -ne 0 ]; then
          echo "Found ${#errors[@]} validation error(s):" >&2
          for err in "${errors[@]}"; do
            echo "  - $err" >&2
          done
          echo "::error::Input validation failed. See logs for details."
          exit 1
        fi

        echo "✅ Input validation passed"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # SECTION 2 — RUST / BINDGEN (conditional)
    # ══════════════════════════════════════════════════════════════

    - name: Install bindgen (no rustc)
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' }}
      run: |
        set -euo pipefail
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --default-toolchain none
        source "$HOME/.cargo/env"
        cargo install bindgen-cli --version 0.69.5
        bindgen --version
        which bindgen

    - name: Show bindgen version
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' }}
      run: bindgen --version

    # ══════════════════════════════════════════════════════════════
    # SECTION 3 — BASE ENVIRONMENT & SOURCE SYNC
    # ══════════════════════════════════════════════════════════════

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        echo "CONFIG=$OP_MODEL" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Optimize Global Git for Repo Tool
      shell: bash
      run: |
        set -euo pipefail
        git config --global feature.manyFiles true
        git config --global core.fsmonitor  true
        git config --global pack.sparse     true

    - name: Initialize and Sync Kernel Source
      shell: bash      
      run: |
        set -euo pipefail
        echo "::group::Initialize kernel source"
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        if [[ "$OP_MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$OP_MANIFEST" \
            -o .repo/manifests/temp_manifest.xml
          "$REPO" init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "oneplus/sm8650" \
            -m temp_manifest.xml \
            --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        elif [[ "$OP_BRANCH" == wild/* ]]; then
          mkdir -p .repo/manifests
          cp "../manifests/$(echo "$OP_OS_VERSION" | tr '[:upper:]' '[:lower:]')/$OP_MANIFEST" \
            .repo/manifests/temp_manifest.xml
          "$REPO" init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "oneplus/sm8650" \
            -m temp_manifest.xml \
            --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$OP_BRANCH" \
            -m "$OP_MANIFEST" \
            --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi

        "$REPO" --version

        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch \
               -j"$(nproc --all)" --fail-fast; then
            success=true
            break
          fi
          echo "⚠️ repo sync attempt $i failed; retrying in 30s..."
          sleep 30
        done
        $success || { echo "::error::repo sync failed after 3 attempts"; exit 1; }

        echo "✅ Kernel source synced"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # SECTION 4 — DIRECTORY PATHS & VERSION DETECTION
    # ══════════════════════════════════════════════════════════════

    - name: Set Dir Paths
      shell: bash
      run: |
        set -euo pipefail

        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        KERNEL_PLATFORM_DIR="$CONFIG_DIR/kernel_platform"
        COMMON_KERNEL_DIR="$KERNEL_PLATFORM_DIR/common"
        MSM_KERNEL_DIR="$KERNEL_PLATFORM_DIR/msm-kernel"
        AK3_DIR="$GITHUB_WORKSPACE/AnyKernel3"
        KERNEL_PATCHES_DIR="$GITHUB_WORKSPACE/kernel_patches"
        SUSFS_DIR="$GITHUB_WORKSPACE/susfs4ksu"
        KSU_DIR="$KERNEL_PLATFORM_DIR/KernelSU"
        mkdir -p "$ARTIFACTS_DIR"

        # AFDO profile resolution (only applicable for kernel 6.12)
        AFDO_PROFILE=""
        if [ "$OP_KERNEL_VERSION" = "6.12" ]; then
          AFDO_PATH_1="$COMMON_KERNEL_DIR/android/gki/aarch64/afdo/kernel.afdo"
          AFDO_PATH_2="$COMMON_KERNEL_DIR/gki/aarch64/afdo/kernel.afdo"
          if [ -f "$AFDO_PATH_1" ]; then
            AFDO_PROFILE="$AFDO_PATH_1"
          elif [ -f "$AFDO_PATH_2" ]; then
            AFDO_PROFILE="$AFDO_PATH_2"
          else
            echo "::error::AFDO profile not found for kernel $OP_KERNEL_VERSION!"
            echo "  Tried: $AFDO_PATH_1"
            echo "  Tried: $AFDO_PATH_2"
            exit 1
          fi
          echo "✅ AFDO profile resolved: $AFDO_PROFILE"
        else
          echo "ℹ️  AFDO skipped — not applicable for kernel $OP_KERNEL_VERSION"
        fi

        {
          echo "CONFIG_FOLDER=$CONFIG_DIR"
          echo "ARTIFACTS_FOLDER=$ARTIFACTS_DIR"
          echo "KERNEL_PLATFORM_FOLDER=$KERNEL_PLATFORM_DIR"
          echo "COMMON_KERNEL_FOLDER=$COMMON_KERNEL_DIR"
          echo "MSM_KERNEL_FOLDER=$MSM_KERNEL_DIR"
          echo "AK3_FOLDER=$AK3_DIR"
          echo "KERNEL_PATCHES_FOLDER=$KERNEL_PATCHES_DIR"
          echo "SUSFS_FOLDER=$SUSFS_DIR"
          echo "KSU_FOLDER=$KSU_DIR"
          echo "AFDO_PROFILE_PATH=$AFDO_PROFILE"
        } >> "$GITHUB_ENV"

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Get kernel version"
        cd "$COMMON_KERNEL_FOLDER"

        BRANCH_LINE=""
        for f in "build.config.common" "build.config.constants"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done

        [ -n "$BRANCH_LINE" ] || {
          echo "::error::No BRANCH= found in config files"; exit 1
        }

        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        [ -n "$ANDROID_VERSION" ] || {
          echo "::error::Could not parse android version from BRANCH=$BRANCH_VALUE"; exit 1
        }

        VERSION=$(grep    '^VERSION *='    Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep   '^SUBLEVEL *='   Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        cd "$ARTIFACTS_FOLDER"
        echo "$ANDROID_VERSION-$FULL_VERSION" > "${OP_MODEL}_${OP_OS_VERSION}.txt"
        echo "$OP_OS_VERSION"                >> "${OP_MODEL}_${OP_OS_VERSION}.txt"

        {
          echo "ANDROID_VER=$ANDROID_VERSION"
          echo "KERNEL_VER=$VERSION.$PATCHLEVEL"
          echo "TKERNEL_VER=$FULL_VERSION"
          echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION"
          if [ "$OP_SUSFS" = "true" ]; then
            echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL"
          fi
        } >> "$GITHUB_ENV"

        echo "✅ Detected: $ANDROID_VERSION-$FULL_VERSION"
        if [ "$OP_SUSFS" = "true" ]; then
          echo "   SUSFS Branch: gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL"
        fi
        echo "::endgroup::"

    - name: 🏷️ Set Build Identity
      shell: bash
      run: |
        set -euo pipefail
        echo "BUILD_USER=OnePlus"      >> "$GITHUB_ENV"
        echo "BUILD_HOST=ubuntu-build" >> "$GITHUB_ENV"
        echo "✅ Build identity: OnePlus @ ubuntu-build"

    # ══════════════════════════════════════════════════════════════
    # SECTION 5 — TOOLCHAIN DETECTION
    # ══════════════════════════════════════════════════════════════

    - name: Detect Clang and Rust
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Detect Clang and Rust toolchains"
        CLANG_FOUND=false
        RUSTC_FOUND=false

        for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null \
            | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
            break
          fi
        done

        for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
          [ -d "$base/rust/linux-x86/" ] || continue
          latest=$(ls -d "$base/rust/linux-x86/1."* 2>/dev/null \
            | sort -V | head -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/rustc" ]; then
            RUSTC_BIN="$latest/bin"
            RUSTC_FOUND=true
            break
          fi
        done

        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
          echo "⚠️ Using system clang (no prebuilt found)"
        fi

        $CLANG_FOUND || { echo "::error::No clang toolchain found"; exit 1; }

        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

        if $RUSTC_FOUND; then
          echo "RUSTC_BIN_PATH=$RUSTC_BIN" >> "$GITHUB_ENV"
          RUSTC_VER="$("$RUSTC_BIN/rustc" --version | head -n1)"
          echo "RUSTC_VERSION=$RUSTC_VER"  >> "$GITHUB_ENV"
          echo "✅ Detected RUSTC: $RUSTC_VER"
        else
          echo "::warning::No Rust toolchain found — Rust features will be unavailable"
        fi

        CLANG_VER="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VER" >> "$GITHUB_ENV"
        echo "✅ Detected Clang: $CLANG_VER"
        echo "::endgroup::"

    - name: Derive Clang Short Version
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Derive Clang fingerprint"
        short="$("${CLANG_BIN_PATH}/clang" --version \
          | sed -n '1s/.*clang-r\([0-9.]\+\).*/\1/p')"
        if [ -z "$short" ]; then
          short="$("${CLANG_BIN_PATH}/clang" --version | sha256sum | cut -c1-8)"
          echo "⚠️ Could not extract clang-r version, using hash: $short"
        else
          echo "✅ Clang fingerprint: $short"
        fi
        echo "CLANG_VERSION_SHORT=$short" >> "$GITHUB_ENV"
        echo "CLANG_FULL_VERSION=$("${CLANG_BIN_PATH}/clang" --version | head -n1)" \
          >> "$GITHUB_ENV"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # SECTION 6 — CCACHE SETUP
    # ══════════════════════════════════════════════════════════════
    
    - name: Set Cache Environment
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Configure ccache environment"
        CACHE_DIR="$HOME/.ccache"
        RESOLVED_MAX="${CCACHE_MAX_SIZE:-2G}"
        mkdir -p "$CACHE_DIR"
        {
          echo "CCACHE_DIR=$CACHE_DIR"
          echo "CCACHE_MAXSIZE=$RESOLVED_MAX"
          echo "CCACHE_KEY=ccache-resukisu-v4-${OP_MODEL}-${OP_OS_VERSION}-${KERNEL_FULL_VER}-${CLANG_VERSION_SHORT}"
        } >> "$GITHUB_ENV"
        echo "  Directory : $CACHE_DIR"
        echo "  Max size  : $RESOLVED_MAX"
        echo "  Device    : ${OP_MODEL:-unknown}"
        echo "  OS        : ${OP_OS_VERSION:-unknown}"
        echo "  Clang     : ${CLANG_VERSION_SHORT:-unknown}"
        echo "::endgroup::"

    - name: Restore ccache
      id: ccache_restore
      if: ${{ inputs.clean != 'true' }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ env.CCACHE_KEY }}
        restore-keys: |
          ccache-resukisu-v4-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-
          ccache-resukisu-v4-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-
          ccache-resukisu-v4-${{ env.OP_MODEL }}-

    - name: Configure ccache
      if: ${{ inputs.clean != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Configure ccache for maximum performance"
        export CCACHE_DIR="${CCACHE_DIR}"
        ccache -M "${CCACHE_MAXSIZE}"
        ccache -o compression=true
        ccache -o compression_level=3
        ccache -o direct_mode=true
        ccache -o hash_dir=false
        ccache -o file_clone=true
        ccache -o inode_cache=true
        ccache -o umask=002
        ccache -o sloppiness=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale
        if ccache --help 2>&1 | grep -q 'depend_mode'; then
          ccache -o depend_mode=true
        fi
        {
          echo "CCACHE_COMPILERCHECK=content"
          echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
          echo "CCACHE_NOHASHDIR=true"
          echo "CCACHE_IGNOREOPTIONS=--sysroot*"
        } >> "$GITHUB_ENV"
        echo "✅ ccache configured"
        if find "$CCACHE_DIR" -type f -print -quit 2>/dev/null | grep -q .; then
          echo "✅ Restored cache found:"
          ccache -s | head -n 20
        else
          echo "⚠️ No existing cache — building from scratch"
        fi
        echo "::endgroup::"

    - name: Handle Clean Build Option
      if: ${{ inputs.clean == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Clean build requested"
        echo "⚠️ Clean build mode — ccache bypassed"
        echo "CCACHE_DISABLE=1" >> "$GITHUB_ENV"
        echo "✅ ccache disabled"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # SECTION 7 — CLONE DEPENDENCIES
    # ══════════════════════════════════════════════════════════════

    - name: Clone AnyKernel3 and Other Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Clone dependencies"
        ANYKERNEL_BRANCH="gki-2.0"

        if [ "$OP_SUSFS" = "true" ]; then
          SUSFS_INPUT="${{ inputs.susfs_commit_hash_or_branch }}"
          declare -A DEFAULT_SUSFS=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )
          KERNEL_KEY="${ANDROID_VER}-${KERNEL_VER}"
          if [ -z "$SUSFS_INPUT" ] || [ "$SUSFS_INPUT" = "next" ]; then
            SUSFS_BRANCH="${DEFAULT_SUSFS[$KERNEL_KEY]:-gki-android15-6.6}"
            echo "ℹ️  Using default SUSFS branch for $KERNEL_KEY: $SUSFS_BRANCH"
          else
            SUSFS_BRANCH="$SUSFS_INPUT"
            echo "🔧 Using custom SUSFS ref: $SUSFS_BRANCH"
          fi
        fi

        # ── Smart clone helper: reuse existing repo or clone fresh ────
        ensure_repo() {
          local dir="$1"
          local url="$2"
          local branch="${3:-}"
          local depth="${4:-1}"

          if [ -d "$dir/.git" ]; then
            echo "♻️  Reusing cached repo: $dir"
            git -C "$dir" remote set-url origin "$url"
            git -C "$dir" fetch --force --tags origin
            if [ -n "$branch" ]; then
              git -C "$dir" checkout -f "$branch" \
                || git -C "$dir" checkout -f -B "$branch" "origin/$branch"
              git -C "$dir" reset --hard "origin/$branch" || true
            fi
            return 0
          fi

          local clone_args=(clone --filter=blob:none)
          [ -n "$branch" ]                              && clone_args+=(--branch "$branch")
          [ "$depth" != "0" ] && [ -n "$depth" ]       && clone_args+=(--depth "$depth")
          clone_args+=("$url" "$dir")

          local attempt=1
          while [ $attempt -le 3 ]; do
            echo "🔄 Attempt $attempt/3: cloning $url"
            if git "${clone_args[@]}"; then
              echo "✅ Clone success: $dir"
              return 0
            fi
            echo "❌ Clone failed, retrying..."
            rm -rf "$dir"
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

          echo "::error::Failed to clone $url after 3 attempts"
          return 1
        }

        ensure_repo "AnyKernel3"     "https://github.com/Bouteillepleine/AnyKernel3.git"       "$ANYKERNEL_BRANCH" 1
        ensure_repo "kernel_patches" "https://github.com/TheWildJames/kernel_patches.git"       "main"              1

        if [ "$OP_SUSFS" = "true" ]; then
          ensure_repo "susfs4ksu" "https://gitlab.com/simonpunk/susfs4ksu.git" "" 0
          cd susfs4ksu
          git fetch --all --tags --force

          if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1; then
            echo "✅ Checking out remote branch: $SUSFS_BRANCH"
            git checkout -f "$SUSFS_BRANCH"
            git reset --hard "origin/$SUSFS_BRANCH"
          elif git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
            echo "✅ Checking out ref/commit: $SUSFS_BRANCH"
            git checkout -f "$SUSFS_BRANCH"
          else
            echo "::error::SUSFS branch or commit '$SUSFS_BRANCH' not found"
            git branch -r | head -n 50
            exit 1
          fi

          SUSFS_COMMIT_SHA=$(git rev-parse HEAD)
          SUSFS_BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "detached")
          echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA"   >> "$GITHUB_ENV"
          echo "SUSFS_BRANCH_NAME=$SUSFS_BRANCH_NAME" >> "$GITHUB_ENV"
          echo "✅ SUSFS: $SUSFS_BRANCH_NAME @ $SUSFS_COMMIT_SHA"
          cd ..
        fi

        echo "✅ All dependencies ready"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # SECTION 8 — KERNEL PATCHES & CONFIGURATION
    # ══════════════════════════════════════════════════════════════

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$KERNEL_PLATFORM_FOLDER"
        rm -f common/android/abi_gki_protected_exports_*     || true
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        sed -i 's/protected_modules = \[.*\]/protected_modules = []/' \
          common/modules.bzl || true
        df -h

    - name: Add ReSukiSU
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add ReSukiSU"
        cd "$KERNEL_PLATFORM_FOLDER"

        KSU_REF="${{ inputs.ksu_branch_or_hash }}"
        [ -z "$KSU_REF" ] && KSU_REF="main"

        # Download setup script to temp file and verify it is non-empty before executing
        _SETUP_TMP=$(mktemp)
        curl --proto '=https' --tlsv1.2 -fsSL \
          "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" \
          -o "$_SETUP_TMP"
        [ -s "$_SETUP_TMP" ] || { echo "::error::ReSukiSU setup.sh is empty"; exit 1; }
        bash "$_SETUP_TMP" "$KSU_REF"
        rm -f "$_SETUP_TMP"

        echo "ReSukiSU" >> "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt"

        cd KernelSU
        KSU_COMMIT_SHA="$(git rev-parse HEAD)"
        echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> "$GITHUB_ENV"

        KSUVER="$(git describe --tags --always 2>/dev/null || true)"
        if [ -z "$KSUVER" ]; then
          KSUVER="$(grep -RhoE \
            'KSU_VERSION[[:space:]]*[:=][[:space:]]*"?[0-9A-Za-z._-]+' . 2>/dev/null \
            | head -n1 | sed -E 's/.*[:=][[:space:]]*"?//')"
        fi
        [ -z "$KSUVER" ] && KSUVER="unknown"
        echo "KSUVER=$KSUVER" >> "$GITHUB_ENV"
        cd ..

        if [ "${{ inputs.kpm_mode }}" = "KPM" ]; then
          echo "CONFIG_KPM=y" >> common/arch/arm64/configs/gki_defconfig
          echo "✅ CONFIG_KPM enabled"
        else
          echo "CONFIG_KPM=n" >> common/arch/arm64/configs/gki_defconfig
          echo "✅ CONFIG_KPM disabled"
        fi

        echo "✅ ReSukiSU added (ref: $KSU_REF, commit: ${KSU_COMMIT_SHA:0:8}, version: $KSUVER)"
        echo "::endgroup::"

    - name: Apply SUSFS Patches
      shell: bash
      if: ${{ env.OP_SUSFS == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply SUSFS patches"
        cd "$KERNEL_PLATFORM_FOLDER"

        cp "$SUSFS_FOLDER/kernel_patches/fs/"*            "$COMMON_KERNEL_FOLDER/fs/"
        cp "$SUSFS_FOLDER/kernel_patches/include/linux/"* "$COMMON_KERNEL_FOLDER/include/linux/"

        susfs_version=$(grep '#define SUSFS_VERSION' \
          "$COMMON_KERNEL_FOLDER/include/linux/susfs.h" | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> "$GITHUB_ENV"
        echo "$susfs_version" >> "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt"
        echo "SusFS Version: $susfs_version"

        cd "$COMMON_KERNEL_FOLDER"

        # android15-6.6 specific pre-patch fixups
        if [ "$ANDROID_VER" = "android15" ] && [ "$KERNEL_VER" = "6.6" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' \
              ./fs/namespace.c
          fi
        fi

        fake_patched=0
        if [ "$ANDROID_VER" = "android15" ] && [ "$KERNEL_VER" = "6.6" ]; then
          if ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' \
               ./fs/proc/task_mmu.c; then
            echo "nr_subpages line not found — fake patching"
            sed -i \
              -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' \
              -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' \
              ./fs/proc/task_mmu.c
            fake_patched=1
          fi
          if ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' \
              ./fs/proc/base.c
          fi
        fi

        for av_kv in "android12-5.10" "android13-5.15" "android14-6.1"; do
          av="${av_kv%%-*}"
          kv="${av_kv##*-}"
          if [ "$ANDROID_VER" = "$av" ] && [ "$KERNEL_VER" = "$kv" ]; then
            if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              fake_patched=1
            fi
          fi
        done

        if [ "$ANDROID_VER" = "android14" ] && [ "$KERNEL_VER" = "6.1" ]; then
          if ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' \
              ./fs/proc/base.c
          fi
        fi

        patch -p1 < "$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_${SUSFS_KERNEL_BRANCH}.patch"

        # Undo fake-patch lines after real patch applied
        if [ "$fake_patched" = 1 ]; then
          if [ "$ANDROID_VER" = "android15" ] && [ "$KERNEL_VER" = "6.6" ]; then
            if grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' \
                 ./fs/proc/task_mmu.c; then
              sed -i \
                -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' \
                -e '/pagemap_entry_t \*res = NULL;/d' \
                ./fs/proc/task_mmu.c
            fi
          fi
          for av_kv in "android12-5.10" "android13-5.15" "android14-6.1"; do
            av="${av_kv%%-*}"
            kv="${av_kv##*-}"
            if [ "$ANDROID_VER" = "$av" ] && [ "$KERNEL_VER" = "$kv" ]; then
              if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
                sed -i 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi
          done
        fi

        echo "✅ SUSFS patches applied"
        echo "::endgroup::"

    - name: Add BBG
      if: ${{ env.OP_BBG == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add BBG LSM"
        cd "$KERNEL_PLATFORM_FOLDER"

        # Download to temp file — avoid blind pipe-to-bash
        _BBG_TMP=$(mktemp)
        if ! curl --proto '=https' --tlsv1.2 -fsSL \
               "https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh" \
               -o "$_BBG_TMP"; then
          echo "::warning::BBG setup.sh download failed, skipping"
          rm -f "$_BBG_TMP"
        else
          [ -s "$_BBG_TMP" ] || { echo "::warning::BBG setup.sh empty, skipping"; rm -f "$_BBG_TMP"; }
          bash "$_BBG_TMP" fix_blkdev_rename || echo "::warning::BBG setup script failed, continuing"
          rm -f "$_BBG_TMP"
        fi

        echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig
        sed -i \
          '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' \
          common/security/Kconfig
        echo "✅ BBG LSM added"
        echo "::endgroup::"

    - name: Apply Other Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply other patches"
        cd "$COMMON_KERNEL_FOLDER"

        MIN_VERSION="5.16"
        if [ "$(printf '%s\n' "$KERNEL_VER" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VER" ]; then
          echo "Patching ptrace!"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/gki_ptrace.patch"
        else
          echo "Kernel >= $MIN_VERSION — skipping ptrace patch"
        fi

        if [ "$OP_HMBIRD" = "true" ]; then
          echo "Patching hmbird!"
          dos2unix "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/fengchi_${OP_MODEL}_${OP_OS_VERSION}.patch"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/fengchi_${OP_MODEL}_${OP_OS_VERSION}.patch"
          dos2unix "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/overwriter.patch"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/overwriter.patch"
          chmod +x ./drivers/of/overwriter/overwrite_configs/convert_configs.sh
          dos2unix "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/hmbird_config.patch"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/hmbird_config.patch"
        else
          echo "HMBIRD not enabled — skipping fengchi patch"
        fi

        echo "✅ Other patches applied"
        echo "::endgroup::"

    - name: Apply KSU Hooks
      shell: bash
      if: ${{ env.NEED_HOOKS == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply ReSukiSU hooks"
        cd "$COMMON_KERNEL_FOLDER"
        patch -p1 < "$KERNEL_PATCHES_FOLDER/next/scope_min_manual_hooks_v1.4.patch"
        echo "✅ ReSukiSU hooks applied"
        echo "::endgroup::"

    - name: Add ReSukiSU Base Configuration Settings
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" << 'EOF'
        CONFIG_KSU=y
        CONFIG_KSU_KPROBES_HOOK=n
        CONFIG_KSU_MULTI_MANAGER_SUPPORT=y
        CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-⚡Ultra⚡@ReSukiSU"
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        EOF
        echo "✅ ReSukiSU base config written"

    - name: Add SUSFS Configuration Settings
      if: ${{ env.OP_SUSFS == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" << 'EOF'
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_MAP=y
        CONFIG_KSU_SUSFS_SUS_SU=n
        EOF
        echo "✅ SUSFS config written"

    - name: Add BBR
      if: ${{ env.OP_BBR == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" << 'EOF'
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y
        CONFIG_NET_SCH_FQ_CODEL=y
        EOF
        echo "✅ BBR config written"

    - name: Add TTL Target Support
      if: ${{ env.OP_TTL == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" << 'EOF'
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        EOF
        echo "✅ TTL config written"

    - name: Add IP SET Support
      if: ${{ env.OP_IP_SET == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" << 'EOF'
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        EOF
        echo "✅ IP_SET config written"

    - name: Add Build-based Configs
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" << 'EOF'
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n
        CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y
        CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y
        CONFIG_OPTIMIZE_INLINING=y
        CONFIG_FRAME_WARN=0
        CONFIG_TRACEPOINTS=y
        CONFIG_DEBUG_KERNEL=n
        CONFIG_DEBUG_INFO=n
        CONFIG_DEBUG_INFO_DWARF4=n
        CONFIG_LOCK_DEBUGGING=n
        CONFIG_DEBUG_MUTEXES=n
        CONFIG_DEBUG_SPINLOCK=n
        CONFIG_DEBUG_ATOMIC_SLEEP=n
        CONFIG_GDB_SCRIPTS=n
        EOF
        echo "✅ Build-based configs written"

    - name: Add RUST Build Configs
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' }}
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" << 'EOF'
        CONFIG_ANDROID_BINDER_IPC_RUST=m
        CONFIG_RUST=y
        EOF
        echo "✅ Rust configs written"

    # ══════════════════════════════════════════════════════════════
    # SECTION 9 — METADATA & BRANDING
    # ══════════════════════════════════════════════════════════════

    - name: Save Build Metadata
      id: save_metadata
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "kernel_version=${KERNEL_FULL_VER}"
          echo "ksu_version=${KSUVER:-unknown}"
          echo "ksu_type=ReSukiSU"
          if [ "$OP_SUSFS" = "true" ]; then
            echo "susfs_version=${SUSVER:-unknown}"
          else
            echo "susfs_version=disabled"
          fi
        } >> "$GITHUB_OUTPUT"

        # Append remaining lines to the metadata .txt consumed by trigger-release
        {
          echo "ReSukiSU"
          echo "${KSUVER:-unknown}"
          if [ "$OP_SUSFS" = "true" ]; then
            echo "${SUSVER:-unknown}"
          else
            echo "disabled"
          fi
        } >> "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt"

        echo "✅ Build metadata saved"

    - name: Customize Kernel Branding
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$COMMON_KERNEL_FOLDER/out"
        CUSTOM_LOCALVERSION="-${ANDROID_VER}-${OP_UNAME}"
        echo "CUSTOM_LOCALVERSION=$CUSTOM_LOCALVERSION" >> "$GITHUB_ENV"
        echo "✅ LOCALVERSION set to: $CUSTOM_LOCALVERSION"

    - name: Disable GPUEB (MTK 5.10 only)
      shell: bash
      if: >-
        ${{ env.KERNEL_VER == '5.10' &&
            (startsWith(env.OP_SOC, 'dimensity') || startsWith(env.OP_SOC, 'helio')) }}
      run: |
        set -euo pipefail
        echo "Disabling GPUEB for MTK kernel 5.10"
        sed -i '/obj-y.*gpueb/d' \
          "$COMMON_KERNEL_FOLDER/drivers/gpu/mediatek/Makefile"
        echo "✅ GPUEB disabled"

    # ══════════════════════════════════════════════════════════════
    # SECTION 10 — KERNEL BUILD
    # ══════════════════════════════════════════════════════════════

    - name: Build Kernel
      shell: bash     
      env:
        PYTHONWARNINGS: "ignore:invalid escape sequence"
      run: |
        set -euo pipefail
        echo "::group::Build kernel"

        cd "$COMMON_KERNEL_FOLDER"
        : > .scmversion

        COMMIT_TIMESTAMP=$(git log -1 --format=%ct 2>/dev/null || date +%s)

        # Reproducible build prefix maps
        MAP="-fdebug-prefix-map=${GITHUB_WORKSPACE}=."
        MPMAP="-fmacro-prefix-map=${GITHUB_WORKSPACE}=."
        FPMAP="-ffile-prefix-map=${GITHUB_WORKSPACE}=."

        export KCFLAGS="${KCFLAGS:-} $MAP $MPMAP $FPMAP \
          -no-canonical-prefixes \
          -fdiagnostics-color=never \
          -Qunused-arguments \
          -Wno-unused-command-line-argument \
          -D__ANDROID_COMMON_KERNEL__"
        export KCPPFLAGS="${KCPPFLAGS:-} $MAP $MPMAP $FPMAP"

        # AutoFDO: only for kernel 6.12
        if [ "$KERNEL_VER" = "6.12" ]; then
          echo "CONFIG_AUTOFDO_CLANG=y" \
            >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
          echo "✅ CONFIG_AUTOFDO_CLANG enabled"
        fi

        if [ -n "${AFDO_PROFILE_PATH:-}" ]; then
          export CLANG_AUTOFDO_PROFILE="$AFDO_PROFILE_PATH"
          echo "✅ CLANG_AUTOFDO_PROFILE=$CLANG_AUTOFDO_PROFILE"
        fi

        export LLVM=1 LLVM_IAS=1
        export ARCH=arm64 SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export PAHOLE="$KERNEL_PLATFORM_FOLDER/prebuilts/kernel-build-tools/linux-x86/bin/pahole"
        export LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
        export OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

        set +u
        source "$KERNEL_PLATFORM_FOLDER/build/kernel/_setup_env.sh" 2>/dev/null || true
        set -u

        export SOURCE_DATE_EPOCH="$COMMIT_TIMESTAMP"
        export KBUILD_BUILD_TIMESTAMP="$(date -u)"
        export KBUILD_BUILD_USER="${BUILD_USER:-kernel}"
        export KBUILD_BUILD_HOST="${BUILD_HOST:-kleaf}"
        export KBUILD_BUILD_VERSION=1

        export CC="ccache clang"
        export CXX="ccache clang++"
        export HOSTCC="ccache clang"
        export HOSTCXX="ccache clang++"

        BASE_PATH="/usr/lib/ccache:${CLANG_BIN_PATH}"
        BASE_PATH="${BASE_PATH}:${KERNEL_PLATFORM_FOLDER}/prebuilts/kernel-build-tools/linux-x86/bin"
        BASE_PATH="${BASE_PATH}:${KERNEL_PLATFORM_FOLDER}/prebuilts/kernel-build-tools/linux_musl-x86/bin"

        if [ -n "${RUSTC_BIN_PATH:-}" ]; then
          export PATH="${BASE_PATH}:${RUSTC_BIN_PATH}:${PATH}"
          export RUSTC="$RUSTC_BIN_PATH/rustc"
          if [ "$OP_RUST_BUILD" = "true" ]; then
            export LIBCLANG_PATH="$CLANG_BIN_PATH/../lib"
            export BINDGEN="bindgen"
          fi
        else
          export PATH="${BASE_PATH}:${PATH}"
        fi

        [ "${{ inputs.clean }}" = "true" ] && export CCACHE_DISABLE=1

        OUT=out
        mkdir -p "$OUT"

        make O="$OUT" gki_defconfig

        # Apply LOCALVERSION
        LOCAL_LOCALVERSION="${CUSTOM_LOCALVERSION:--OP-WILD}"
        scripts/config --file "$OUT/.config" --set-str LOCALVERSION "${LOCAL_LOCALVERSION}"
        scripts/config --file "$OUT/.config" -d LOCALVERSION_AUTO || true
        sed -i 's/scm_version="$(scm_version --short)"/scm_version=""/' \
          scripts/setlocalversion

        # Optimization level
        if [ "${{ inputs.optimize_level }}" = "O3" ]; then
          scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE
          scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE_O3
          KCFLAGS_EXTRA="-O3"
        else
          scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE
          scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE_O3
          KCFLAGS_EXTRA="-O2"
        fi

        # LTO mode
        case "$OP_LTO" in
          none)
            scripts/config --file "$OUT/.config" -e LTO_CLANG
            scripts/config --file "$OUT/.config" -e LTO_CLANG_NONE
            scripts/config --file "$OUT/.config" -d LTO_CLANG_THIN
            scripts/config --file "$OUT/.config" -d LTO_CLANG_FULL
            ;;
          thin)
            scripts/config --file "$OUT/.config" -e LTO_CLANG
            scripts/config --file "$OUT/.config" -e LTO_CLANG_THIN
            scripts/config --file "$OUT/.config" -d LTO_CLANG_NONE
            scripts/config --file "$OUT/.config" -d LTO_CLANG_FULL
            ;;
          full)
            scripts/config --file "$OUT/.config" -e LTO_CLANG
            scripts/config --file "$OUT/.config" -e LTO_CLANG_FULL
            scripts/config --file "$OUT/.config" -d LTO_CLANG_NONE
            scripts/config --file "$OUT/.config" -d LTO_CLANG_THIN
            ;;
          *)
            echo "::error::Unsupported LTO option: $OP_LTO"
            exit 1
            ;;
        esac

        # Disable kunit tests (speeds up build, reduces noise)
        for sym in \
          CONFIG_REGMAP_KUNIT \
          CONFIG_INPUT_KUNIT_TEST \
          CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST \
          CONFIG_SND_SOC_UTILS_KUNIT_TEST \
          CONFIG_HID_KUNIT_TEST \
          CONFIG_RTC_LIB_KUNIT_TEST \
          CONFIG_CLK_KUNIT_TEST \
          CONFIG_CLK_GATE_KUNIT_TEST \
          CONFIG_IIO_FORMAT_KUNIT_TEST \
          CONFIG_EXT4_KUNIT_TESTS \
          CONFIG_FAT_KUNIT_TEST; do
          scripts/config --file "$OUT/.config" -d "$sym" 2>/dev/null || true
        done

        make O="$OUT" olddefconfig

        KCFLAGS="$KCFLAGS -Wno-error -pipe -fno-stack-protector ${KCFLAGS_EXTRA}"
        KCPPFLAGS="$KCPPFLAGS -DCONFIG_OPTIMIZE_INLINING"

        BUILD_START=$(date +%s)
        set -o pipefail
        make -j"$(nproc --all)" O="$OUT" \
          KCFLAGS="$KCFLAGS" \
          KCPPFLAGS="$KCPPFLAGS" \
          2>&1 | tee build.log
        BUILD_END=$(date +%s)
        BUILD_TIME=$((BUILD_END - BUILD_START))

        {
          echo "BUILD_START=$BUILD_START"
          echo "BUILD_END=$BUILD_END"
          echo "BUILD_TIME=$BUILD_TIME"
        } >> "$GITHUB_ENV"

        [ -f "$OUT/arch/arm64/boot/Image" ] \
          || { echo "::error::Kernel Image missing after build"; exit 1; }

        echo "✅ Build completed in ${BUILD_TIME}s"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # SECTION 11 — POST-BUILD STATS & IMAGE VALIDATION
    # ══════════════════════════════════════════════════════════════

    - name: 📊 ccache Post-Build Statistics
      id: ccache_stats
      if: ${{ always() && inputs.clean != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        STATS="$(ccache -s)"

        CACHEABLE=$(echo "$STATS" \
          | awk '/Cacheable calls:/ { match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH) }' \
          | head -n1)
        HITS=$(echo "$STATS" \
          | awk '/^[[:space:]]*Hits:/ { match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH) }' \
          | head -n1)
        DIRECT=$(echo "$STATS" \
          | awk '/Direct:/ { match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH) }' \
          | head -n1)

        if [ "${CACHEABLE:-0}" -gt 0 ]; then
          HIT_RATE=$(awk    -v h="${HITS:-0}"   -v c="$CACHEABLE" \
            'BEGIN{printf "%.1f", (h/c)*100}')
          DIRECT_RATE=$(awk -v d="${DIRECT:-0}" -v c="$CACHEABLE" \
            'BEGIN{printf "%.1f", (d/c)*100}')
        else
          HIT_RATE="0.0"
          DIRECT_RATE="0.0"
        fi

        echo "hit_rate=${HIT_RATE}%"       >> "$GITHUB_OUTPUT"
        echo "direct_rate=${DIRECT_RATE}%" >> "$GITHUB_OUTPUT"
        echo "📊 ccache hit rate: ${HIT_RATE}% | direct: ${DIRECT_RATE}%"

    # ── Single authoritative Image path resolution ─────────────
    - name: 🔍 Resolve Kernel Image Path
      id: image_path
      shell: bash
      run: |
        set -euo pipefail
        candidates=(
          "$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image"
          "$KERNEL_PLATFORM_FOLDER/out/${OP_ANDROID_VERSION}-${OP_KERNEL_VERSION}/dist/Image"
          "$KERNEL_PLATFORM_FOLDER/bazel-bin/common/kernel_aarch64/Image"
        )
        for p in "${candidates[@]}"; do
          if [ -f "$p" ]; then
            echo "image_path=$p" >> "$GITHUB_OUTPUT"
            echo "✅ Kernel Image found: $p"
            exit 0
          fi
        done
        echo "::error::Kernel Image not found in any candidate path:"
        for p in "${candidates[@]}"; do echo "  - $p"; done
        exit 1

    - name: Collect Build Stats / Validate Image
      id: collect_stats
      shell: bash
      run: |
        set -euo pipefail

        IMG="${{ steps.image_path.outputs.image_path }}"

        # ARM64 format check
        if ! file "$IMG" | grep -qi 'ARM64'; then
          echo "::error::Image is not ARM64 format"
          file "$IMG"
          exit 1
        fi

        # Minimum size sanity check (~6 MB)
        IMG_SIZE=$(stat -c %s "$IMG")
        MIN_SIZE=6102400
        if [ "$IMG_SIZE" -lt "$MIN_SIZE" ]; then
          echo "::error::Image size too small: $(numfmt --to=iec-i --suffix=B "$IMG_SIZE")"
          exit 1
        fi

        # Warning count from build log
        if [ -f "$COMMON_KERNEL_FOLDER/build.log" ]; then
          WARNINGS_COUNT="$(grep -ciE '\bwarning:' \
            "$COMMON_KERNEL_FOLDER/build.log" || true)"
          [ -n "$WARNINGS_COUNT" ] || WARNINGS_COUNT="0"
        else
          WARNINGS_COUNT="0"
        fi

        IMG_SHA256=$(sha256sum "$IMG" | awk '{print $1}')

        # Extract kernel uname string embedded in Image
        KERNEL_UNAME=$(strings "$IMG" | grep -E 'Linux version.*#' | tail -n1 || true)
        [ -n "$KERNEL_UNAME" ] \
          && echo "KERNEL_UNAME=$KERNEL_UNAME" >> "$GITHUB_ENV" \
          || echo "::warning::Could not extract kernel uname from Image"

        {
          printf 'warnings_count=%s\n' "$WARNINGS_COUNT"
          printf 'image_sha256=%s\n'   "$IMG_SHA256"
          printf 'build_time=%s\n'     "${BUILD_TIME:-0}"
        } >> "$GITHUB_OUTPUT"

        echo "✅ Image validated — SHA256: $IMG_SHA256"
        echo "   Size   : $(numfmt --to=iec-i --suffix=B "$IMG_SIZE")"
        echo "   Warnings: $WARNINGS_COUNT"

    # ══════════════════════════════════════════════════════════════
    # SECTION 12 — KPM PATCH & ZIP PACKAGING
    # ══════════════════════════════════════════════════════════════

    - name: Apply KPM patch_linux to Image
      if: ${{ inputs.kpm_mode == 'KPM' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply KPM patch_linux"

        IMG="${{ steps.image_path.outputs.image_path }}"
        cp "$IMG" "$AK3_FOLDER/Image"

        cd "$GITHUB_WORKSPACE"
        [ -d "SukiSU_patch" ] \
          || git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git

        PATCH_LINUX="$GITHUB_WORKSPACE/SukiSU_patch/kpm/patch_linux"
        [ -f "$PATCH_LINUX" ] \
          || { echo "::error::patch_linux binary not found"; exit 1; }

        chmod +x "$PATCH_LINUX"
        cd "$AK3_FOLDER"
        cp "$PATCH_LINUX" .
        ./patch_linux

        [ -f oImage ] \
          || { echo "::error::oImage not generated by patch_linux"; exit 1; }

        mv -f oImage Image
        rm -f patch_linux

        echo "✅ KPM patch applied — Image replaced"
        echo "::endgroup::"

    - name: Download Latest SUSFS Module from CI
      continue-on-error: true
      shell: bash
      run: |
        set -euo pipefail

        LATEST_RUN_ID=$(curl -fsSL \
          -H "Authorization: Bearer ${{ github.token }}" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs?status=success" \
          | jq -r '.workflow_runs[] | select(.head_branch == "v1.5.2+") | .id' \
          | head -n1)

        if [ -z "$LATEST_RUN_ID" ] || [ "$LATEST_RUN_ID" = "null" ]; then
          echo "⚠️ No successful run found for branch v1.5.2+ — skipping"
          exit 0
        fi

        ARTIFACT_URL=$(curl -fsSL \
          -H "Authorization: Bearer ${{ github.token }}" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/${LATEST_RUN_ID}/artifacts" \
          | jq -r '.artifacts[0].archive_download_url')

        if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
          echo "⚠️ Could not resolve artifact URL — skipping"
          exit 0
        fi

        curl -fsSL \
          -H "Authorization: Bearer ${{ github.token }}" \
          -o "$AK3_FOLDER/ksu_module_susfs_1.5.2+_CI.zip" \
          "$ARTIFACT_URL"

        echo "✅ SUSFS module CI artifact downloaded"

    - name: Create Kernel ZIP
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Create kernel ZIP package"

        IMG="${{ steps.image_path.outputs.image_path }}"
        [ -f "$IMG" ] || { echo "::error::Image not found: $IMG"; exit 1; }

        # Only copy Image if KPM step did not already place a patched one
        if [ "${{ inputs.kpm_mode }}" != "KPM" ]; then
          cp "$IMG" "$AK3_FOLDER/Image"
        fi

        cd "$AK3_FOLDER"

        KPM_TAG="${{ inputs.kpm_mode }}"
        if [ "$OP_SUSFS" = "true" ]; then
          ZIP_NAME="AK3_${OP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_ReSukiSU_${KSUVER:-unknown}_SuSFS_${SUSVER:-unknown}_${KPM_TAG}.zip"
        else
          ZIP_NAME="AK3_${OP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_ReSukiSU_${KSUVER:-unknown}_${KPM_TAG}.zip"
        fi

        mkdir -p "$ARTIFACTS_FOLDER"

        if ! zip -r9 "$ZIP_NAME" ./* \
             -x "*.git*"    \
             -x "$ZIP_NAME" \
             -x "README.md" \
             2>&1 | tee /tmp/zip.log; then
          echo "::error::Failed to create ZIP package"
          cat /tmp/zip.log
          exit 1
        fi

        mv "$ZIP_NAME" "$ARTIFACTS_FOLDER/"

        # Keep only the ZIP and the metadata .txt in artifacts folder
        find "$ARTIFACTS_FOLDER" -maxdepth 1 -type f \
          ! -name "$ZIP_NAME" \
          ! -name "${OP_MODEL}_${OP_OS_VERSION}.txt" \
          -delete

        echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
        echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

        ZIP_SIZE=$(stat -c%s "$ARTIFACTS_FOLDER/$ZIP_NAME")
        echo "✅ ZIP created: $ZIP_NAME ($(numfmt --to=iec-i --suffix=B "$ZIP_SIZE"))"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # SECTION 13 — FINAL SUMMARY & UPLOAD
    # ══════════════════════════════════════════════════════════════

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "════════════════════════════════════════"
          echo " Build Summary"
          echo "════════════════════════════════════════"
          echo "Model        : ${OP_MODEL}"
          echo "OS Version   : ${OP_OS_VERSION}"
          echo "Android      : ${ANDROID_VER}"
          echo "Kernel base  : ${KERNEL_VER}"
          echo "Kernel full  : ${KERNEL_FULL_VER}"
          echo "Kernel uname : ${KERNEL_UNAME:-unknown}"
          echo "Build user   : ${BUILD_USER}"
          echo "Build host   : ${BUILD_HOST}"
          echo "────────────────────────────────────────"
          echo "ReSukiSU ver : ${KSUVER:-unknown}"
          echo "ReSukiSU SHA : ${KSU_COMMIT_SHA:-unknown}"
          echo "KPM Mode     : ${{ inputs.kpm_mode }}"
          if [ -f "$AK3_FOLDER/ksu_module_susfs_1.5.2+_CI.zip" ]; then
            echo "SUSFS module : included"
          else
            echo "SUSFS module : not included"
          fi
          if [ "$OP_SUSFS" = "true" ]; then
            echo "SUSFS ver    : ${SUSVER:-unknown}"
            echo "SUSFS branch : ${SUSFS_BRANCH_NAME:-unknown}"
            echo "SUSFS SHA    : ${SUSFS_COMMIT_SHA:-unknown}"
          fi
          echo "────────────────────────────────────────"
          echo "Optimization : ${{ inputs.optimize_level }}"
          echo "Clean build  : ${{ inputs.clean }}"
          echo "Image SHA256 : ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo "Warnings     : ${{ steps.collect_stats.outputs.warnings_count }}"
          echo "Build time   : ${{ steps.collect_stats.outputs.build_time }}s"
          if [ "${{ inputs.clean }}" != "true" ]; then
            echo "ccache hit   : ${{ steps.ccache_stats.outputs.hit_rate }}"
            echo "ccache direct: ${{ steps.ccache_stats.outputs.direct_rate }}"
          else
            echo "ccache       : disabled (clean build)"
          fi
          echo "ZIP          : ${ZIP_NAME:-unknown}"
          echo "════════════════════════════════════════"
        } | tee summary.txt

    - name: Normalize Artifact Suffix
      id: artifact_suffix
      shell: bash
      run: |
        set -euo pipefail
        ref="${{ inputs.ksu_branch_or_hash }}"
        [ -z "$ref" ] && ref="main"
        safe_ref=$(echo "$ref" | tr '/: @' '_' | tr -cd '[:alnum:]_.-')
        echo "safe_ref=$safe_ref" >> "$GITHUB_OUTPUT"
        echo "✅ Artifact suffix: $safe_ref"

    - name: Upload Artifacts
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v5
      with:
        name: >-
          kernel-${{ env.CONFIG }}_${{ env.OP_OS_VERSION }}-${{ env.OP_ANDROID_VERSION }}-${{ env.OP_KERNEL_VERSION }}-${{ inputs.kpm_mode }}-${{ inputs.optimize_level }}-${{ steps.artifact_suffix.outputs.safe_ref }}-${{ github.run_attempt }}
        path: ${{ env.ARTIFACTS_FOLDER }}/
        compression-level: 0
        retention-days: 20

    - name: 📤 Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: >-
          build-log-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ github.run_attempt }}
        path: ${{ env.COMMON_KERNEL_FOLDER }}/build.log
        retention-days: 3
        if-no-files-found: warn

    - name: Save ccache
      if: ${{ always() && inputs.clean != 'true' && steps.ccache_restore.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ env.CCACHE_KEY }}

