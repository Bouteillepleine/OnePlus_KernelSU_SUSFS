name: Build
permissions:
  contents: write
  actions: write

inputs:
  model:
    required: true
    type: string
  soc:
    required: true
    type: string
  branch:
    required: true
    type: string
  manifest:
    required: true
    type: string
  ksun_branch:
    required: true
    type: string
    default: stable
  susfs_commit_hash_or_branch:
    required: false
    type: string
    default: ""
  optimize_level:
    required: false
    type: string
    default: O2  # Choices: O2 or O3

outputs:
  kernel_version:
    value: ${{ steps.save_metadata.outputs.kernel_version }}
  ksu_version:
    value: ${{ steps.save_metadata.outputs.ksu_version }}
  susfs_version:
    value: ${{ steps.save_metadata.outputs.susfs_version }}
  image_sha256:
    value: ${{ steps.collect_stats.outputs.image_sha256 }}
  warnings:
    value: ${{ steps.collect_stats.outputs.warnings }}
  kernel_release:
    value: ${{ steps.collect_stats.outputs.kernel_release }}

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        model='${{ inputs.model }}'
        if [[ -z "$model" ]]; then
          echo "Empty model not allowed"; exit 1
        fi
        echo "Input validation OK."

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3
        sudo apt-get clean
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="${{ inputs.model }}"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        echo "Creating folder for configuration: $CONFIG"
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        echo "Initializing and syncing kernel source..."
        if [[ "${{ inputs.manifest }}" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' \
            "${{ inputs.manifest }}" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 \
            --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "${{ inputs.branch }}" -m "${{ inputs.manifest }}" \
            --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        "$REPO" --version
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch \
             -j"$(nproc --all)" --fail-fast; then
            success=true
            break
          fi
          echo "repo sync attempt $i failed; retrying..."
          sleep 30
        done
        $success || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$CONFIG_DIR/kernel_platform/common"
        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done
        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"; exit 1
        fi
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        if [ -z "$ANDROID_VERSION" ]; then
          echo "Could not parse android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        cd "$ARTIFACTS_DIR"
        echo "$ANDROID_VERSION-$FULL_VERSION" > "${{ inputs.model }}.txt"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "BRANCH_VALUE=$BRANCH_VALUE" >> "$GITHUB_ENV"

    - name: Clone AnyKernel3 and Other Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "Cloning AnyKernel3 and other dependencies..."
        ANYKERNEL_BRANCH="gki-2.0"
        if [[ -z "${{ inputs.susfs_commit_hash_or_branch }}" ]]; then
          SUSFS_BRANCH="${{ env.SUSFS_KERNEL_BRANCH }}"
        else
          SUSFS_BRANCH="${{ inputs.susfs_commit_hash_or_branch }}"
        fi
        echo "Using AnyKernel3 branch: $ANYKERNEL_BRANCH"
        echo "Using SUSFS branch: $SUSFS_BRANCH"
        git clone --depth=1 https://github.com/Bouteillepleine/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
        git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git
        git clone https://gitlab.com/simonpunk/susfs4ksu.git
        cd susfs4ksu
        if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1 || git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        else
          echo "Error: SUSFS branch or ref '$SUSFS_BRANCH' not found."
          exit 1
        fi

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f common/android/abi_gki_protected_exports_* || true
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        df -h

    - name: Add KernelSU Next
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        echo "Adding KernelSU Next..."
        if [ "${{ inputs.ksun_branch }}" = "stable" ]; then
          curl --fail --location --proto '=https' \
            -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
        else
          curl --fail --location --proto '=https' \
            -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s "${{ inputs.ksun_branch }}"
        fi
        git submodule update --init --recursive

    - name: Apply SUSFS Patches
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        echo "Applying SUSFS patches..."
        cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_${{ env.SUSFS_KERNEL_BRANCH }}.patch ./common/
        cp ../../susfs4ksu/kernel_patches/fs/* ./common/fs/
        cp ../../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
        cd ./KernelSU-Next
        susfs_version=$(grep '#define SUSFS_VERSION' ../common/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        BASE_VERSION=10200
        cd ./kernel
        KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" $BASE_VERSION)
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
        cd ..
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        echo "KernelSU Next Version: $KSU_VERSION"
        echo "SusFS Version: $susfs_version"
        case "$susfs_version" in
          "v1.5.5"|"v1.5.6"|"v1.5.7")
            cp "../../../kernel_patches/next/0001-kernel-implement-susfs-v1.5.5-v1.5.7-KSUN-v1.0.8.patch" "./ksun_susfs_latest.patch"
            ;;
          "v1.5.8")
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch  || true
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_apk_sign.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_apk_sign.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_core_hook.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_core_hook.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_selinux.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_selinux.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_ksud.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_ksud.c.patch
            ;;
          "v1.5.9")
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --forward < 10_enable_susfs_for_ksu.patch  || true
            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -printf "%f\n" | cut -d'.' -f1); do
              echo "Patching file: $file.c with fix_$file.c.patch"
              patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_$file.c.patch"
            done
            patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch"
            ;;
          *)
            echo "Invalid version: $susfs_version"
            exit 1
            ;;
        esac
        patch -p1 --forward < ksun_susfs_latest.patch || true
        cd ../common
        if [ "${{ env.ANDROID_VER }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
          fi
        fi
        patch -p1 < 50_add_susfs_in_${{ env.SUSFS_KERNEL_BRANCH }}.patch || true
        KERNEL_VERSION="${{ env.KERNEL_VER }}"
        MIN_VERSION="5.16"
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          echo "Patching ptrace!"
          patch -p1 -F 3 < "../../../kernel_patches/gki_ptrace.patch"
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi
        if [ "${{ inputs.model }}" == "OPAce5Pro" ] || [ "${{ inputs.model }}" == "OP13" ]; then
          echo "Patching hmbird!"
          echo 'obj-y += hmbird_patch.o' >> ./drivers/Makefile
          patch -p1 -F 3 < "../../../kernel_patches/oneplus/hmbird/hmbird_kernel_patch.patch"
          echo "Patching hmbird files!"
          cd ./kernel/sched
          rm -rf ext.c ext.h build_policy.c slim.h slim_sysctl.c
          patch -p1 -F 3 < "../../../../../kernel_patches/oneplus/hmbird/hmbird_files_patch.patch"
          cd ../../
        else
          echo "Not OPAce5Pro / OP13 , skipping fengchi patch"
        fi

    - name: Apply KSUN Hooks
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform/common"
        patch -p1 < ../../../kernel_patches/next/scope_min_manual_hooks_v1.4.patch

    - name: Apply Hide Stuff Patches
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform/common"
        cp ../../../kernel_patches/69_hide_stuff.patch ./
        patch -p1 -F 3 < 69_hide_stuff.patch

    - name: Add KernelSU-Next and SUSFS Configuration Settings
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
        CONFIG_KSU=y
        CONFIG_KSU_KPROBES_HOOK=n
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_SU=n
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        EOF

    - name: Add Oneplus BBR
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y
        CONFIG_NET_SCH_FQ_CODEL=y
        CONFIG_IP_ECN=y
        CONFIG_TCP_ECN=y
        CONFIG_IPV6_ECN=y
        CONFIG_IP_NF_TARGET_ECN=y
        EOF

    - name: Add TTL Target Support
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        EOF

    - name: Add Build based configs
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
        CONFIG_LTO_CLANG_THIN=y
        CONFIG_LTO_CLANG=y
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n
        CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y
        CONFIG_OPTIMIZE_INLINING=y
        CONFIG_DEBUG_KERNEL=n
        CONFIG_DYNAMIC_DEBUG=n
        CONFIG_DEBUG_INFO=n
        CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y
        EOF

    - name: Disable OnePlus Kernel Module
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        sed -i 's/CONFIG_REGMAP_KUNIT=m/CONFIG_REGMAP_KUNIT=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_INPUT_KUNIT_TEST=m/CONFIG_INPUT_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=m/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_SND_SOC_UTILS_KUNIT_TEST=m/CONFIG_SND_SOC_UTILS_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_HID_KUNIT_TEST=m/CONFIG_HID_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_RTC_LIB_KUNIT_TEST=m/CONFIG_RTC_LIB_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_CLK_KUNIT_TEST=m/CONFIG_CLK_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_CLK_GATE_KUNIT_TEST=m/CONFIG_CLK_GATE_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_IIO_FORMAT_KUNIT_TEST=m/CONFIG_IIO_FORMAT_KUNIT_TEST=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_EXT4_KUNIT_TESTS=m/CONFIG_EXT4_KUNIT_TESTS=n/g' "$CONFIG_FILE"
        sed -i 's/CONFIG_FAT_KUNIT_TEST=m/CONFIG_FAT_KUNIT_TEST=n/g' "$CONFIG_FILE"

    - name: Commit Applied Patches & Config Edits
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COMMON="$KP/common"
        cd "$COMMON"
        git config user.name "CI"
        git config user.email "ci@localhost"
        if [ -d KernelSU-Next ]; then
          cd KernelSU-Next
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "CI: Apply KernelSU-Next patches" || true
          fi
          cd ..
        fi
        if ! git diff --quiet || ! git diff --cached --quiet; then
          git add -A
          git commit -m "CI: Apply patches and config for clean build" || true
        else
          echo "No changes to commit; tree already clean."
        fi
        git status --short

    - name: Customize Kernel Branding
      id: branding
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COMMON="$KERNEL_PATH/common"
        cd "$COMMON"
        KV_MAJOR=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        KV_MINOR=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        KV_SUBLVL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        BASE_NUM="${KV_MAJOR}.${KV_MINOR}.${KV_SUBLVL}"
        ANDROID_VER="${ANDROID_VER:-androidX}"
        RAW_BRANCH="${BRANCH_VALUE:-unknown-branch}"
        BRANCH_TOKEN="$(printf '%s' "$RAW_BRANCH" | tr -c 'A-Za-z0-9._-+' '-')"
        [ -z "$BRANCH_TOKEN" ] && BRANCH_TOKEN="branch"
        FULL_HASH="$(git rev-parse HEAD 2>/dev/null || echo 0000000000000000000000000000000000000000)"
        CUSTOM_LOCALVERSION="-${ANDROID_VER}-${KV_SUBLVL}-${BRANCH_TOKEN}-${FULL_HASH}"
        CANDIDATE="${BASE_NUM}${CUSTOM_LOCALVERSION}"
        if [ "${#CANDIDATE}" -gt 64 ]; then
          FIXED_LEN=$(( ${#BASE_NUM} + 1 + ${#ANDROID_VER} + 1 + ${#KV_SUBLVL} + 1 + 1 + 40 ))
          MAX_BRANCH_LEN=$((64 - FIXED_LEN))
          if [ "$MAX_BRANCH_LEN" -lt 1 ]; then
            echo "ERROR: Pattern too long even with 1-char branch."
            exit 1
          fi
          ORIG_BRANCH="$BRANCH_TOKEN"
          BRANCH_TOKEN="$(printf '%s' "$BRANCH_TOKEN" | cut -c1-$MAX_BRANCH_LEN)"
          [ -z "$BRANCH_TOKEN" ] && BRANCH_TOKEN="b"
          echo "Trimming branch token from '$ORIG_BRANCH' to '$BRANCH_TOKEN'."
          CUSTOM_LOCALVERSION="-${ANDROID_VER}-${KV_SUBLVL}-${BRANCH_TOKEN}-${FULL_HASH}"
          CANDIDATE="${BASE_NUM}${CUSTOM_LOCALVERSION}"
          if [ "${#CANDIDATE}" -gt 64 ]; then
            echo "ERROR: Still exceeds 64 chars after trimming."
            exit 1
          fi
        fi
        echo "Planned UTS_RELEASE: $CANDIDATE"
        echo "CUSTOM_LOCALVERSION=$CUSTOM_LOCALVERSION" >> "$GITHUB_ENV"
        echo "FULL_HASH=$FULL_HASH" >> "$GITHUB_ENV"
        echo "BRANCH_TOKEN=$BRANCH_TOKEN" >> "$GITHUB_ENV"
        echo "FINAL_UTS_CANDIDATE=$CANDIDATE" >> "$GITHUB_ENV"

    - name: Save Build Metadata
      id: save_metadata
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        cd "$ARTIFACTS_DIR"
        echo "kernel_version=${{ env.KERNEL_FULL_VER }}" >> "$GITHUB_OUTPUT"
        echo "ksu_version=${KSUVER:-unknown}" >> "$GITHUB_OUTPUT"
        echo "susfs_version=${SUSVER:-unknown}" >> "$GITHUB_OUTPUT"

    - name: Detect Clang (toolchain for build)
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false
        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done
        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
          echo "Using system clang."
        fi
        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "Detected Clang: $CLANG_VERSION"

    - name: Build Kernel
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COMMON="$KERNEL_PATH/common"
        cd "$COMMON"
        if [ -n "${CLANG_BIN_PATH:-}" ] && [ -x "${CLANG_BIN_PATH}/clang" ]; then
          export PATH="${CLANG_BIN_PATH}:$PATH"
        fi
        export LLVM=1 LLVM_IAS=1
        export ARCH=arm64 SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_COMPAT=arm-linux-androideabi-
        export LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++
        export CC=clang
        OUT=out
        mkdir -p "$OUT"
        make O="$OUT" gki_defconfig
        # Ensure we control LOCALVERSION ourselves
        scripts/config --file "$OUT/.config" -d LOCALVERSION_AUTO || true
        if [ -z "${CUSTOM_LOCALVERSION:-}" ]; then
          echo "ERROR: CUSTOM_LOCALVERSION not set (branding step missing?)"
          exit 1
        fi
        scripts/config --file "$OUT/.config" --set-str LOCALVERSION "${CUSTOM_LOCALVERSION}"
        if [ "${{ inputs.optimize_level }}" = "O3" ]; then
          scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE || true
          scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE_O3 || true
          export KCFLAGS="-Wno-error -pipe -O3 -fno-stack-protector"
        else
          scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE || true
          scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE_O3 || true
          export KCFLAGS="-Wno-error -pipe -O2 -fno-stack-protector"
        fi
        export KCPPFLAGS="-DCONFIG_OPTIMIZE_INLINING"
        make O="$OUT" olddefconfig
        echo "Building with LOCALVERSION=${CUSTOM_LOCALVERSION}"
        make -j"$(nproc --all)" O="$OUT" 2>&1 | tee build.log
        IMG="$OUT/arch/arm64/boot/Image"
        if [ ! -f "$IMG" ]; then
          echo "Kernel Image missing"; exit 1
        fi
        sha256sum "$IMG" | tee "$OUT/Image.sha256"
        if [ -f "$OUT/include/generated/utsrelease.h" ]; then
          ACTUAL_UTS=$(sed -n 's/^#define UTS_RELEASE "\(.*\)"/\1/p' "$OUT/include/generated/utsrelease.h")
          echo "Actual UTS_RELEASE: $ACTUAL_UTS"
          echo "KERNEL_RELEASE=$ACTUAL_UTS" >> "$GITHUB_ENV"
        fi

    - name: Collect Build Stats / Validate Image
      id: collect_stats
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COMMON="$KERNEL_PATH/common"
        OUT="$COMMON/out"
        cd "$COMMON"
        IMG="$OUT/arch/arm64/boot/Image"
        WARNINGS=$(grep -i -E 'warning:' "$COMMON/build.log" 2>/dev/null | wc -l || true)
        echo "$WARNINGS" > "$OUT/warnings.txt"
        if [ ! -f "$IMG" ]; then
          echo "ERROR: Kernel Image not found at $IMG"
          exit 1
        fi
        file "$IMG" > "$OUT/Image.file"
        if KERNEL_UNAME_LINE=$(strings "$IMG" 2>/dev/null | grep -E -m1 'Linux version'); then
          KERNEL_UNAME="$KERNEL_UNAME_LINE"
        else
          echo "Warning: Could not extract Linux version string from Image."
          KERNEL_UNAME="(unknown)"
        fi
        echo "Kernel Uname: $KERNEL_UNAME"
        echo "KERNEL_UNAME=$KERNEL_UNAME" >> "$GITHUB_ENV"
        KREL_RAW=$(sed -n 's/^#define UTS_RELEASE "\(.*\)"/\1/p' "$OUT/include/generated/utsrelease.h" 2>/dev/null || true)
        if [ -z "$KREL_RAW" ]; then
          KREL_RAW=$(make -s O="$OUT" kernelrelease 2>/dev/null || true)
        fi
        if [ -n "$KREL_RAW" ]; then
          KREL="${KREL_RAW%-dirty}"
          echo "Kernel release raw: $KREL_RAW"
          echo "Kernel release cleaned: $KREL"
          echo "KERNEL_RELEASE_RAW=$KREL_RAW" >> "$GITHUB_ENV"
          echo "KERNEL_RELEASE=$KREL" >> "$GITHUB_ENV"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"
        else
          echo "Could not determine kernelrelease"
          echo "kernel_release=unknown" >> "$GITHUB_OUTPUT"
        fi
        if ! file "$IMG" | grep -qi 'ARM64'; then
          echo "Image does not appear to be ARM64:"
          file "$IMG"
          exit 1
        fi
        MIN_SIZE=$((6 * 1024 * 1024))
        ACTUAL_SIZE=$(stat -c %s "$IMG")
        if [ "$ACTUAL_SIZE" -lt "$MIN_SIZE" ]; then
          echo "Image size $ACTUAL_SIZE < $MIN_SIZE (suspicious)"
          exit 1
        fi
        if [ -f "$OUT/Image.sha256" ]; then
          IMAGE_SHA256=$(cut -d' ' -f1 "$OUT/Image.sha256")
        else
          IMAGE_SHA256=$(sha256sum "$IMG" | cut -d' ' -f1)
          echo "$IMAGE_SHA256  $IMG" > "$OUT/Image.sha256"
        fi
        echo "Image sha256: $IMAGE_SHA256"
        echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
        echo "image_sha256=$IMAGE_SHA256" >> "$GITHUB_OUTPUT"

    - name: Create Kernel ZIP
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        IMAGE_PATH="$CONFIG_DIR/kernel_platform/common/out/arch/arm64/boot/Image"
        if [ ! -f "$IMAGE_PATH" ]; then
          echo "ERROR: Built Image not found"
          exit 1
        fi
        cp "$IMAGE_PATH" "$GITHUB_WORKSPACE/AnyKernel3/Image"
        cd "$GITHUB_WORKSPACE/AnyKernel3"
        if [ "${{ inputs.model }}" = "OPAce5Pro" ] || [ "${{ inputs.model }}" = "OP13" ]; then
          cp "$GITHUB_WORKSPACE/kernel_patches/oneplus/hmbird/bins/"* ./tools/ 2>/dev/null || true
          patch -F 3 < "$GITHUB_WORKSPACE/kernel_patches/oneplus/hmbird/ak3_hmbird_patch.patch"
        fi
        COMMON_DIR="$CONFIG_DIR/kernel_platform/common"
        SHORTSHA=$(git -C "$COMMON_DIR" rev-parse --short HEAD 2>/dev/null || echo "unknown")
        KREL_SAFE="${KERNEL_RELEASE:-unknown}"
        KREL_SAFE="$(echo "$KREL_SAFE" | sed 's/[^A-Za-z0-9._-]/_/g')"
        ZIP_NAME="AnyKernel3-${{ inputs.model }}-${KREL_SAFE}-KSU${KSUVER:-NA}-SUS${SUSVER:-NA}-${{ inputs.optimize_level }}-${SHORTSHA}.zip"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        echo "Creating flashable zip: $ZIP_NAME"
        ( cd "$GITHUB_WORKSPACE/AnyKernel3" && zip -r "$ARTIFACTS_DIR/$ZIP_NAME" ./* >/dev/null )
        find "$ARTIFACTS_DIR" -maxdepth 1 -type f ! -name "$ZIP_NAME" ! -name "${{ inputs.model }}.txt" -delete
        echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
        echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "Model: ${{ inputs.model }}"
          echo "Android: ${{ env.ANDROID_VER }}"
          echo "Kernel base: ${{ env.KERNEL_VER }}"
          echo "Kernel full (Makefile-derived): ${{ env.KERNEL_FULL_VER }}"
          echo "Kernel release (uname -r): ${KERNEL_RELEASE:-unknown}"
          echo "Kernel release raw: ${KERNEL_RELEASE_RAW:-unknown}"
          echo "Kernel Uname banner: ${KERNEL_UNAME:-unknown}"
          echo "KSU Version: ${KSUVER:-unknown}"
          echo "SUSFS Version: ${SUSVER:-unknown}"
          echo "Optimization: ${{ inputs.optimize_level }}"
          echo "Image SHA256: ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo "Compiler: ${CLANG_VERSION:-unknown}"
          echo "Warnings: ${{ steps.collect_stats.outputs.warnings }}"
          echo "ZIP: ${ZIP_NAME:-unknown}"
          echo "Planned UTS (pre-build): ${FINAL_UTS_CANDIDATE:-unknown}"
        } | tee summary.txt
        {
          echo "### Kernel Build Summary"
          echo ""
          echo "- Model: ${{ inputs.model }}"
          echo "- Android: ${{ env.ANDROID_VER }}"
          echo "- Kernel Version (Makefile base): ${{ steps.save_metadata.outputs.kernel_version }}"
          echo "- Kernel Release (uname -r): ${KERNEL_RELEASE:-unknown}"
          echo "- Kernel Release (raw): ${KERNEL_RELEASE_RAW:-unknown}"
          echo "- Kernel Uname (full banner): ${KERNEL_UNAME:-unknown}"
          echo "- KSU Version: ${KSUVER:-unknown}"
          echo "- SUSFS Version: ${SUSVER:-unknown}"
          echo "- Optimization: ${{ inputs.optimize_level }}"
          echo "- Image SHA256: ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo "- Warnings: ${{ steps.collect_stats.outputs.warnings }}"
          echo "- Compiler: ${CLANG_VERSION:-unknown}"
          echo "- Planned UTS_RELEASE (pre-build): ${FINAL_UTS_CANDIDATE:-unknown}"
          echo "- ZIP Name: ${ZIP_NAME:-unknown}"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Workspace Cleanup (reduce artifact size)
      shell: bash
      run: |
        set -euo pipefail
        echo "Disk usage before cleanup:"
        du -sh $GITHUB_WORKSPACE/* || true
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        find "$CONFIG_DIR" -mindepth 1 -maxdepth 1 -type d ! -name artifacts -exec rm -rf {} +
        rm -rf "$GITHUB_WORKSPACE/kernel_patches" || true
        rm -rf "$GITHUB_WORKSPACE/AnyKernel3/.git" || true
        echo "Disk usage after cleanup:"
        du -sh $GITHUB_WORKSPACE/* || true

    - name: Upload Artifacts
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
