name: Build
permissions:
  contents: write
  actions: write

inputs:
  model:
    required: true
    type: string
  soc:
    required: true
    type: string
  branch:
    required: true
    type: string
  manifest:
    required: true
    type: string
  android_version:
    required: true
    type: string
  kernel_version:
    required: true
    type: string
  ksun_branch:
    required: true
    type: string
    default: stable
  susfs_branch:
    required: true
    type: string
    default: ""

runs:
  using: "composite"
  steps:

- name: Initialize Environment
  shell: bash
  run: |
  set -euo pipefail
  echo "CONFIG=${{ inputs.model }}" >> "$GITHUB_ENV"
  echo "ANDROID_VER=${{ inputs.android_version }}" >> "$GITHUB_ENV"
  echo "KERNEL_SERIES=${{ inputs.kernel_version }}" >> "$GITHUB_ENV"

- name: Setup Build System
  shell: bash
  run: |
    set -euo pipefail
    export DEBIAN_FRONTEND=noninteractive
    echo "DEBIAN_FRONTEND=noninteractive" >> "$GITHUB_ENV"
    df -h
    sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/powershell \
      /usr/share/swift || true
    sudo docker image prune --all --force || true
    sudo apt-get purge -y aria2 ansible azure-cli shellcheck rpm xorriso zsync \
      esl-erlang firefox gfortran-8 gfortran-9 google-chrome-stable google-cloud-sdk \
      imagemagick libmagickcore-dev libmagickwand-dev libmagic-dev ant ant-optional \
      kubectl mercurial apt-transport-https mono-complete libmysqlclient unixodbc-dev \
      yarn chrpath libssl-dev libxft-dev libfreetype6 libfreetype6-dev libfontconfig1 \
      libfontconfig1-dev snmp pollinate libpq-dev postgresql-client powershell ruby-full \
      sphinxsearch subversion mongodb-org microsoft-edge-stable || true
    sudo apt-get purge -y "$(dpkg-query -W -f='${binary:Package}\n' | grep -E '^mysql|^php|^dotnet' || true)" || true
    sudo apt-get autoremove -y
    sudo apt-get autoclean -y
    df -h

- name: Install Dependencies
  shell: bash
  run: |
    set -euo pipefail
    sudo rm -f /var/lib/apt/lists/lock /var/lib/dpkg/lock
    sudo apt update -qq
    sudo DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends \
      python3 git curl libelf-dev libelf1 lld \
      build-essential flex bison libssl-dev \
      libncurses-dev liblz4-tool zlib1g-dev \
      libxml2-utils rsync unzip python3 python-is-python3 jq lz4

- name: Install Repo Tool
  shell: bash
  run: |
    set -euo pipefail
    mkdir -p ./git-repo
    curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
    chmod a+rx ./git-repo/repo
    echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> "$GITHUB_ENV"
    echo "CONFIG=${{ inputs.model }}" >> "$GITHUB_ENV"

- name: Clone AnyKernel3 and Other Dependencies
  shell: bash
  run: |
    set -euo pipefail
    echo "Cloning AnyKernel3 and other dependencies..."
    ANYKERNEL_BRANCH="gki-2.0"
    if [[ -z "${{ inputs.susfs_branch }}" ]]; then
      SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
    else
      SUSFS_BRANCH="${{ inputs.susfs_branch }}"
    fi
    echo "AnyKernel3 branch: $ANYKERNEL_BRANCH"
    echo "SUSFS branch: $SUSFS_BRANCH"
    git clone https://github.com/Bouteillepleine/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
    git clone https://github.com/TheWildJames/kernel_patches.git
    git clone https://gitlab.com/simonpunk/susfs4ksu.git
    cd susfs4ksu
    if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1 || git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1 ; then
      git checkout "$SUSFS_BRANCH"
    else
      echo "ERROR: SUSFS ref '$SUSFS_BRANCH' not found"
      exit 1
    fi

- name: Initialize and Sync Kernel Source
  shell: bash
  run: |
    set -euo pipefail
    mkdir -p "$CONFIG"
    cd "$CONFIG"
    if [[ "${{ inputs.manifest }}" == https://* ]]; then
      mkdir -p .repo/manifests
      curl -Ls "${{ inputs.manifest }}" -o .repo/manifests/temp_manifest.xml
      "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml \
        --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
    else
      "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "${{ inputs.branch }}" -m "${{ inputs.manifest }}" \
        --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
    fi
    "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch \
      -j"$(nproc --all)" --fail-fast --current-branch --force-sync --fetch-submodules

- name: Clean Up ABI Protected Exports
  shell: bash
  run: |
    set -euo pipefail
    cd "$CONFIG/kernel_platform"
    rm -f common/android/abi_gki_protected_exports_* || true
    rm -f msm-kernel/android/abi_gki_protected_exports_* || true

- name: Add KernelSU Next
  shell: bash
  run: |
    set -euo pipefail
    cd "$CONFIG/kernel_platform"
    if [ "${{ inputs.ksun_branch }}" = "stable" ]; then
      curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
    else
      curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s "${{ inputs.ksun_branch }}"
    fi
    git submodule update --init --recursive

- name: Apply SUSFS Patches
  id: apply_susfs
  shell: bash
  run: |
    set -euo pipefail
    cd "$CONFIG/kernel_platform"
    cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
    cp ../../susfs4ksu/kernel_patches/fs/* ./common/fs/
    cp ../../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
    cd KernelSU-Next
    susfs_version=$(grep '#define SUSFS_VERSION' ../common/include/linux/susfs.h | awk -F'"' '{print $2}')
    echo "SUSVER=$susfs_version" >> "$GITHUB_ENV"
    BASE_VERSION=10200
    cd kernel
    KSU_VERSION=$(( $(git rev-list --count HEAD) + BASE_VERSION ))
    sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile || true
    cd ..
    echo "KSUVER=$KSU_VERSION" >> "$GITHUB_ENV"
    echo "Detected SUSFS: $susfs_version  KernelSU Next: $KSU_VERSION"

    case "$susfs_version" in
      v1.5.5|v1.5.6|v1.5.7)
        cp "../../../kernel_patches/next/0001-kernel-implement-susfs-v1.5.5-v1.5.7-KSUN-v1.0.8.patch" ./ksun_susfs_latest.patch
        patch -p1 --forward < ksun_susfs_latest.patch || true
        ;;
      v1.5.8)
        cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch .
        patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch || true
        for f in fix_apk_sign.c.patch fix_core_hook.c.patch fix_selinux.c.patch fix_ksud.c.patch; do
          cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/$f" .
          patch -p1 --forward --fuzz=3 < "$f" || true
        done
        ;;
      v1.5.9)
        cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch .
        patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true
        for rej in $(find ./kernel -maxdepth 2 -name '*.rej' -printf "%f\n" | cut -d'.' -f1); do
          pf="../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_${rej}.c.patch"
          [ -f "$pf" ] && patch -p1 --forward < "$pf" || true
        done
        patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch" || true
        ;;
      *)
        echo "Unsupported SUSFS version: $susfs_version"
        exit 1
        ;;
    esac

    cd ../common
    if [ "${{ inputs.android_version }}" = "android15" ] && [ "${{ inputs.kernel_version }}" = "6.6" ]; then
      if ! grep -qxF '#include <trace/hooks/fs.h>' fs/namespace.c; then
        sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' fs/namespace.c
      fi
    fi
    patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

    if printf '%s\n5.16\n${{ inputs.kernel_version }}' | sort -V | head -n1 | grep -q "${{ inputs.kernel_version }}"; then
      patch -p1 -F 3 < "../../../kernel_patches/gki_ptrace.patch" || true
    fi

    if [ "${{ inputs.model }}" = "OPAce5Pro" ] || [ "${{ inputs.model }}" = "OP13" ]; then
      echo 'obj-y += hmbird_patch.o' >> ./drivers/Makefile
      patch -p1 -F 3 < "../../../kernel_patches/oneplus/hmbird/hmbird_kernel_patch.patch" || true
      cd kernel/sched
        rm -f ext.c ext.h build_policy.c slim.h slim_sysctl.c || true
        patch -p1 -F 3 < "../../../../../kernel_patches/oneplus/hmbird/hmbird_files_patch.patch" || true
    fi

- name: Apply KSUN Hooks
  shell: bash
  run: |
    set -euo pipefail
    cd "$CONFIG/kernel_platform/common"
    cp ../../../kernel_patches/next/scope_min_manual_hooks_v1.4.patch manual_hooks.patch
    patch -p1 < manual_hooks.patch || true

- name: Apply Hide Stuff Patches
  shell: bash
  run: |
    set -euo pipefail
    cd "$CONFIG/kernel_platform/common"
    cp ../../../kernel_patches/69_hide_stuff.patch .
    patch -p1 -F 3 < 69_hide_stuff.patch || true

- name: Append KernelSU / SUSFS Config
  shell: bash
  run: |
    set -euo pipefail
    DEF="$CONFIG/kernel_platform/common/arch/arm64/configs/gki_defconfig"
    add () {
      grep -q "^$1" "$DEF" && sed -i "/^$1/d" "$DEF"
      echo "$2" >> "$DEF"
    }
    add CONFIG_KSU "CONFIG_KSU=y"
    add CONFIG_KSU_KPROBES_HOOK "CONFIG_KSU_KPROBES_HOOK=n"
    add CONFIG_KSU_SUSFS "CONFIG_KSU_SUSFS=y"
    add CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
    add CONFIG_KSU_SUSFS_SUS_PATH "CONFIG_KSU_SUSFS_SUS_PATH=y"
    add CONFIG_KSU_SUSFS_SUS_MOUNT "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
    add CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
    add CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
    add CONFIG_KSU_SUSFS_SUS_KSTAT "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
    add CONFIG_KSU_SUSFS_SUS_OVERLAYFS "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n"
    add CONFIG_KSU_SUSFS_TRY_UMOUNT "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
    add CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
    add CONFIG_KSU_SUSFS_SPOOF_UNAME "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
    add CONFIG_KSU_SUSFS_ENABLE_LOG "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
    add CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
    add CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
    add CONFIG_KSU_SUSFS_OPEN_REDIRECT "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
    add CONFIG_KSU_SUSFS_SUS_SU "CONFIG_KSU_SUSFS_SUS_SU=n"
    add CONFIG_TMPFS_XATTR "CONFIG_TMPFS_XATTR=y"
    add CONFIG_TMPFS_POSIX_ACL "CONFIG_TMPFS_POSIX_ACL=y"

- name: Add BBR v1 Support
  shell: bash
  run: |
    set -euo pipefail
    DEF="$CONFIG/kernel_platform/common/arch/arm64/configs/gki_defconfig"
    for kv in CONFIG_TCP_CONG_ADVANCED=y CONFIG_TCP_CONG_BBR=y CONFIG_TCP_CONG_BIC=n CONFIG_TCP_CONG_WESTWOOD=n CONFIG_TCP_CONG_HTCP=n CONFIG_NET_SCH_FQ=y CONFIG_NET_SCH_FQ_CODEL=y CONFIG_IP_ECN=y CONFIG_TCP_ECN=y CONFIG_IPV6_ECN=y CONFIG_IP_NF_TARGET_ECN=y; do
      key="${kv%%=*}"
      sed -i "/^$key=/d" "$DEF"
      echo "$kv" >> "$DEF"
    done

- name: Add TTL Target Support
  shell: bash
  run: |
    set -euo pipefail
    DEF="$CONFIG/kernel_platform/common/arch/arm64/configs/gki_defconfig"
    for kv in CONFIG_IP_NF_TARGET_TTL=y CONFIG_IP6_NF_TARGET_HL=y CONFIG_IP6_NF_MATCH_HL=y; do
      key="${kv%%=*}"
      sed -i "/^$key=/d" "$DEF"
      echo "$kv" >> "$DEF"
    done

- name: Add Build Optimization Configs
  shell: bash
  run: |
    set -euo pipefail
    DEF="$CONFIG/kernel_platform/common/arch/arm64/configs/gki_defconfig"
    for kv in \
      CONFIG_LTO_CLANG_THIN=y \
      CONFIG_LTO_CLANG=y \
      CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y \
      CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n \
      CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y \
      CONFIG_DEBUG_KERNEL=n \
      CONFIG_DYNAMIC_DEBUG=n \
      CONFIG_DEBUG_INFO=n; do
      key="${kv%%=*}"
      sed -i "/^$key=/d" "$DEF"
      echo "$kv" >> "$DEF"
    done

- name: Disable OnePlus Kernel Module (Conditional)
  shell: bash
  run: |
    set -euo pipefail
    cd "$CONFIG/kernel_platform"
    CONFIG_FILE="common/arch/arm64/configs/gki_defconfig"
    if [ "${ANDROID_VER:-android13}" = "android14" ] && [ "${{ inputs.kernel_version }}" = "6.1" ]; then
      sed -i -e 's/CONFIG_REGMAP_KUNIT=m/CONFIG_REGMAP_KUNIT=n/g' \
             -e 's/CONFIG_INPUT_KUNIT_TEST=m/CONFIG_INPUT_KUNIT_TEST=n/g' \
             -e 's/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=m/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=n/g' \
             -e 's/CONFIG_SND_SOC_UTILS_KUNIT_TEST=m/CONFIG_SND_SOC_UTILS_KUNIT_TEST=n/g' \
             -e 's/CONFIG_HID_KUNIT_TEST=m/CONFIG_HID_KUNIT_TEST=n/g' \
             -e 's/CONFIG_RTC_LIB_KUNIT_TEST=m/CONFIG_RTC_LIB_KUNIT_TEST=n/g' \
             -e 's/CONFIG_CLK_KUNIT_TEST=m/CONFIG_CLK_KUNIT_TEST=n/g' \
             -e 's/CONFIG_CLK_GATE_KUNIT_TEST=m/CONFIG_CLK_GATE_KUNIT_TEST=n/g' \
             -e 's/CONFIG_IIO_FORMAT_KUNIT_TEST=m/CONFIG_IIO_FORMAT_KUNIT_TEST=n/g' \
             -e 's/CONFIG_EXT4_KUNIT_TESTS=m/CONFIG_EXT4_KUNIT_TESTS=n/g' \
             -e 's/CONFIG_FAT_KUNIT_TEST=m/CONFIG_FAT_KUNIT_TEST=n/g' \
             "$CONFIG_FILE" || true
    fi

- name: Save Build Metadata
  id: save_metadata
  shell: bash
  run: |
    set -euo pipefail
    CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
    ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
    mkdir -p "$ARTIFACTS_DIR"
    cd "$CONFIG_DIR/kernel_platform/common"

    BRANCH_LINE=$( (grep '^[[:space:]]*BRANCH=' build.config.common || grep '^[[:space:]]*BRANCH=' build.config.constants || true) | head -n1 )
    if [ -z "$BRANCH_LINE" ]; then
      echo "BRANCH not found"
      exit 1
    fi
    BRANCH_VALUE="${BRANCH_LINE#*=}"
    ANDROID_VERSION_PARSED="${BRANCH_VALUE%-*}"
    VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
    PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
    SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
    FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
    echo "$ANDROID_VERSION_PARSED-$FULL_VERSION" > "$ARTIFACTS_DIR/${{ inputs.model }}.txt"
    echo "ANDROID_VER=$ANDROID_VERSION_PARSED" >> "$GITHUB_ENV"

- name: Customize LocalVersion / UTS
  shell: bash
  run: |
    set -euo pipefail
    cd "$CONFIG/kernel_platform"
    TAG="-${ANDROID_VER}-OP-Ultra"
    for p in common msm-kernel external/dtc; do
      if [ -f "$p/scripts/setlocalversion" ]; then
        sed -i 's/echo "${KERNELVERSION}${file_localversion}${config_localversion}${LOCALVERSION}${scm_version}"/echo "'"$TAG"'"/' "$p/scripts/setlocalversion" || true
        chmod +x "$p/scripts/setlocalversion"
      fi
    done
    DATESTR=$(date -u)
    for mk in common/scripts/mkcompile_h msm-kernel/scripts/mkcompile_h; do
      [ -f "$mk" ] && perl -pi -e 's{UTS_VERSION="\$\(echo \$UTS_VERSION \$CONFIG_FLAGS \$TIMESTAMP \| cut -b -\$UTS_LEN\)"}{UTS_VERSION="#1 SMP PREEMPT '"$DATESTR"'"}' "$mk" || true
    done

- name: Detect Clang Version
  shell: bash
  run: |
    set -euo pipefail
    KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
    DEF="$KERNEL_PATH/common/arch/arm64/configs/gki_defconfig"
    CLANG_VERSION_LINE=$(grep -E '^CONFIG_CLANG_VERSION=' "$DEF" || true)
    if [ -n "$CLANG_VERSION_LINE" ]; then
      raw="${CLANG_VERSION_LINE#*=}"
      raw="${raw//\"/}"
      echo "CLANG_CFG_VERSION=$raw" >> "$GITHUB_ENV"
    fi
    AUTO=$(ls -1d "$KERNEL_PATH"/prebuilts/clang/host/linux-x86/clang-r* 2>/dev/null | tail -n1 || true)
    [ -n "$AUTO" ] && echo "CLANG_BIN_PATH=$AUTO/bin" >> "$GITHUB_ENV"

- name: Build Kernel
  shell: bash
  run: |
    set -euo pipefail
    KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
    CLANG_BIN="${CLANG_BIN_PATH:-}"
    if [ -n "$CLANG_BIN" ] && [ -x "$CLANG_BIN/clang" ]; then
      export PATH="$CLANG_BIN:$PATH"
    fi
    command -v clang >/dev/null 2>&1 || { echo "clang unavailable"; exit 1; }
    cd "$KERNEL_PATH/common"
    MEM_GB=$(free -g | awk '/^Mem:/{print $2}')
    CORES=$(nproc)
    if [ "$MEM_GB" -lt 16 ]; then
      JOBS=$(( CORES > 4 ? CORES/2 : CORES ))
    else
      JOBS=$CORES
    fi
    [ "$JOBS" -lt 1 ] && JOBS=1
    echo "Using $JOBS jobs (RAM ${MEM_GB}G, cores $CORES)"
    MAKE_ARGS="LLVM=1 ARCH=arm64 CC=clang LD=ld.lld HOSTLD=ld.lld CROSS_COMPILE=aarch64-linux-android-"
    export KBUILD_BUILD_USER="builder"
    export KBUILD_BUILD_HOST="github"
    make O=out ${MAKE_ARGS} gki_defconfig
    time make -j"$JOBS" O=out ${MAKE_ARGS} KCFLAGS+="-Wno-error -O2 -flto=thin -fno-stack-protector"
    test -f out/arch/arm64/boot/Image || { echo "Image not produced"; ls -R out/arch/arm64/boot; exit 1; }

- name: Record Versions
  id: record_versions
  shell: bash
  run: |
    set -euo pipefail
    echo "ksu_version=${KSUVER:-}" >> "$GITHUB_OUTPUT"
    echo "susfs_version=${SUSVER:-}" >> "$GITHUB_OUTPUT"

- name: Create Kernel ZIP
  id: create_zip
  shell: bash
  run: |
    set -euo pipefail
    CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
    KERNEL_PATH="$CONFIG_DIR/kernel_platform"
    OUTDIR="$KERNEL_PATH/common/out/arch/arm64/boot"
    IMG=""
    for c in Image Image.gz Image.lz4; do
      if [ -f "$OUTDIR/$c" ]; then
        IMG="$OUTDIR/$c"; break
      fi
    done
    [ -z "$IMG" ] && { echo "No kernel image found"; ls -1 "$OUTDIR"; exit 1; }
    mkdir -p "$GITHUB_WORKSPACE/AnyKernel3"
    if [[ "$IMG" == *.gz ]]; then
      gunzip -c "$IMG" > "$GITHUB_WORKSPACE/AnyKernel3/Image"
    elif [[ "$IMG" == *.lz4 ]]; then
      lz4 -d -c "$IMG" > "$GITHUB_WORKSPACE/AnyKernel3/Image"
    else
      cp "$IMG" "$GITHUB_WORKSPACE/AnyKernel3/Image"
    fi
    cd "$GITHUB_WORKSPACE/AnyKernel3"
    if [ "${{ inputs.model }}" = "OPAce5Pro" ] || [ "${{ inputs.model }}" = "OP13" ]; then
      mkdir -p tools
      cp "$GITHUB_WORKSPACE/kernel_patches/oneplus/hmbird/bins/"* ./tools/ 2>/dev/null || true
      [ -f "$GITHUB_WORKSPACE/kernel_patches/oneplus/hmbird/ak3_hmbird_patch.patch" ] && patch -F 3 < "$GITHUB_WORKSPACE/kernel_patches/oneplus/hmbird/ak3_hmbird_patch.patch" || true
    fi
    ZIP_NAME="AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${KSUVER:-}_SUSFS_${SUSVER:-}.zip"
    ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
    mkdir -p "$ARTIFACTS_DIR"
    zip -r "$ARTIFACTS_DIR/$ZIP_NAME" ./* >/dev/null
    echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
    echo "Created $ZIP_NAME"
