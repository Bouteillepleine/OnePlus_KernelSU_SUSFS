name: Build

permissions:
  contents: write
  actions: write

inputs:
  model:
    required: true
    type: string
  soc:
    required: true
    type: string
  branch:
    required: true
    type: string
  manifest:
    required: true
    type: string
  android_version:
    required: true
    type: string
  kernel_version:
    required: true
    type: string
  ksun_branch:
    required: true
    type: string
    default: stable
  susfs_branch:
    required: true
    type: string
    default: ""
  github_token:
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Restore kernel source cache
      id: cache-kernel
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/${{ inputs.model }}
        key: kernel-source-${{ inputs.model }}-${{ inputs.branch }}-${{ inputs.manifest }}

    - name: Restore Bazel cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/bazel
          ${{ github.workspace }}/${{ inputs.model }}/out
        key: bazel-${{ inputs.model }}-${{ inputs.branch }}-${{ hashFiles('.github/workflows/build.yml') }}

    - name: Setup Build System
      shell: bash
      run: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV
        
        # Optimized cleanup
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force || true
        sudo apt-get autoremove -y
        sudo apt-get autoclean -y
        
        # Parallel setup
        {
          sudo apt update
          sudo apt install -y python3 python-is-python3
          mkdir -p ./git-repo
          if [[ ! -f ./git-repo/repo ]]; then
            curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
            chmod a+rx ./git-repo/repo
          fi
          echo "REPO=$GITHUB_WORKSPACE/./git-repo/repo" >> $GITHUB_ENV
        } &
        wait
        
        echo "CONFIG=${{ inputs.model }}" >> $GITHUB_ENV
        export PATH=$PATH:$GITHUB_WORKSPACE/git-repo

    - name: Configure Git Information
      shell: bash
      run: |
        git config --global user.name "0+builder"
        git config --global user.email "0+builder@yahoo.com"

    - name: Clone AnyKernel3 and Other Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "Cloning AnyKernel3 and other dependencies..."
        ANYKERNEL_BRANCH="gki-2.0"
        if [[ -z "${{ inputs.susfs_branch }}" ]]; then
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        else
          SUSFS_BRANCH="${{ inputs.susfs_branch }}"
        fi
        
        # Shallow clone for faster fetching
        if [[ ! -d AnyKernel3 ]]; then
          git clone --depth=1 https://github.com/Bouteillepleine/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
        fi
        if [[ ! -d kernel_patches ]]; then
          git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git
        fi
        
        # SUSFS with shallow clone fallback
        if [[ ! -d susfs4ksu ]]; then
          if ! git clone --depth=1 --branch "$SUSFS_BRANCH" https://gitlab.com/simonpunk/susfs4ksu.git; then
            echo "Shallow clone failed, doing full clone"
            git clone https://gitlab.com/simonpunk/susfs4ksu.git
            cd susfs4ksu
            git checkout "$SUSFS_BRANCH"
            cd ..
          fi
        else
          cd susfs4ksu
          git fetch
          git checkout "$SUSFS_BRANCH"
          cd ..
        fi

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        echo "Creating folder for configuration: $CONFIG..."
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        
        # Skip init if cache exists
        if [[ ! -d .repo ]]; then
          echo "Initializing kernel source..."
          if [[ "${{ inputs.manifest }}" == https://* ]]; then
            mkdir -p .repo/manifests
            curl -Ls ${{ inputs.manifest }} -o .repo/manifests/temp_manifest.xml
            $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
          else
            $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git -b ${{ inputs.branch }} -m ${{ inputs.manifest }} --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
          fi
        fi
        
        echo "Syncing kernel source..."
        $REPO --version
        $REPO --trace sync -c --no-clone-bundle --no-tags --optimized-fetch -j$(nproc --all) --fail-fast

    - name: Add KernelSU Next
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        echo "Adding KernelSU Next..."
        if [ "${{ inputs.ksun_branch }}" == "stable" ]; then
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
        else
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ inputs.ksun_branch }}
        fi
        git submodule update --init --recursive

    - name: Apply SUSFS Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        echo "Applying SUSFS patches..."
        cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
        cp ../../susfs4ksu/kernel_patches/fs/* ./common/fs/
        cp ../../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
        cd ./KernelSU-Next
        echo "Applying next SUSFS patches..."
        susfs_version=$(grep '#define SUSFS_VERSION' ../common/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        BASE_VERSION=10200
        cd ./kernel
        KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" $BASE_VERSION)
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
        cd ..
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        echo "KernelSU Next Version: $KSU_VERSION"
        echo "SusFS Version: $susfs_version"
        case "$susfs_version" in
          "v1.5.5"|"v1.5.6"|"v1.5.7")
            cp "../../../kernel_patches/next/0001-kernel-implement-susfs-v1.5.5-v1.5.7-KSUN-v1.0.8.patch" "./ksun_susfs_latest.patch"
            ;;
          "v1.5.8")
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            git apply 10_enable_susfs_for_ksu.patch || true
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_apk_sign.c.patch" ./
            git apply fix_apk_sign.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_core_hook.c.patch" ./
            git apply fix_core_hook.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_selinux.c.patch" ./
            git apply fix_selinux.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_ksud.c.patch" ./
            git apply fix_ksud.c.patch
            ;;
          "v1.5.9")
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            git apply 10_enable_susfs_for_ksu.patch || true
            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -printf "%f\n" | cut -d'.' -f1); do
              echo "Patching file: $file.c with fix_$file.c.patch"
              git apply "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_$file.c.patch"
            done
            git apply "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch"
            ;;
          *)
            echo "Invalid version: $susfs_version"
            exit 1
            ;;
        esac
        git apply ksun_susfs_latest.patch || true
        cd ../common
        if [ "${{ inputs.android_version }}" = "android15" ] && [ "${{ inputs.kernel_version }}" = "6.6" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
          else
            echo "Line already present. Skipping insert."
          fi
        fi
        git apply 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true
        KERNEL_VERSION="${{ inputs.kernel_version }}"
        MIN_VERSION="5.16"
        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          echo "Patching ptrace!"
          git apply "../../../kernel_patches/gki_ptrace.patch"
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi
        if [ "${{ inputs.model }}" == "OPAce5Pro" ] || [ "${{ inputs.model }}" == "OP13" ]; then
          echo "Patching hmbird!"
          echo 'obj-y += hmbird_patch.o' >> ./drivers/Makefile
          git apply "../../../kernel_patches/oneplus/hmbird/hmbird_kernel_patch.patch"
          echo "Patching hmbird files!"
          cd ./kernel/sched
          rm -rf ext.c ext.h build_policy.c slim.h slim_sysctl.c
          git apply "../../../../../kernel_patches/oneplus/hmbird/hmbird_files_patch.patch"
        else
          echo "Not OPAce5Pro / OP13, skipping hmbird patch"
        fi

    - name: Apply KSUN Hooks
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform/common"
        echo "Applying KSUN Hooks..."
        cp ../../../kernel_patches/next/scope_min_manual_hooks_v1.4.patch ./manual_hooks.patch
        git apply ./manual_hooks.patch

    - name: Apply Hide Stuff Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform/common"
        echo "Applying hide stuff patch..."
        cp ../../../kernel_patches/69_hide_stuff.patch ./
        git apply 69_hide_stuff.patch

    - name: Add KernelSU-Next and SUSFS Configuration Settings
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        echo "CONFIG_KSU=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_KPROBES_HOOK=n" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$CONFIG_FILE"
        echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$CONFIG_FILE"
        echo "CONFIG_TMPFS_XATTR=y" >> "$CONFIG_FILE"
        echo "CONFIG_TMPFS_POSIX_ACL=y" >> "$CONFIG_FILE"

    - name: Add BBR Support
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration database"
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        echo "CONFIG_TCP_CONG_ADVANCED=y" >> "$CONFIG_FILE"
        echo "CONFIG_TCP_CONG_BBR=y" >> "$CONFIG_FILE"
        echo "CONFIG_TCP_CONG_BIC=n" >> "$CONFIG_FILE"
        echo "CONFIG_TCP_CONG_WESTWOOD=n" >> "$CONFIG_FILE"
        echo "CONFIG_TCP_CONG_HTCP=n" >> "$CONFIG_FILE"
        echo "CONFIG_NET_SCH_FQ=y" >> "$CONFIG_FILE"
        echo "CONFIG_NET_SCH_FQ_CODEL=y" >> "$CONFIG_FILE"
        sed -i -e '/CONFIG_NET_SCH_FQ_CODEL=/d' -e '$aCONFIG_NET_SCH_FQ_CODEL=y' "$CONFIG_FILE"
        echo "CONFIG_IP_ECN=y" >> "$CONFIG_FILE"
        echo "CONFIG_TCP_ECN=y" >> "$CONFIG_FILE"
        echo "CONFIG_IPV6_ECN=y" >> "$CONFIG_FILE"
        echo "CONFIG_IP_NF_TARGET_ECN=y" >> "$CONFIG_FILE"
        echo "CONFIG_MQ_IOSCHED_SSG=y" >> "$CONFIG_FILE"
        echo "CONFIG_MQ_IOSCHED_SSG_CGROUP=y" >> "$CONFIG_FILE"

    - name: Add TTL Target Support
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        echo "CONFIG_IP_NF_TARGET_TTL=y" >> "$CONFIG_FILE"
        echo "CONFIG_IP6_NF_TARGET_HL=y" >> "$CONFIG_FILE"
        echo "CONFIG_IP6_NF_MATCH_HL=y" >> "$CONFIG_FILE"

    - name: Add Other Configurations
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        echo "CONFIG_DEBUG_KERNEL=n" >> "$CONFIG_FILE"
        echo "CONFIG_DYNAMIC_DEBUG=n" >> "$CONFIG_FILE"
        echo "CONFIG_DEBUG_INFO=n" >> "$CONFIG_FILE"
        echo "CONFIG_LTO_CLANG_THIN=y" >> "$CONFIG_FILE"
        echo "CONFIG_LTO_CLANG=y" >> "$CONFIG_FILE"
        echo "CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y" >> "$CONFIG_FILE"
        echo "CONFIG_AUTOFDO_CLANG=y" >> "$CONFIG_FILE"
        echo "CONFIG_LLVM_POLLY=y" >> "$CONFIG_FILE"

    - name: Disable OnePlus Kernel Modules
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        if [ "${{ inputs.android_version }}" = "android14" ] && [ "${{ inputs.kernel_version }}" = "6.1" ]; then
          sed -i 's/CONFIG_REGMAP_KUNIT=m/CONFIG_REGMAP_KUNIT=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_REGMAP_KUNIT=m/CONFIG_REGMAP_KUNIT=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_INPUT_KUNIT_TEST=m/CONFIG_INPUT_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=m/CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_SND_SOC_UTILS_KUNIT_TEST=m/CONFIG_SND_SOC_UTILS_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_HID_KUNIT_TEST=m/CONFIG_HID_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_RTC_LIB_KUNIT_TEST=m/CONFIG_RTC_LIB_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_CLK_KUNIT_TEST=m/CONFIG_CLK_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_CLK_GATE_KUNIT_TEST=m/CONFIG_CLK_GATE_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_IIO_FORMAT_KUNIT_TEST=m/CONFIG_IIO_FORMAT_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_EXT4_KUNIT_TESTS=m/CONFIG_EXT4_KUNIT_TESTS=n/g' "./common/arch/arm64/configs/gki_defconfig"
          sed -i 's/CONFIG_FAT_KUNIT_TEST=m/CONFIG_FAT_KUNIT_TEST=n/g' "./common/arch/arm64/configs/gki_defconfig"
        fi

    - name: Run sed and perl Commands
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG/kernel_platform"
        echo "Running sed and perl commands..."
        CONFIG_FILE="./common/arch/arm64/configs/gki_defconfig"
        sed -i 's/CONFIG_LTO=n/CONFIG_LTO=y/' "$CONFIG_FILE"
        sed -i 's/CONFIG_LTO_CLANG_FULL=y/CONFIG_LTO_CLANG_THIN=y/' "$CONFIG_FILE"
        sed -i 's/CONFIG_LTO_CLANG_NONE=y/CONFIG_LTO_CLANG_THIN=y/' "$CONFIG_FILE"
        sed -i 's/check_defconfig//' ./common/build.config.gki
        sed -i '$s|echo "\$res"|echo "\$res"|' ./common/scripts/setlocalversion
        sed -i '$s|echo "\$res"|echo "\$res"|' ./msm-kernel/scripts/setlocalversion
        sed -i '$s|echo "\$res"|echo "\$res"|' ./external/dtc/scripts/setlocalversion
        sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl || echo "No stamp.bzl"
        sed -i 's/-dirty//' ./common/scripts/setlocalversion
        sed -i 's/-dirty//' ./msm-kernel/scripts/setlocalversion
        sed -i 's/-dirty//' ./external/dtc/scripts/setlocalversion
        sed -i 's/-dirty//' ./build/kernel/kleaf/workspace_status_stamp.py || echo "No workspace_status_stamp.py"
        sed -i '/echo "LTO $LTO "/i export LTO=thin' ./oplus/build/oplus_setup.sh
        sed -i 's/export REPACK_IMG=true/export REPACK_IMG=false/g' ./oplus/build/oplus_setup.sh
        DATESTR=$(date -u '+%a %b %d %T UTC %Y')
        perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT \$DATESTR\"}" ./common/scripts/mkcompile_h
        perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT \$DATESTR\"}" ./msm-kernel/scripts/mkcompile_h
        find . -type f -exec sed -i 's/\(make\s\+-C[^\n]*\)\s\+/\1 -j$(nproc) /g' {} +

    - name: Build the Kernel
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG"
        echo "Building the kernel..."
        sudo sh -c 'sync; echo 3 > /proc/sys/vm/drop_caches'
        rm ./kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports (common)"
        rm ./kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports (msm-kernel)"
        BUILD_TYPE="gki"
        BAZEL_ARGS=(--jobs=$(nproc --all) --lto=thin)
        if [ "${{ inputs.soc }}" == "sun" ]; then
          BUILD_TYPE="perf"
          BAZEL_ARGS+=(-g)
        fi
        
        # Quiet build with progress monitoring
        (stdbuf -oL bash -c '
          while true; do
            free -h | grep Mem | awk "{print \"Memory: \" \$3\"/\"\$2}"
            df -h | grep /dev/root | awk "{print \"Disk: \" \$3\"/\"\$2}"
            sleep 30
          done
        ') &
        MONITOR_PID=$!
        trap "kill $MONITOR_PID" EXIT
        
        export BUILD_QUIET=1
        if [ -f ./kernel_platform/build_with_bazel.py ]; then
          ./kernel_platform/oplus/bazel/oplus_modules_variant.sh ${{ inputs.soc }} "$BUILD_TYPE" ""
          ./kernel_platform/build_with_bazel.py -t ${{ inputs.soc }} $BUILD_TYPE "${BAZEL_ARGS[@]}" -o "$(pwd)/out" > /dev/null 2>&1
        else
          LTO=thin ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ inputs.soc }} "$BUILD_TYPE" > /dev/null 2>&1
        fi
        kill $MONITOR_PID

    - name: Download Latest SUSFS Module from CI
      continue-on-error: true
      shell: bash
      run: |
        set -euo pipefail
        echo "Fetching latest successful run for branch v1.5.2+..."
        LATEST_RUN_ID=$(curl -s -H "Authorization: Bearer ${{ inputs.github_token }}" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs?status=success" | \
          jq -r '.workflow_runs[] | select(.head_branch == "v1.5.2+") | .id' | head -n 1)
        if [ -z "$LATEST_RUN_ID" ]; then
          echo "No successful run found for branch v1.5.2+"
        else
          ARTIFACT_URL=$(curl -s -H "Authorization: Bearer ${{ inputs.github_token }}" \
            "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$LATEST_RUN_ID/artifacts" | jq -r '.artifacts[0].archive_download_url')
          if [ -n "$ARTIFACT_URL" ]; then
            curl -L -H "Authorization: Bearer ${{ inputs.github_token }}" -o ksu_module_susfs_1.5.2+_CI.zip "$ARTIFACT_URL"
            cp ksu_module_susfs_1.5.2+_CI.zip ./AnyKernel3/
          else
            echo "Failed to fetch artifact URL"
          fi
        fi

    - name: Create ZIP Files for Different Formats
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        echo "Changing to configuration directory: $CONFIG..."
        cd "$CONFIG"
        echo "Copying Image"
        cp ./out/dist/Image ../AnyKernel3/Image || { echo "::error::Failed to copy kernel Image"; exit 1; }
        echo "Navigating to AnyKernel3 directory..."
        cd ../AnyKernel3
        if [ "${{ inputs.model }}" == "OPAce5Pro" ] || [ "${{ inputs.model }}" == "OP13" ]; then
          cp ../kernel_patches/oneplus/hmbird/bins/* ./tools/ || true
          git apply ../kernel_patches/oneplus/hmbird/ak3_hmbird_patch.patch || true
        fi
        ZIP_NAME="AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${{ env.KSUVER }}_SUSFS_${{ env.SUSVER }}.zip"
        echo "Creating zip file $ZIP_NAME..."
        zip -r "$ZIP_NAME" ./* || { echo "::error::Failed to create ZIP file"; exit 1; }
        echo "ZIP file created at $GITHUB_WORKSPACE/$ZIP_NAME"

    - name: Debug ZIP File
      shell: bash
      run: |
        ls -l /home/runner/work/OnePlus_KernelSU_SUSFS/OnePlus_KernelSU_SUSFS/AnyKernel3/AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${{ env.KSUVER }}_SUSFS_${{ env.SUSVER }}.zip || echo "ZIP file not found"
        ls -l /home/runner/work/OnePlus_KernelSU_SUSFS/OnePlus_KernelSU_SUSFS/OP13r/out/dist/Image || echo "Kernel Image not found"
        ls -l /home/runner/work/OnePlus_KernelSU_SUSFS/OnePlus_KernelSU_SUSFS/AnyKernel3/Image || echo "Copied Image not found"

    - name: Upload Build Artifacts
      id: upload_ak3_zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: AnyKernel3/AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${{ env.KSUVER }}_SUSFS_${{ env.SUSVER }}.zip
        if-no-files-found: error

    - name: Save Bazel cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: |
          ~/.cache/bazel
          ${{ github.workspace }}/${{ inputs.model }}/out
        key: bazel-${{ inputs.model }}-${{ inputs.branch }}-${{ hashFiles('.github/workflows/build.yml') }}
