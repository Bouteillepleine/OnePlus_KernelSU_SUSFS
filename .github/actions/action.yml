name: Build

runs:
  using: composite
  steps:
    - name: Environment Bootstrap
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Env Bootstrap"
        # Central constants
        BASE_KSU_VERSION=10200
        MIN_PTRACE_KERNEL=5.16
        # Export for later steps
        {
          echo "BASE_KSU_VERSION=$BASE_KSU_VERSION"
          echo "MIN_PTRACE_KERNEL=$MIN_PTRACE_KERNEL"
        } >> "$GITHUB_ENV"
        echo "::endgroup::"

    - name: Disk / Cleanup (optional)
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Pre-clean"
        df -h
        # Keep cleanup minimal; remove only large, surely unused SDK bundles
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android || true
        df -h
        echo "::endgroup::"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get update -qq
        # Trimmed list: python3 already preinstalled on runners
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves ccache
        sudo apt-get clean
        echo "::endgroup::"

    - name: Enable ccache
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::ccache setup"
        export CCACHE_DIR="$HOME/.ccache"
        mkdir -p "$CCACHE_DIR"
        ccache -M 5G
        echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
        echo "::endgroup::"

    - name: Install Repo Tool
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Repo tool"
        mkdir -p ./git-repo
        curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ./git-repo/repo
        chmod a+rx ./git-repo/repo
        echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> "$GITHUB_ENV"
        echo "CONFIG=${{ inputs.model }}" >> "$GITHUB_ENV"
        echo "::endgroup::"

    - name: Clone Dependencies (AnyKernel3, patches, susfs)
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Clone deps"
        ANYKERNEL_BRANCH="gki-2.0"
        if [[ -z "${{ inputs.susfs_branch }}" ]]; then
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        else
          SUSFS_BRANCH="${{ inputs.susfs_branch }}"
        fi
        git clone --depth=1 -b "$ANYKERNEL_BRANCH" https://github.com/Bouteillepleine/AnyKernel3.git || { echo "Clone AnyKernel3 failed"; exit 1; }
        git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git || { echo "Clone kernel_patches failed"; exit 1; }
        git clone https://gitlab.com/simonpunk/susfs4ksu.git || { echo "Clone susfs4ksu failed"; exit 1; }
        cd susfs4ksu
        if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        elif git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
        else
          echo "Error: SUSFS branch/tag/commit '$SUSFS_BRANCH' not found"
          exit 1
        fi
        echo "::endgroup::"

    - name: Repo Init + Sync
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Repo sync"
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        if [[ "${{ inputs.manifest }}" == https://* ]]; then
          mkdir -p .repo/manifests
          curl -fsSL "${{ inputs.manifest }}" -o .repo/manifests/temp_manifest.xml
          $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          $REPO init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b ${{ inputs.branch }} -m ${{ inputs.manifest }} --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        $REPO sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast
        echo "::endgroup::"

    - name: Create Config Fragments
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Config fragments"
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        FRAGDIR="$KP/config_fragments"
        mkdir -p "$FRAGDIR"
        cat > "$FRAGDIR/ksu_susfs.config" << 'EOF'
        CONFIG_KSU=y
        CONFIG_KSU_KPROBES_HOOK=n
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_SU=n
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        EOF
        cat > "$FRAGDIR/net_bbr.config" << 'EOF'
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y
        CONFIG_NET_SCH_FQ_CODEL=y
        CONFIG_IP_ECN=y
        CONFIG_TCP_ECN=y
        EOF
        cat > "$FRAGDIR/ttl_target.config" << 'EOF'
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        EOF
        cat > "$FRAGDIR/build_perf.config" << 'EOF'
        CONFIG_LTO_CLANG_THIN=y
        CONFIG_LTO_CLANG=y
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n
        CONFIG_OPTIMIZE_INLINING=y
        CONFIG_DEBUG_KERNEL=n
        CONFIG_DYNAMIC_DEBUG=n
        CONFIG_DEBUG_INFO=n
        CONFIG_DAMON=n
        CONFIG_CRYPTO_SHA1_ARM64_CE=y
        CONFIG_VIRTIO_PCI_LEGACY=y
        CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y
        CONFIG_HEADERS_INSTALL=n
        CONFIG_PROC_MEM_ALWAYS_FORCE=n
        EOF
        echo "::endgroup::"

    - name: Build Kernel
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Build"
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COM="$KP/common"
        OUT="$COM/out"
        cd "$COM"

        # Detect Clang
        CLANG_BASE=""
        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          test -d "$base/clang/host/linux-x86" || continue
          cand=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1)
          [ -n "$cand" ] && CLANG_BASE="$cand"
        done
        [ -n "$CLANG_BASE" ] || { echo "Clang not found"; exit 1; }
        CLANG_BIN="$CLANG_BASE/bin"
        export PATH="$CLANG_BIN:$PATH"

        # ccache wrap
        export CC="ccache clang"
        export CXX="ccache clang++"

        export LLVM=1 ARCH=arm64 SUBARCH=arm64
        export LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_COMPAT=arm-linux-androidkernel-
        export KCFLAGS="-O2 -pipe -Wno-error -fno-stack-protector"
        export KCPPFLAGS="-DCONFIG_OPTIMIZE_INLINING"

        mkdir -p "$OUT"
        make -j"$(nproc)" O="$OUT" gki_defconfig

        # Merge fragments (requires scripts/kconfig/merge_config.sh existing)
        FRAGDIR="$KP/config_fragments"
        if [ -d "$FRAGDIR" ]; then
          ./scripts/kconfig/merge_config.sh -m -O "$OUT" "$OUT/.config" "$FRAGDIR"/*.config
          make O="$OUT" olddefconfig
        fi

        # Disable various KUnit tests via loop (was sed spam)
        disable_syms=(
          REGMAP_KUNIT INPUT_KUNIT_TEST SND_SOC_TOPOLOGY_KUNIT_TEST
          SND_SOC_UTILS_KUNIT_TEST HID_KUNIT_TEST RTC_LIB_KUNIT_TEST
          CLK_KUNIT_TEST CLK_GATE_KUNIT_TEST IIO_FORMAT_KUNIT_TEST
          EXT4_KUNIT_TESTS FAT_KUNIT_TEST
        )
        for s in "${disable_syms[@]}"; do
          ./scripts/config --file "$OUT/.config" -d "$s" || true
        done

        # Local version (ASCII recommendation)
        ./scripts/config --file "$OUT/.config" --set-str LOCALVERSION "-${{ inputs.android_version }}-OP-Ultra"
        ./scripts/config --file "$OUT/.config" -d LOCALVERSION_AUTO || true
        : > .scmversion
        make O="$OUT" olddefconfig

        # Dynamic job calculation: reserve 1 core, memory heuristic
        MEM_MB=$(grep MemTotal /proc/meminfo | awk '{print int($2/1024)}')
        CORES=$(nproc)
        # Assume ~2GB per job worst case
        MAX_MEM_JOBS=$(( MEM_MB / 2000 ))
        [ $MAX_MEM_JOBS -lt 1 ] && MAX_MEM_JOBS=1
        TARGET_JOBS=$(( CORES - 1 ))
        [ $TARGET_JOBS -lt 1 ] && TARGET_JOBS=1
        if [ $MAX_MEM_JOBS -lt $TARGET_JOBS ]; then
          JOBS=$MAX_MEM_JOBS
        else
          JOBS=$TARGET_JOBS
        fi
        echo "Using make -j$JOBS (Cores=$CORES, MemMB=$MEM_MB)"

        make -j"$JOBS" O="$OUT"

        IMAGE="$OUT/arch/arm64/boot/Image"
        [ -f "$IMAGE" ] || { echo "Image missing"; exit 1; }
        sha256sum "$IMAGE" | tee "$OUT/Image.sha256"

        # Do NOT copy Image here (avoid duplicate) — packaging step will do it
        echo "::endgroup::"

    - name: Save Build Metadata
      id: build_meta
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Metadata"
        CONFIG_DIR="$GITHUB_WORKSPACE/${{ env.CONFIG }}"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$CONFIG_DIR/kernel_platform/common"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        # Extract ANDROID_VER from config or previously determined branch logic
        BRANCH_LINE=$(grep '^[[:space:]]*BRANCH=' build.config.* | head -n1 | awk -F= '{print $2}')
        ANDROID_VER="${BRANCH_LINE%-*}"
        echo "ANDROID_VER=$ANDROID_VER" >> "$GITHUB_ENV"

        # If KSU/SUSFS versions were exported earlier keep them; else try to glean
        KSU_VERSION="${KSUVER:-unknown}"
        SUS_VERSION="${SUSVER:-unknown}"

        {
          echo "kernel_full_version=$ANDROID_VER-$FULL_VERSION"
          echo "ksu_version=$KSU_VERSION"
          echo "susfs_version=$SUS_VERSION"
        } >> "$GITHUB_OUTPUT"

        echo "$ANDROID_VER-$FULL_VERSION" > "$ARTIFACTS_DIR/${{ inputs.model }}.txt"
        echo "::endgroup::"

    - name: Package Kernel ZIP
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Package"
        CONFIG_DIR="$GITHUB_WORKSPACE/${{ env.CONFIG }}"
        KERNEL_PATH="$CONFIG_DIR/kernel_platform"
        COMMON_OUT="$KERNEL_PATH/common/out"
        IMAGE_PATH="$COMMON_OUT/arch/arm64/boot/Image"

        cp "$IMAGE_PATH" "$GITHUB_WORKSPACE/AnyKernel3/Image"
        if [ "${{ inputs.model }}" = "OPAce5Pro" ] || [ "${{ inputs.model }}" = "OP13" ]; then
          cp "$GITHUB_WORKSPACE/kernel_patches/oneplus/hmbird/bins/"* "$GITHUB_WORKSPACE/AnyKernel3/tools/" 2>/dev/null || true
          patch -F 3 < "$GITHUB_WORKSPACE/kernel_patches/oneplus/hmbird/ak3_hmbird_patch.patch"
        fi
        ZIP_NAME="AnyKernel3_${{ inputs.model }}_${{ inputs.android_version }}-${{ inputs.kernel_version }}_Next_${KSUVER:-NA}_SUSFS_${SUSVER:-NA}.zip"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        (cd "$GITHUB_WORKSPACE/AnyKernel3" && zip -r "$ARTIFACTS_DIR/$ZIP_NAME" ./*)
        sha256sum "$ARTIFACTS_DIR/$ZIP_NAME" > "$ARTIFACTS_DIR/$ZIP_NAME.sha256"
        echo "::endgroup::"

    - name: Build Summary
      if: success()
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Summary"
        CONFIG_DIR="$GITHUB_WORKSPACE/${{ env.CONFIG }}"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        IMAGE_SHA=$(grep -o '^[0-9a-f]*' "$CONFIG_DIR/kernel_platform/common/out/Image.sha256")
        ZIP_FILE=$(ls "$ARTIFACTS_DIR"/AnyKernel3_*.zip | head -n1)
        ZIP_SHA=$(cut -d' ' -f1 "$ZIP_FILE.sha256")
        echo "Kernel Image SHA256: $IMAGE_SHA"
        echo "Package SHA256: $ZIP_SHA"
        {
          echo "### Kernel Build Summary"
          echo ""
          echo "* Model: ${{ inputs.model }}"
          echo "* Android: ${{ inputs.android_version }}"
          echo "* Kernel base version: $(cat "$CONFIG_DIR/artifacts/${{ inputs.model }}.txt")"
          echo "* KSU Version: ${KSUVER:-unknown}"
          echo "* SUSFS Version: ${SUSVER:-unknown}"
          echo "* Image SHA256: $IMAGE_SHA"
          echo "* ZIP: $(basename "$ZIP_FILE")"
          echo "* ZIP SHA256: $ZIP_SHA"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "::endgroup::"
